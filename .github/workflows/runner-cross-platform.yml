name: Runner Cross Platform

on:
  pull_request:
  push:
    branches:
      - main
      - stage

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            check: cargo check --workspace --target aarch64-apple-darwin
            test: cargo test --workspace --target aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
            check: cargo check --workspace --target x86_64-apple-darwin
            test: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            check: cargo check --workspace --target x86_64-unknown-linux-gnu
            test: cargo test --workspace --target x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            check: cargo check -p loomex-core --target aarch64-unknown-linux-gnu
            test: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            check: cargo check --workspace --target x86_64-pc-windows-msvc
            test: cargo test --workspace --target x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf
      - name: Check workspace
        run: ${{ matrix.check }}
      - name: Test native target
        if: matrix.test != ''
        run: ${{ matrix.test }}
