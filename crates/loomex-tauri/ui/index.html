      const ensureLocalRunnerStarted = async () => {
        const status = state.status || {};
        if (!status.authenticated || !status.bindingId || !status.workspacePath) {
          return status;
        }
        try {
          state.status = await call("runner_start", { request: { profile: null } });
          renderStatus();
          return state.status;
        } catch (error) {
          await refreshStatus().catch(() => {});
          const message = error?.message || String(error);
          if (
            !message.includes("TAURI_BINDING_REQUIRED") &&
            !message.includes("TAURI_WORKSPACE_REQUIRED")
          ) {
            setError("composerError", message);
          }
          return state.status || status;
        }
      };

      const loadWorkflows = async () => {
        const response = await call("workflow_list", { request: { profile: null } });
        state.workflows = response.workflows || [];
        if (!state.selectedWorkflowId && state.workflows.length) {
          state.selectedWorkflowId = state.workflows[0].id;
        }
        await loadWorkflowRunHistory();
        renderWorkflowList();
        renderSelectedWorkflow();
        setRunChrome(null);
        renderWorkflowGraph(null);
      };

      const loadWorkflowRunHistory = async () => {
        const workflowIds = state.workflows.map((workflow) => workflow.id).filter(Boolean);
        const chunkSize = 4;
        for (let index = 0; index < workflowIds.length; index += chunkSize) {
          await Promise.all(
            workflowIds.slice(index, index + chunkSize).map(async (workflowId) => {
              try {
                const response = await call("workflow_run_list", {
                  request: {
                    profile: null,
                    workflowId,
                    limit: 12,
                  },
                });
                const executions = response?.result?.executions || [];
                const backendRuns = executions
                  .map((execution) => runFromExecution(execution, workflowId))
                  .filter(Boolean);
                replaceRunsForWorkflow(workflowId, backendRuns);
              } catch {
                /* Keep local run cache when backend history is temporarily unavailable. */
              }
            }),
          );
        }
        saveLocalRuns();
      };

      const closeWorkflowMenu = () => {
        state.workflowMenuId = null;
        const menu = $("workflowMenu");
        menu.classList.remove("open");
        menu.setAttribute("aria-hidden", "true");
      };

      const openWorkflowMenu = (workflowId, anchor) => {
        state.workflowMenuId = workflowId;
        const menu = $("workflowMenu");
        const rect = anchor.getBoundingClientRect();
        menu.style.left = `${Math.max(8, rect.right - 118)}px`;
        menu.style.top = `${rect.bottom + 6}px`;
        menu.classList.add("open");
        menu.setAttribute("aria-hidden", "false");
      };

      const toggleWorkflowCollapsed = (workflowId) => {
        if (state.collapsedWorkflows.has(workflowId)) {
          state.collapsedWorkflows.delete(workflowId);
        } else {
          state.collapsedWorkflows.add(workflowId);
        }
        renderWorkflowList();
      };

      const openRunModal = (workflowId) => {
        const workflow = state.workflows.find((item) => item.id === workflowId);
        state.runModalWorkflowId = workflowId;
        state.runModalWorkspacePath = state.status?.workspacePath || "";
        state.runModalVersion = "";
        state.runModalVersions = [];
        state.runModalActiveVersion = null;
        state.runModalSelectedVersion = null;
        state.runModalInputSchema = null;
        state.runModalInputValues = {};
        state.runModalInputErrors = {};
        state.runModalJsonInput = "{}";
        state.runModalSchemaLoading = true;
        state.runModalSchemaRequest = "";
        $("runModalTitle").textContent = `Run ${workflow ? workflowName(workflow) : "workflow"}`;
        $("runModalSubtitle").textContent = "Choose a workspace and fill the start inputs.";
        $("runWorkspacePath").textContent = state.runModalWorkspacePath || "No workspace selected";
        setError("runModalError", "");
        renderRunVersionControl();
        renderRunModalInputForm();
        $("runModal").classList.add("open");
        $("runModal").setAttribute("aria-hidden", "false");
        if (workflow) loadRunModalInputSchema(workflow);
      };

      const closeRunModal = () => {
        state.runModalWorkflowId = null;
        state.runModalWorkspacePath = "";
        state.runModalVersion = "";
        state.runModalVersions = [];
        state.runModalActiveVersion = null;
        state.runModalSelectedVersion = null;
        state.runModalInputSchema = null;
        state.runModalInputValues = {};
        state.runModalInputErrors = {};
        state.runModalJsonInput = "{}";
        state.runModalSchemaLoading = false;
        state.runModalSchemaRequest = "";
        $("runModal").classList.remove("open");
        $("runModal").setAttribute("aria-hidden", "true");
        setError("runModalError", "");
      };

      const renderWorkflowList = () => {
        const list = $("workflowList");
        list.innerHTML = "";
        if (!state.workflows.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.textContent = "No workflows available";
          list.append(empty);
          return;
        }
        for (const workflow of state.workflows) {
          const block = document.createElement("div");
          block.className = "workflow-block";
          block.classList.toggle("collapsed", state.collapsedWorkflows.has(workflow.id));

          const item = document.createElement("div");
          item.className = "workflow-item";
          item.dataset.workflowId = workflow.id;
          item.setAttribute("role", "option");
          item.setAttribute("aria-pressed", String(workflow.id === state.selectedWorkflowId));

          const mainButton = document.createElement("button");
          mainButton.type = "button";
          mainButton.className = "workflow-main";
          mainButton.innerHTML = `<span class="workflow-icon">${icons.workflow}</span><span class="workflow-text"><strong></strong><span></span></span><span class="workflow-collapse">${icons.chevron}</span>`;
          mainButton.querySelector("strong").textContent = workflowName(workflow);
          const workflowSubtitle = mainButton.querySelector(".workflow-text span");
          const description = workflow.description && workflow.description !== workflow.id
            ? workflow.description
            : "";
          if (description) {
            workflowSubtitle.textContent = description;
          } else {
            workflowSubtitle.remove();
          }
          mainButton.addEventListener("click", () => selectWorkflow(workflow.id));
          mainButton.querySelector(".workflow-collapse").addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            toggleWorkflowCollapsed(workflow.id);
          });
          item.append(mainButton);

          const actions = document.createElement("div");
          actions.className = "workflow-actions";
          const playButton = document.createElement("button");
          playButton.type = "button";
          playButton.className = "workflow-action";
          playButton.setAttribute("aria-label", `Run ${workflowName(workflow)}`);
          playButton.innerHTML = icons.play;
          playButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            selectWorkflow(workflow.id);
            openRunModal(workflow.id);
          });
          const menuButton = document.createElement("button");
          menuButton.type = "button";
          menuButton.className = "workflow-action";
          menuButton.setAttribute("aria-label", `More actions for ${workflowName(workflow)}`);
          menuButton.innerHTML = icons.more;
          menuButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (state.workflowMenuId === workflow.id && $("workflowMenu").classList.contains("open")) {
              closeWorkflowMenu();
            } else {
              openWorkflowMenu(workflow.id, menuButton);
            }
          });
          actions.append(playButton, menuButton);
          item.append(actions);
          block.append(item);

          const runs = runsForWorkflow(workflow.id).slice(0, 5);
          if (runs.length) {
            const runList = document.createElement("div");
            runList.className = "run-list";
            for (const run of runs) {
              const runButton = document.createElement("button");
              runButton.type = "button";
              runButton.className = "run-item";
              runButton.dataset.workflowId = workflow.id;
              runButton.dataset.executionId = run.executionId;
              runButton.setAttribute("aria-pressed", String(run.executionId === state.selectedRunId));
              const status = cleanStatus(run.status);
              runButton.innerHTML = `<span class="run-dot ${status}"></span><span class="run-text"><span class="run-title"></span><span class="run-meta"></span></span>`;
              runButton.querySelector(".run-title").textContent =
                run.prompt || run.summary || "Workflow run";
              runButton.querySelector(".run-meta").textContent = statusLabel(status);
              runButton.addEventListener("click", () => openRun(workflow.id, run.executionId));
              runList.append(runButton);
            }
            block.append(runList);
          }
          list.append(block);
        }
      };

      const updateWorkflowSelectionState = () => {
        for (const item of $("workflowList").querySelectorAll(".workflow-item")) {
          item.setAttribute("aria-pressed", String(item.dataset.workflowId === state.selectedWorkflowId));
        }
        for (const item of $("workflowList").querySelectorAll(".run-item")) {
          item.setAttribute("aria-pressed", String(item.dataset.executionId === state.selectedRunId));
        }
      };

      const renderSelectedWorkflow = () => {
        const workflow = selectedWorkflow();
        $("selectedWorkflow").textContent = workflow
          ? `/${workflowName(workflow)}`
          : "No workflow selected";
        $("chatTitle").textContent = workflow ? workflowName(workflow) : "Select a workflow";
      };

      const selectWorkflow = (workflowId) => {
        if (state.selectedWorkflowId === workflowId && !state.selectedRunId) return;
        state.selectedWorkflowId = workflowId;
        state.selectedRunId = null;
        state.currentExecution = null;
        state.renderedNodes = new Set();
        state.selectedFiles = [];
        setActiveHumanRequest(null);
        renderMentionChips();
        closeMentionMenu();
        updateWorkflowSelectionState();
        renderSelectedWorkflow();
        renderEmptyState();
        setRunChrome(null);
        renderArtifacts();
        renderWorkflowGraph(null);
      };

      const renderEmptyState = () => {
        $("transcript").innerHTML = "";
        const workflow = selectedWorkflow();
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = "<h1></h1><div class=\"meta\"></div>";
        empty.querySelector("h1").textContent = workflow ? workflowName(workflow) : "Loomex Runner";
        empty.querySelector(".meta").textContent = workflow
          ? "Run this workflow to start local execution."
          : "Choose a workflow from the sidebar.";
        $("transcript").append(empty);
      };

      const clearTranscript = () => {
        $("transcript").innerHTML = "";
        $("nodeRail").innerHTML = "";
        state.renderedNodes = new Set();
        state.completedRuns = new Set();
        state.resolvedHumanRequests = new Set();
        state.currentExecution = null;
      };

      const transcriptAtBottom = (threshold = 80) => {
        const transcript = $("transcript");
        return transcript.scrollHeight - transcript.scrollTop - transcript.clientHeight <= threshold;
      };

      const maybeScrollTranscriptToBottom = (wasAtBottom = transcriptAtBottom()) => {
        if (!wasAtBottom) return;
        const transcript = $("transcript");
        transcript.scrollTop = transcript.scrollHeight;
      };

      const appendMessage = (role, text, meta = "") => {
        const wasAtBottom = transcriptAtBottom();
        const item = document.createElement("article");
        item.className = `message ${role}`;
        const metaEl = document.createElement("div");
        metaEl.className = "message-meta";
        metaEl.textContent = meta || (role === "user" ? "You" : "Loomex");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.dir = "auto";
        bubble.textContent = text;
        item.append(metaEl, bubble);
        $("transcript").append(item);
        maybeScrollTranscriptToBottom(wasAtBottom);
        return { item, metaEl, bubble };
      };

      const aiTraceEventWorthRendering = (event) => {
        const type = String(event?.type || "");
        if (!type.includes("activity.log")) return true;
        const raw = [
          event.title,
          event.message,
          typeof event.content === "string" ? event.content : "",
          typeof event.content?.text === "string" ? event.content.text : "",
          typeof event.payload?.content === "string" ? event.payload.content : "",
          typeof event.payload?.command === "string" ? event.payload.command : "",
        ]
          .filter(Boolean)
          .join("\n")
          .toLowerCase();
        return /(\$\s|ran command|cargo\s|git\s|pnpm\s|npm\s|yarn\s|python\s|ruby\s|kubectl\s|docker\s|read file|file\.read|read a file|write file|file\.write|edited|searched|search files)/.test(raw);
      };

      const runtimeAiEvents = (execution) =>
        (Array.isArray(execution?.events) ? execution.events : [])
          .filter((event) => event && typeof event === "object")
          .filter((event) => String(event.type || event.eventType || "").startsWith("workflow_runtime.ai."))
          .slice()
          .sort((left, right) => {
            const leftTime = timestampMs(left.createdAt || left.created_at || left.timestamp) || 0;
            const rightTime = timestampMs(right.createdAt || right.created_at || right.timestamp) || 0;
            if (leftTime !== rightTime) return leftTime - rightTime;
            return String(left.id || "").localeCompare(String(right.id || ""));
          });

      const aiTraceEvents = (execution) => {
        const trace = execution?.aiTrace || execution?.ai_trace || {};
        const traceEvents = (Array.isArray(trace.events) ? trace.events : [])
          .filter((event) => event && typeof event === "object")
          .filter(aiTraceEventWorthRendering);
        return traceEvents
          .slice()
          .sort((left, right) => {
            const leftTime = timestampMs(left.timestamp || left.createdAt || left.created_at) || 0;
            const rightTime = timestampMs(right.timestamp || right.createdAt || right.created_at) || 0;
            if (leftTime !== rightTime) return leftTime - rightTime;
            return Number(left.sequence || 0) - Number(right.sequence || 0);
          });
      };

      const aiTraceRole = (event) => {
        const role = String(event.role || "").toLowerCase();
        if (role === "person" || role === "assistant") return "assistant";
        if (role === "tool" || String(event.type || "").includes("tool")) return "system";
        if (role === "activity" || String(event.type || "").includes("activity")) return "system";
        return "assistant";
      };

      const aiTraceMeta = (event) => {
        const type = String(event.type || "ai.activity").replace(/^ai\./, "").replace(/[._-]/g, " ");
        const node = event.nodeName || event.nodeKey || "AI";
        return `${node} · ${type}`;
      };

      const aiTraceText = (event) => {
        const title = String(event.title || "").trim();
        const content = summarizeAiTraceContent(event.content);
        if (!title) return content;
        if (!content || content === title) return title;
        return `${title}\n${content}`;
      };

      const renderAiTrace = async (execution, animate = true) => {
        const executionId = execution?.id || execution?.executionId;
          if (!executionId) return;
        for (const event of aiTraceEvents(execution)) {
          const stableEventId = event?.metadata?.runtimeEventId || event.id || event.sequence;
          const key = [
            executionId,
            "aiTrace",
            stableEventId,
            event.sessionRecordId || "",
            event.type || "",
          ].join(":");
          if (state.renderedNodes.has(key)) continue;
          const text = aiTraceText(event);
          if (!text) continue;
          state.renderedNodes.add(key);
          const stepLabel = aiTraceStepLabel(event);
          appendToolLine(
            execution,
            event.nodeKey || "ai",
            event.nodeName || event.nodeKey || "AI",
            stepLabel === "message" ? "reasoning" : stepLabel,
            text,
            String(event.type || "").includes("failed") || String(event.type || "").includes("error") ? "failed" : "running",
          );
        }
      };

      const runtimeAiEventText = (event) => {
        const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
        return summarizeAiTraceContent(payload.content || event.message || "");
      };

      const runtimeAiEventNodeKey = (event) => {
        const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
        return payload.node_key || payload.nodeKey || event.nodeKey || event.node_key || "ai";
      };

      const runtimeAiEventNodeName = (event) => {
        const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
        return payload.node_name || payload.nodeName || payload.node_key || payload.nodeKey || "AI";
      };

      const runtimeAiEventStepLabel = (event) => {
        const type = String(event.type || event.eventType || "");
        const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
        if (payload.stream === "stderr" || type.includes("activity.log")) return "activity";
        if (type.includes("activity.started")) return "starting";
        if (type.includes("activity.failed")) return "failed";
        if (type.includes("message.completed")) return "done";
        if (type.includes("message.delta")) return "message";
        return "activity";
      };

      const renderRuntimeAiEvents = async (execution, animate = true) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return;
        for (const event of runtimeAiEvents(execution)) {
          const type = String(event.type || event.eventType || "");
          const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
          const text = runtimeAiEventText(event);
          if (!text) continue;
          const syntheticTraceEvent = {
            type: type.replace(/^workflow_runtime\./, ""),
            title: payload.title || runtimeAiEventNodeName(event),
            content: text,
            payload,
          };
          if (!aiTraceEventWorthRendering(syntheticTraceEvent)) continue;
          const key = [executionId, "runtimeAi", event.id || event.sequence || type].join(":");
          if (state.renderedNodes.has(key)) continue;
          state.renderedNodes.add(key);
          const stepLabel = runtimeAiEventStepLabel(event);
          await appendNodeStep(
            execution,
            runtimeAiEventNodeKey(event),
            runtimeAiEventNodeName(event),
            stepLabel,
            text,
            {
              status: type.includes("failed") || stepLabel === "failed" ? "failed" : type.includes("completed") ? "done" : "running",
              animate: false,
            },
          );
        }
      };

      const aiTraceStepLabel = (event) => {
        const type = String(event.type || "");
        if (type.includes("reasoning")) return "reasoning";
        if (type.includes("tool")) return "tool";
        if (type.includes("message")) return "message";
        if (type.includes("memory")) return "memory";
        if (type.includes("completed")) return "done";
        return "activity";
      };

      const executionEvents = (execution) =>
        (Array.isArray(execution?.events) ? execution.events : [])
          .filter((event) => event && typeof event === "object")
          .filter((event) => !String(event.type || event.eventType || "").startsWith("workflow_runtime.ai."))
          .slice()
          .sort((left, right) => Number(left.sequence || 0) - Number(right.sequence || 0));

      const eventTitle = (event) =>
        String(event.type || event.eventType || "workflow event")
          .replace(/^workflow_runtime\./, "")
          .replace(/[._-]/g, " ");

      const eventText = (event) => {
        const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
        const type = String(event.type || event.eventType || "");
        const message = String(event.message || "").trim();
        const node = payload.node_name || payload.nodeName || payload.node_key || payload.nodeKey || "";
        const output = payload.outputs || payload.output || null;
        const lines = [message || eventHumanText(type, eventTitle(event))];
        if (node) lines.push(`Node: ${node}`);
        if (output && Object.keys(output).length) {
          const summary = outputSummary(output);
          if (summary) lines.push(String(summary));
        }
        return lines.filter(Boolean).join("\n");
      };

      const eventHumanText = (type, fallback) => {
        if (type.endsWith(".queued")) return "starting...";
        if (type.endsWith(".started")) return "starting...";
        if (type.endsWith(".waiting")) return "waiting";
        if (type.endsWith(".completed")) return "done.";
        if (type.endsWith(".failed")) return "failed.";
        if (type.includes("human") && type.includes("resumed")) return "submitted.";
        if (type.includes("human")) return "human input";
        return fallback;
      };

      const renderExecutionEvents = async (execution, animate = true) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return;
        for (const event of executionEvents(execution)) {
          const type = String(event.type || event.eventType || "");
          if (!type) continue;
          const key = [executionId, "event", event.id || event.sequence || type].join(":");
          if (state.renderedNodes.has(key)) continue;
          state.renderedNodes.add(key);
          const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
          const nodeKey = payload.node_key || payload.nodeKey || event.nodeKey || "workflow";
          const nodeName = payload.node_name || payload.nodeName || payload.node_key || payload.nodeKey || eventTitle(event);
          if (type === "workflow_runtime.node.started") {
            const item = ensureNodeBlock(execution, nodeKey, nodeName);
            item.dataset.nodeStatus = "running";
            item.classList.remove("done", "failed");
            item.querySelector(".node-status").textContent = "running";
            updateNodeWorkSummary(item, execution, nodeKey);
            ensureDurationTimer();
            continue;
          }
          if (type === "workflow_runtime.node.completed" || type === "workflow_runtime.node.failed") {
            const item = ensureNodeBlock(execution, nodeKey, nodeName);
            const failed = type.endsWith(".failed");
            item.dataset.nodeStatus = failed ? "failed" : "done";
            item.classList.toggle("failed", failed);
            item.classList.toggle("done", !failed);
            item.querySelector(".node-status").textContent = failed ? "failed" : "done";
            item.querySelector(".node-working-placeholder")?.remove();
            updateNodeWorkSummary(item, execution, nodeKey);
            updateNodeRail(execution);
            continue;
          }
          const text = eventText(event);
          if (!text) continue;
          await appendNodeStep(
            execution,
            nodeKey,
            nodeName,
            eventStepLabel(type),
            text,
            {
              status: type.includes("failed") ? "failed" : type.includes("completed") ? "done" : "running",
              animate,
            },
          );
        }
      };

      const eventStepLabel = (type) => {
        if (type.endsWith(".started")) return "starting";
        if (type.endsWith(".waiting")) return "waiting";
        if (type.includes("approval.requested")) return "approval";
        if (type.includes("human")) return "human input";
        if (type.endsWith(".completed")) return "done";
        if (type.endsWith(".failed")) return "failed";
        return "activity";
      };

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const autoDir = (element) => {
        if (element) element.dir = "auto";
        return element;
      };

      const shouldReduceMotion = () =>
        window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;

      const typeText = async (element, text) => {
        const value = String(text || "");
        if (!value || shouldReduceMotion()) {
          element.textContent = value;
          return;
        }
        element.textContent = "";
        const chunkSize = value.length > 480 ? 12 : 4;
        for (let index = 0; index < value.length; index += chunkSize) {
          const wasAtBottom = transcriptAtBottom();
          element.textContent += value.slice(index, index + chunkSize);
          maybeScrollTranscriptToBottom(wasAtBottom);
          await sleep(12);
        }
      };

      const compactText = (text, maxLength = 520) => {
        const value = String(text || "").replace(/\r\n/g, "\n").trim();
        if (value.length <= maxLength) return value;
        return `${value.slice(0, maxLength).trimEnd()}\n...`;
      };

      const isTechnicalStep = (stepLabel) =>
        [
          "activity",
          "starting",
          "done",
          "waiting",
          "failed",
          "tool",
          "reasoning",
          "memory",
          "approval",
          "human input",
        ].includes(String(stepLabel || "").toLowerCase());

      const technicalNodeKeys = new Set(["runner", "review_gate"]);

      const isTechnicalNodeOutput = (key, stepLabel) =>
        technicalNodeKeys.has(String(key || "")) &&
        String(stepLabel || "").toLowerCase() === "output";

      const isUserVisibleStep = (stepLabel, key) => {
        const label = String(stepLabel || "").toLowerCase();
        if (technicalNodeKeys.has(String(key || ""))) return false;
        if (label === "output") return true;
        return false;
      };

      const toolKindForStep = (stepLabel, text = "") => {
        const label = String(stepLabel || "").toLowerCase();
        const value = String(text || "").toLowerCase();
        if (label.includes("tool") || value.includes("ran command") || value.includes("$ ") || value.includes("cargo ") || value.includes("git ")) return "command";
        if (label.includes("read") || value.includes("read file") || value.includes("file.read") || value.includes("read a file")) return "read";
        if (label.includes("write") || value.includes("edit") || value.includes("write file") || value.includes("file.write") || value.includes("wrote") || value.includes("changed files")) return "write";
        if (label.includes("search") || value.includes("search") || value.includes("searched")) return "search";
        return label.includes("reasoning") ? "reasoning" : "activity";
      };

      const toolKindLabel = (kind, count = 1) => {
        const plural = count === 1 ? "" : "s";
        if (kind === "command") return `Ran ${count} command${plural}`;
        if (kind === "read") return `Read ${count} file${plural}`;
        if (kind === "write") return count === 1 ? "Edited a file" : `Edited ${count} files`;
        if (kind === "search") return count === 1 ? "Searched files" : `Searched files ${count} times`;
        if (kind === "reasoning") return `Reasoning`;
        return count === 1 ? "Activity" : `${count} activities`;
      };

      const toolIcon = (kind) => {
        if (kind === "command") return icons.terminal;
        if (kind === "search") return icons.search;
        if (kind === "read") return icons.fileRead;
        if (kind === "write") return icons.fileWrite;
        return icons.terminal;
      };

      const stepSummaryTitle = (stepLabel, text) => {
        const label = String(stepLabel || "activity").trim();
        const firstLine = String(text || "").split("\n").map((line) => line.trim()).find(Boolean);
        if (!firstLine) return label;
        if (label === "tool") return firstLine.length > 96 ? `${firstLine.slice(0, 96)}...` : firstLine;
        if (label === "activity" || label === "starting" || label === "done") {
          return firstLine.length > 88 ? `${firstLine.slice(0, 88)}...` : firstLine;
        }
        return label;
      };

      const toolBucketId = (executionId, key, kind) => `${executionId}:${key}:tools:${kind}`;

      const nodeOrderFromExecution = (execution) => {
        const order = [];
        const push = (key) => {
          const value = String(key || "").trim();
          if (value && !order.includes(value)) order.push(value);
        };
        ["runner", "start"].forEach(push);
        for (const event of executionEvents(execution)) {
          const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
          push(payload.node_key || payload.nodeKey || event.nodeKey);
        }
        for (const event of aiTraceEvents(execution)) push(event.nodeKey);
        Object.keys(execution.output?.nodeOutputs || execution.outputs?.nodeOutputs || {}).forEach(push);
        ["end"].forEach(push);
        return order;
      };

      const timestampMs = (value) => {
        const time = Date.parse(value || "");
        return Number.isFinite(time) ? time : null;
      };

      const eventNodeKey = (event = {}) => {
        const payload = event.payload && typeof event.payload === "object" ? event.payload : {};
        return String(payload.node_key || payload.nodeKey || event.nodeKey || event.node_key || "");
      };

      const eventTime = (event = {}) =>
        timestampMs(event.createdAt || event.created_at || event.timestamp || event.time);

      const nodeLifecycleTimes = (execution, key) => {
        const nodeKey = String(key || "");
        let started = null;
        let finished = null;
        for (const event of executionEvents(execution)) {
          if (eventNodeKey(event) !== nodeKey) continue;
          const type = String(event.type || event.eventType || "");
          const time = eventTime(event);
          if (!time) continue;
          if (type.endsWith(".started")) started = started ? Math.min(started, time) : time;
          if (type.endsWith(".completed") || type.endsWith(".failed") || type.endsWith(".waiting")) {
            finished = finished ? Math.max(finished, time) : time;
          }
        }
        for (const event of runtimeAiEvents(execution)) {
          if (runtimeAiEventNodeKey(event) !== nodeKey) continue;
          const time = eventTime(event);
          if (time) started = started ? Math.min(started, time) : time;
        }
        for (const event of aiTraceEvents(execution)) {
          if (String(event.nodeKey || "") !== nodeKey) continue;
          const time = timestampMs(event.createdAt || event.created_at || event.timestamp || event.time);
          if (!time) continue;
          started = started ? Math.min(started, time) : time;
          finished = finished ? Math.max(finished, time) : time;
        }
        return { started, finished };
      };

      const nodeDurationText = (execution, key) => {
        const executionId = execution?.id || execution?.executionId || "execution";
        const item = document.querySelector(`[data-node-run="${executionId}:${key}"]`);
        const running = String(item?.dataset.nodeStatus || "") === "running";
        const { started, finished } = nodeLifecycleTimes(execution, key);
        if (started) {
          const duration = formatDuration((running ? Date.now() : finished || Date.now()) - started);
          if (duration) return `${running ? "Working" : "Worked"} for ${duration}`;
        }
        return running ? "Working" : "Worked";
      };

      const updateNodeWorkSummary = (item, execution, key) => {
        const details = item.querySelector(".node-work-details");
        const summary = item.querySelector(".node-work-summary");
        if (!details || !summary) return;
        summary.textContent = nodeDurationText(execution, key);
        details.open = String(item.dataset.nodeStatus || "") === "running";
      };

      const updateLiveDurations = () => {
        const execution = state.currentExecution;
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return;
        for (const item of document.querySelectorAll(`[data-node-run^="${executionId}:"]`)) {
          if (String(item.dataset.nodeStatus || "") === "running") {
            updateNodeWorkSummary(item, execution, item.dataset.nodeKey || "");
          }
        }
      };

      const ensureDurationTimer = () => {
        if (state.durationTimer) return;
        state.durationTimer = window.setInterval(updateLiveDurations, 1000);
      };

      const ensureTraceNode = (execution, key, label) => {
        const item = ensureNodeBlock(execution, key, label);
        updateNodeWorkSummary(item, execution, key);
        return item.querySelector(".node-work-body");
      };

      const ensureToolBucket = (execution, key, label, kind) => {
        const executionId = execution?.id || execution?.executionId || "execution";
        const bucketId = toolBucketId(executionId, key, kind);
        let bucket = document.querySelector(`[data-tool-bucket="${bucketId}"]`);
        if (bucket) return bucket;
        bucket = document.createElement("details");
        bucket.className = "tool-summary-line";
        bucket.dataset.toolBucket = bucketId;
        bucket.dataset.toolCount = "0";
        bucket.dataset.toolKind = kind;
        bucket.dataset.nodeKey = key;
        bucket.dataset.executionId = executionId;
        bucket.innerHTML = `
          <summary class="tool-summary-head">
            <span class="tool-summary-icon">${toolIcon(kind)}</span>
            <span class="tool-summary-title"></span>
            <span class="tool-summary-detail"></span>
            <span class="tool-summary-chevron">${icons.chevron}</span>
          </summary>
          <div class="tool-summary-body"></div>
        `;
        bucket.querySelector(".tool-summary-title").textContent = toolKindLabel(kind, 0);
        bucket.querySelector(".tool-summary-detail").textContent = "";
        const traceNode = ensureTraceNode(execution, key, label);
        const wasAtBottom = transcriptAtBottom();
        (traceNode || $("transcript")).append(bucket);
        maybeScrollTranscriptToBottom(wasAtBottom);
        return bucket;
      };

      const appendToolLine = (execution, key, label, stepLabel, text, status = "running") => {
        const kind = toolKindForStep(stepLabel, text);
        if (kind === "activity" && !["failed", "waiting"].includes(String(stepLabel || "").toLowerCase())) {
          return null;
        }
        const entryText = compactText(toolEntryText(kind, text, label || nodeLabel(key)), 1200);
        if (!entryText) return null;
        const bucket = ensureToolBucket(execution, key, label, kind);
        if (!bucket) return null;
        const count = Number(bucket.dataset.toolCount || "0") + 1;
        bucket.dataset.toolCount = String(count);
        bucket.querySelector(".tool-summary-title").textContent = toolKindLabel(kind, count);
        bucket.classList.toggle("failed", status === "failed");
        const body = bucket.querySelector(".tool-summary-body");
        const entry = document.createElement("div");
        entry.dir = "auto";
        entry.textContent = entryText;
        const wasAtBottom = transcriptAtBottom();
        body.append(entry);
        if (status === "failed") bucket.open = true;
        maybeScrollTranscriptToBottom(wasAtBottom);
        return bucket;
      };

      const basename = (path) =>
        String(path || "")
          .split(/[\\/]/)
          .filter(Boolean)
          .pop() || String(path || "");

      const firstUsefulLine = (text) =>
        String(text || "")
          .split("\n")
          .map((line) => line.trim())
          .find(Boolean) || "";

      const commandFromText = (text) => {
        const lines = String(text || "").split("\n").map((line) => line.trim()).filter(Boolean);
        const shellLine = lines.find((line) => line.startsWith("$ "));
        if (shellLine) return shellLine.slice(2).trim();
        const ranLine = lines.find((line) => /^ran\s+/i.test(line));
        if (ranLine) return ranLine.replace(/^ran\s+/i, "").trim();
        return lines.find((line) => /^(cargo|git|node|pnpm|npm|yarn|python|ruby|kubectl|docker)\b/.test(line)) || "";
      };

      const fileFromText = (text) => {
        const value = String(text || "");
        const explicit =
          value.match(/(?:read|edited|wrote|write|file)\s+([^\s,;:]+(?:\.[A-Za-z0-9_-]+)?)/i)?.[1] ||
          value.match(/([A-Za-z0-9_.-]+\/[A-Za-z0-9_./-]+\.[A-Za-z0-9_-]+)/)?.[1] ||
          value.match(/\b([A-Za-z0-9_.-]+\.[A-Za-z0-9_-]+)\b/)?.[1];
        return explicit ? basename(explicit) : "";
      };

      const sameLooseText = (left, right) =>
        String(left || "").trim().toLowerCase().replace(/[_\s-]+/g, " ") ===
        String(right || "").trim().toLowerCase().replace(/[_\s-]+/g, " ");

      const toolEntryText = (kind, text, label = "") => {
        const value = String(text || "").trim();
        const firstLine = firstUsefulLine(value);
        if (sameLooseText(firstLine, label)) return "";
        if (kind === "command") {
          const command = commandFromText(value);
          return command ? `Ran ${command}` : "";
        }
        if (kind === "read") {
          const file = fileFromText(value);
          return file ? `Read ${file}` : compactText(firstLine || value, 240);
        }
        if (kind === "write") {
          const file = fileFromText(value);
          return file ? `Edited ${file}` : compactText(firstLine || value, 240);
        }
        if (kind === "search") {
          return firstLine ? firstLine.replace(/^searched\s+/i, "Searched ") : compactText(value, 240);
        }
        return compactText(value, 360);
      };

      const moveToolBucketsToRunDuration = (execution) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId || state.completedRuns.has(executionId)) return;
        const details = document.querySelector(`[data-run-duration="${executionId}"]`);
        const body = details?.querySelector(".run-duration-body");
        if (!body) return;
        const buckets = Array.from(document.querySelectorAll(`[data-execution-id="${executionId}"].tool-summary-line`));
        for (const bucket of buckets) body.append(bucket);
        state.completedRuns.add(executionId);
      };

      const formatDuration = (milliseconds) => {
        if (!Number.isFinite(milliseconds) || milliseconds < 0) return "";
        const totalSeconds = Math.max(1, Math.round(milliseconds / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        if (minutes <= 0) return `${seconds}s`;
        return `${minutes}m ${seconds}s`;
      };

      const executionDurationText = (execution, terminal = false) => {
        const started = Date.parse(execution.startedAt || execution.createdAt || "");
        const finished = terminal
          ? Date.parse(execution.finishedAt || execution.completedAt || execution.updatedAt || "")
          : Date.now();
        const duration = formatDuration(finished - started);
        if (!duration) return "";
        return `${terminal ? "Worked" : "Working"} for ${duration}`;
      };

      const appendRunDuration = (execution) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return;
        for (const item of document.querySelectorAll(`[data-node-run^="${executionId}:"]`)) {
          updateNodeWorkSummary(item, execution, item.dataset.nodeKey || "");
        }
      };

      const formatJsonish = (value) => {
        if (value === null || value === undefined || value === "") return "";
        if (typeof value === "string") {
          try {
            return JSON.stringify(JSON.parse(value), null, 2);
          } catch {
            return value.trim();
          }
        }
        return JSON.stringify(value, null, 2);
      };

      const isRecord = (value) =>
        Boolean(value) && typeof value === "object" && !Array.isArray(value);

      const formatFieldLabel = (field) =>
        String(field || "answer")
          .replace(/[_-]/g, " ")
          .replace(/\b\w/g, (char) => char.toUpperCase());

      const tryParseJsonObject = (value) => {
        if (typeof value !== "string") return null;
        const trimmed = value.trim();
        if (!trimmed || !trimmed.startsWith("{")) return null;
        try {
          const parsed = JSON.parse(trimmed);
          return isRecord(parsed) ? parsed : null;
        } catch {
          return null;
        }
      };

      const summarizeAiTraceContent = (value) => {
        const parsed = tryParseJsonObject(value);
        if (parsed) return outputSummary(parsed);
        return String(value || "").trim();
      };

      const schemaFieldType = (definition = {}) => {
        const type = definition?.type;
        if (Array.isArray(type)) {
          return type.find((item) => item !== "null") || "string";
        }
        if (!type && Array.isArray(definition?.enum)) return "string";
        return type || "string";
      };

      const schemaProperties = (definition = {}) =>
        isRecord(definition?.properties) ? definition.properties : {};

      const optionValue = (option) => {
        if (isRecord(option)) {
          if (option.value !== undefined) return option.value;
          if (option.id !== undefined) return option.id;
          if (option.key !== undefined) return option.key;
          if (option.label !== undefined) return option.label;
        }
        return option;
      };

      const optionLabel = (option) => {
        if (isRecord(option)) {
          return String(option.label || option.name || option.title || option.value || option.id || option.key || "");
        }
        return String(option);
      };

      const normalizeOptions = (options) =>
        Array.isArray(options)
          ? options
              .map((option) => ({ label: optionLabel(option), value: optionValue(option) }))
              .filter((option) => option.label !== "" || option.value !== undefined)
          : [];

      const schemaOptions = (definition = {}) => {
        const enumOptions = normalizeOptions(definition.enum);
        if (enumOptions.length) return enumOptions;
        for (const key of ["oneOf", "anyOf"]) {
          const options = normalizeOptions(
            Array.isArray(definition[key])
              ? definition[key].map((option) =>
                  isRecord(option)
                    ? {
                        label: option.title || option.label || option.const || option.enum?.[0],
                        value: option.const ?? option.value ?? option.enum?.[0],
                      }
                    : option,
                )
              : [],
          );
          if (options.length) return options;
        }
        return [];
      };

      const requestOptions = (request = {}) =>
        normalizeOptions(
          request.options ||
            request.choices ||
            request.outputOptions ||
            request.output_options ||
            request.config?.options ||
            request.config?.choices,
        );

      const schemaFromHumanRequest = (request = {}) => {
        const explicit =
          request.outputSchema ||
          request.output_schema ||
          request.answerSchema ||
          request.answer_schema ||
          request.schema;
        if (isRecord(explicit)) return explicit;

        const options = requestOptions(request);
        if (options.length) {
          return { type: "string", enum: options.map((option) => option.value) };
        }

        const rawType = String(
          request.inputType ||
            request.input_type ||
            request.answerType ||
            request.answer_type ||
            request.valueType ||
            request.value_type ||
            "",
        ).toLowerCase();
        if (["text", "textarea", "string", "options", "option"].includes(rawType)) {
          return { type: "string" };
        }
        if (["bool", "boolean"].includes(rawType)) return { type: "boolean" };
        if (["int", "integer"].includes(rawType)) return { type: "integer" };
        if (["number", "float"].includes(rawType)) return { type: "number" };
        return null;
      };

      const defaultFieldValue = (definition = {}) => {
        if (definition.default !== undefined) return definition.default;
        const options = schemaOptions(definition);
        if (options.length === 1) return options[0].value;
        const type = schemaFieldType(definition);
        if (type === "array") return [];
        if (type === "object") {
          return Object.fromEntries(
            Object.entries(schemaProperties(definition)).map(([field, child]) => [
              field,
              defaultFieldValue(child),
            ]),
          );
        }
        return "";
      };

      const responseAnswer = (answer) => {
        if (!answer) return {};
        if (typeof answer === "string") {
          try {
            const parsed = JSON.parse(answer);
            return isRecord(parsed) ? parsed : { value: parsed };
          } catch {
            return { value: answer };
          }
        }
        return isRecord(answer) ? answer : { value: answer };
      };

      const isPendingHumanRequest = (request) => {
        if (!request) return false;
        const status = rawStatus(request.status || "pending");
        return !status || ["pending", "in_review", "waiting"].includes(status);
      };

      const humanRequestKey = (request, execution = {}) => {
        const requestId = request?.id || request?.requestId || request?.request_id;
        if (!requestId) return "";
        const executionId =
          request?.executionId ||
          request?.execution_id ||
          request?.execution?.id ||
          execution?.id ||
          execution?.executionId ||
          "";
        return `${executionId || "execution"}:${requestId}`;
      };

      const normalizeHumanRequest = (raw, execution = {}, fallbackWorkflowId = "") => {
        if (!isRecord(raw)) return null;
        const request =
          (isRecord(raw.humanRequest) && raw.humanRequest) ||
          (isRecord(raw.human_request) && raw.human_request) ||
          (isRecord(raw.request) && raw.request) ||
          raw;
        if (!isRecord(request)) return null;
        const id =
          request.id ||
          request.requestId ||
          request.request_id ||
          request.humanRequestId ||
          request.human_request_id;
        if (!id) return null;
        const normalized = {
          ...request,
          id: String(id),
          status: String(request.status || raw.status || "pending"),
          title: String(
            request.question ||
              request.title ||
              request.preview?.title ||
              request.node?.name ||
              "Human input required",
          ),
          description: String(
            request.context?.summary ||
              request.description ||
              request.summary ||
              request.preview?.description ||
              "",
          ),
          question: String(request.question || request.title || "Human input required"),
          workflowId: String(
            request.workflow?.id ||
              request.workflowId ||
              request.workflow_id ||
              execution.workflowId ||
              execution.workflow_id ||
              fallbackWorkflowId ||
              "",
          ),
          workflowName: String(
            request.workflow?.name ||
              request.workflowName ||
              request.workflow_name ||
              workflowName(selectedWorkflow()),
          ),
          executionId: String(
            request.execution?.id ||
              request.executionId ||
              request.execution_id ||
              execution.id ||
              execution.executionId ||
              "",
          ),
          outputSchema: schemaFromHumanRequest(request),
          reviewInput: request.reviewInput || request.review_input || null,
          answer: responseAnswer(request.answer),
          options: requestOptions(request),
          blocking: Boolean(request.blocking),
        };
        return isPendingHumanRequest(normalized) ? normalized : null;
      };

      const humanFieldSpecs = (request = state.pendingHumanRequest) => {
        if (!request) return [];
        const schema = request.outputSchema;
        const properties = schemaProperties(schema || {});
        const required = Array.isArray(schema?.required) ? schema.required.map(String) : [];
        if (Object.keys(properties).length) {
          return Object.entries(properties).map(([key, definition]) => ({
            key,
            definition,
            required: required.includes(key),
            scalarRoot: false,
            jsonFallback: false,
          }));
        }
        if (schema && schemaFieldType(schema) === "object") {
          return [
            {
              key: "__json",
              definition: {
                title: request.question || request.title || "Answer JSON",
                description: request.description || "Stored as the human answer for this workflow step.",
                ...schema,
              },
              required: true,
              scalarRoot: false,
              jsonFallback: true,
            },
          ];
        }
        if (schema) {
          return [
            {
              key: "value",
              definition: {
                title: request.question || request.title || "Answer",
                description: request.description || "",
                ...schema,
                enum: schema.enum || request.options?.map((option) => option.value),
              },
              required: true,
              scalarRoot: true,
              jsonFallback: false,
            },
          ];
        }
        return [
          {
            key: "__json",
            definition: {
              type: "object",
              title: "Answer JSON",
              description: "Stored as the human answer for this workflow step.",
            },
            required: true,
            scalarRoot: false,
            jsonFallback: true,
          },
        ];
      };

      const hydrateHumanResponse = (request) => {
        const answer = responseAnswer(request?.answer);
        const response = {};
        for (const spec of humanFieldSpecs(request)) {
          if (spec.jsonFallback) continue;
          response[spec.key] =
            answer[spec.key] !== undefined
              ? answer[spec.key]
              : spec.scalarRoot && answer.value !== undefined
              ? answer.value
              : defaultFieldValue(spec.definition);
        }
        state.humanResponse = response;
        state.humanJsonResponse = JSON.stringify(answer && Object.keys(answer).length ? answer : {}, null, 2);
        state.humanSubmitError = "";
      };

      const setActiveHumanRequest = (request) => {
        const currentId = state.pendingHumanRequest?.id || null;
        const nextId = request?.id || null;
        if (!request) {
          state.pendingHumanRequest = null;
          state.humanResponse = {};
          state.humanJsonResponse = "{}";
          state.humanSubmitError = "";
          state.humanComposerSignature = "";
          renderHumanInputComposer();
          return;
        }
        const currentSchema = JSON.stringify(state.pendingHumanRequest?.outputSchema || null);
        const nextSchema = JSON.stringify(request.outputSchema || null);
        const shouldRebuild = currentId !== nextId || currentSchema !== nextSchema;
        state.pendingHumanRequest = request;
        if (shouldRebuild) {
          hydrateHumanResponse(request);
        }
        renderHumanInputComposer({ rebuildFields: shouldRebuild });
      };

      const humanReviewContextRows = (request) => {
        const rows = [];
        if (request.executionId) rows.push(["Execution", shortenId(request.executionId)]);
        if (request.workflowName) rows.push(["Workflow", request.workflowName]);
        const reviewInput = request.reviewInput;
        const nodeInput = isRecord(reviewInput?.nodeInput) ? reviewInput.nodeInput : null;
        if (nodeInput) {
          Object.entries(nodeInput)
            .slice(0, 3)
            .forEach(([key, value]) => rows.push([formatFieldLabel(key), formatHumanPreview(value)]));
        }
        return rows;
      };

      const formatHumanPreview = (value) => {
        if (value === null || value === undefined || value === "") return "Empty";
        if (typeof value === "string") return value.length > 120 ? `${value.slice(0, 120)}...` : value;
        if (typeof value === "number" || typeof value === "boolean") return String(value);
        if (Array.isArray(value)) return `${value.length} item${value.length === 1 ? "" : "s"}`;
        if (isRecord(value)) return `${Object.keys(value).length} field${Object.keys(value).length === 1 ? "" : "s"}`;
        return String(value);
      };

      const setHumanFieldValue = (field, value, rerender = false) => {
        state.humanResponse = { ...state.humanResponse, [field]: value };
        state.humanSubmitError = "";
        if (rerender) renderHumanInputComposer();
        else $("humanInputError").textContent = "";
      };

      const renderHumanControl = (container, spec) => {
        const definition = spec.definition || {};
        const type = schemaFieldType(definition);
        const options = schemaOptions(definition);
        const value = state.humanResponse[spec.key];

        if (spec.jsonFallback || type === "object" || type === "array") {
          const textarea = document.createElement("textarea");
          textarea.className = "human-json";
          textarea.dir = "auto";
          textarea.spellcheck = false;
          textarea.dataset.humanJson = spec.key;
          textarea.value = spec.jsonFallback
            ? state.humanJsonResponse
            : typeof value === "string"
            ? value
            : JSON.stringify(value ?? defaultFieldValue(definition), null, 2);
          textarea.addEventListener("input", () => {
            state.humanSubmitError = "";
            $("humanInputError").textContent = "";
            if (spec.jsonFallback) state.humanJsonResponse = textarea.value;
            else state.humanResponse = { ...state.humanResponse, [spec.key]: textarea.value };
          });
          container.append(textarea);
          return;
        }

        if (options.length) {
          if (options.length > 6) {
            const select = document.createElement("select");
            select.dataset.humanField = spec.key;
            select.value = value ?? "";
            const empty = document.createElement("option");
            empty.value = "";
            empty.textContent = "Choose an option";
            select.append(empty);
            options.forEach((option) => {
              const item = document.createElement("option");
              item.value = String(option.value);
              item.textContent = option.label;
              select.append(item);
            });
            select.addEventListener("change", () => setHumanFieldValue(spec.key, select.value));
            container.append(select);
            return;
          }
          const grid = document.createElement("div");
          grid.className = "human-choice-grid";
          options.forEach((option) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "human-choice";
            button.setAttribute("aria-pressed", String(value === option.value || String(value) === String(option.value)));
            button.textContent = option.label;
            button.addEventListener("click", () => setHumanFieldValue(spec.key, option.value, true));
            grid.append(button);
          });
          container.append(grid);
          return;
        }

        if (type === "boolean") {
          const grid = document.createElement("div");
          grid.className = "human-choice-grid";
          [
            [true, ["approved", "is_approved"].includes(spec.key) ? "Approve" : "Yes"],
            [false, ["approved", "is_approved"].includes(spec.key) ? "Reject" : "No"],
          ].forEach(([nextValue, label]) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "human-choice";
            button.setAttribute("aria-pressed", String(value === nextValue));
            button.textContent = label;
            button.addEventListener("click", () => setHumanFieldValue(spec.key, nextValue, true));
            grid.append(button);
          });
          container.append(grid);
          return;
        }

        if (type === "integer" || type === "number") {
          const input = document.createElement("input");
          input.type = "number";
          input.step = type === "integer" ? "1" : "any";
          input.dataset.humanField = spec.key;
          input.value = value ?? "";
          input.addEventListener("input", () => {
            setHumanFieldValue(spec.key, input.value === "" ? "" : Number(input.value));
          });
          container.append(input);
          return;
        }

        const textarea = document.createElement("textarea");
        textarea.dir = "auto";
        textarea.dataset.humanField = spec.key;
        textarea.value = value ?? "";
        textarea.placeholder = "Type your response...";
        textarea.addEventListener("input", () => setHumanFieldValue(spec.key, textarea.value));
        container.append(textarea);
      };

      const renderHumanInputComposer = ({ rebuildFields = false } = {}) => {
        const wrap = document.querySelector(".composer-wrap");
        const form = $("composerForm");
        const card = $("humanInputCard");
        const request = state.pendingHumanRequest;
        wrap?.classList.toggle("hidden", !request);
        form.classList.toggle("human-mode", Boolean(request));
        card.classList.toggle("hidden", !request);
        if (!request) {
          state.humanComposerSignature = "";
          return;
        }

        $("humanInputTitle").textContent = request.question || request.title || "Human input required";
        $("humanInputTitle").dir = "auto";
        $("humanInputDescription").textContent =
          request.description || "This workflow is paused until you submit a response.";
        $("humanInputDescription").dir = "auto";
        $("humanInputBadge").textContent = request.blocking ? "Blocking" : "Waiting";
        $("humanInputSubmit").disabled = state.humanResolving;
        $("humanInputSubmit").textContent = state.humanResolving ? "Submitting..." : "Submit & resume";
        $("humanInputError").textContent = state.humanSubmitError || "";

        const signature = JSON.stringify({
          id: request.id || "",
          schema: request.outputSchema || null,
          context: humanReviewContextRows(request),
          response: state.humanResponse,
        });
        const shouldRebuildFields = rebuildFields || state.humanComposerSignature !== signature;
        if (!shouldRebuildFields) return;
        state.humanComposerSignature = signature;
        const active = document.activeElement;
        const activeName = active?.dataset?.humanField || active?.dataset?.humanJson || "";
        const selection =
          active && typeof active.selectionStart === "number"
            ? { start: active.selectionStart, end: active.selectionEnd }
            : null;
        const context = $("humanInputContext");
        context.innerHTML = "";
        humanReviewContextRows(request).forEach(([label, value]) => {
          const row = document.createElement("div");
          row.className = "human-context-row";
          row.innerHTML = "<strong></strong><span></span>";
          row.querySelector("strong").textContent = label;
          const valueEl = row.querySelector("span");
          valueEl.dir = "auto";
          valueEl.textContent = value;
          context.append(row);
        });
        const fields = $("humanInputFields");
        fields.innerHTML = "";
        for (const spec of humanFieldSpecs(request)) {
          const field = document.createElement("div");
          field.className = "human-field";
          const label = spec.definition?.title || formatFieldLabel(spec.key === "value" ? "Answer" : spec.key);
          const description = spec.definition?.description || "";
          field.innerHTML = `
            <div class="human-field-head">
              <div class="human-field-label">
                <strong></strong>
                <span></span>
              </div>
              <span class="human-field-type"></span>
            </div>
          `;
          field.querySelector("strong").textContent = `${label}${spec.required ? " *" : ""}`;
          const descriptionEl = field.querySelector(".human-field-label span");
          descriptionEl.dir = "auto";
          descriptionEl.textContent = description;
          field.querySelector(".human-field-label span").classList.toggle("hidden", !description);
          field.querySelector(".human-field-type").textContent = spec.jsonFallback
            ? "json"
            : schemaOptions(spec.definition).length
            ? "options"
            : schemaFieldType(spec.definition);
          renderHumanControl(field, spec);
          fields.append(field);
        }
        if (activeName) {
          const nextActive = Array.from(fields.querySelectorAll("[data-human-field], [data-human-json]")).find(
            (item) => item.dataset.humanField === activeName || item.dataset.humanJson === activeName,
          );
          if (nextActive) {
            nextActive.focus({ preventScroll: true });
            if (selection && typeof nextActive.setSelectionRange === "function") {
              nextActive.setSelectionRange(selection.start, selection.end);
            }
          }
        }
      };

      const parseHumanJsonField = (value, fallback) => {
        if (typeof value !== "string") return value;
        try {
          return JSON.parse(value || fallback);
        } catch {
          throw new Error("JSON response is invalid.");
        }
      };

      const isEmptyHumanValue = (value) =>
        value === undefined ||
        value === null ||
        value === "" ||
        (Array.isArray(value) && value.length === 0);

      const coerceHumanValue = (spec, value) => {
        const type = schemaFieldType(spec.definition);
        if (spec.jsonFallback) {
          const parsed = parseHumanJsonField(state.humanJsonResponse.trim(), "{}");
          if (!isRecord(parsed)) throw new Error("Response must be a JSON object.");
          return parsed;
        }
        if (type === "object") {
          const parsed = parseHumanJsonField(value, "{}");
          if (!isRecord(parsed)) throw new Error(`${formatFieldLabel(spec.key)} must be an object.`);
          return parsed;
        }
        if (type === "array") {
          const parsed = parseHumanJsonField(value, "[]");
          if (!Array.isArray(parsed)) throw new Error(`${formatFieldLabel(spec.key)} must be an array.`);
          return parsed;
        }
        if (type === "integer") {
          const number = Number(value);
          if (!Number.isInteger(number)) throw new Error(`${formatFieldLabel(spec.key)} must be an integer.`);
          return number;
        }
        if (type === "number") {
          const number = Number(value);
          if (!Number.isFinite(number)) throw new Error(`${formatFieldLabel(spec.key)} must be a number.`);
          return number;
        }
        if (type === "boolean") {
          if (typeof value !== "boolean") throw new Error(`${formatFieldLabel(spec.key)} must be Yes or No.`);
          return value;
        }
        return String(value ?? "");
      };

      const buildHumanAnswer = () => {
        const specs = humanFieldSpecs();
        if (!specs.length) return {};
        const answer = {};
        for (const spec of specs) {
          if (spec.jsonFallback) return coerceHumanValue(spec, state.humanJsonResponse);
          const value = state.humanResponse[spec.key];
          if (spec.required && isEmptyHumanValue(value)) {
            throw new Error(`${formatFieldLabel(spec.key === "value" ? "answer" : spec.key)} is required.`);
          }
          if (!spec.required && isEmptyHumanValue(value)) continue;
          const coerced = coerceHumanValue(spec, value);
          if (spec.scalarRoot) return { value: coerced };
          answer[spec.key] = coerced;
        }
        return answer;
      };

      const updateHumanRequestForExecution = async (execution, workflowId) => {
        if (!isHumanWaitingStatus(execution?.status)) {
          setActiveHumanRequest(null);
          return null;
        }
        const directRequest = normalizeHumanRequest(
          execution?.humanRequest || execution?.human_request,
          execution,
          workflowId,
        );
        if (directRequest && !state.resolvedHumanRequests.has(humanRequestKey(directRequest, execution))) {
          setActiveHumanRequest(directRequest);
          return directRequest;
        }
        const executionId = execution?.id || execution?.executionId;
        if (!workflowId || !executionId) {
          setActiveHumanRequest(null);
          return null;
        }
        try {
          const response = await call("human_request_list", {
            request: { profile: null, workflowId, executionId },
          });
          const request = (response.humanRequests || response.human_requests || [])
            .map((item) => normalizeHumanRequest(item, execution, workflowId))
            .filter((item) => item && !state.resolvedHumanRequests.has(humanRequestKey(item, execution)))
            .find(Boolean);
          setActiveHumanRequest(request || null);
          return request || null;
        } catch {
          setActiveHumanRequest(null);
          return null;
        }
      };

      const resolveHumanInput = async () => {
        const request = state.pendingHumanRequest;
        if (!request || state.humanResolving) return;
        let answer;
        try {
          answer = buildHumanAnswer();
        } catch (error) {
          state.humanSubmitError = error.message;
          renderHumanInputComposer();
          return;
        }
        state.humanResolving = true;
        state.humanSubmitError = "";
        renderHumanInputComposer();
        const currentExecutionId = request.executionId || state.selectedRunId;
        if (currentExecutionId) {
          void pollExecution(currentExecutionId);
        }
        try {
          const response = await call("human_request_resolve", {
            request: {
              profile: null,
              requestId: request.id,
              action: "submit",
              answer,
            },
          });
          appendMessage("system", "Human response submitted. Resuming workflow...", "Human input");
          state.resolvedHumanRequests.add(humanRequestKey(request));
          setActiveHumanRequest(null);
          const executionId = response?.result?.executionId || currentExecutionId;
          if (executionId) {
            const detail = await call("workflow_run_detail", {
              request: { profile: null, executionId },
            });
            const execution = {
              ...executionFromDetailResponse(detail),
              id: executionId,
              executionId,
            };
            await renderExecutionTimeline(execution, true);
            if (!terminalExecutionStatuses.has(cleanStatus(execution.status))) {
              await pollExecution(executionId);
            }
          }
        } catch (error) {
          state.humanSubmitError = error.message;
          renderHumanInputComposer();
        } finally {
          state.humanResolving = false;
          renderHumanInputComposer();
        }
      };

      const nodeMessageText = (key, output, execution) => {
        if (key === "runner") {
          return `Execution ${execution.id || ""} accepted by Loomex.`;
        }
        if (key === "start") {
          return output.prompt || output.message || "Prompt received.";
        }
        if (key === "backend_developer") {
          const files = Array.isArray(output.changedFiles) ? output.changedFiles : [];
          const fileLine = files.length ? `\nChanged files: ${files.join(", ")}` : "";
          return `${output.summary || "Backend implementation completed."}${fileLine}`;
        }
        if (key === "technical_lead") {
          const approval =
            typeof output.approved === "boolean" ? `Approved: ${output.approved}` : "Review completed.";
          return `${approval}\n${output.reason || output.reviewReason || ""}`.trim();
        }
        if (key === "review_gate") {
          const status = output.status || "evaluated";
          const approved = output.inputs?.approved;
          return `Review gate ${status}.${typeof approved === "boolean" ? `\nApproved branch: ${approved}` : ""}`;
        }
        if (key === "end") {
          const files = Array.isArray(output.changedFiles) ? output.changedFiles : [];
          const lines = [
            output.summary || summarizeRun(execution) || "Workflow completed.",
            typeof output.approved === "boolean" ? `Approved: ${output.approved}` : "",
            output.reviewReason || "",
            files.length ? `Changed files: ${files.join(", ")}` : "",
          ];
          return lines.filter(Boolean).join("\n");
        }
        return outputSummary(output);
      };

      const outputSummary = (output) => {
        if (!output || typeof output !== "object") return String(output ?? "");
        const lines = [];
        for (const key of [
          "summary",
          "implementation_summary",
          "implementation_report",
          "review_report",
          "reason",
          "message",
          "status",
          "decision",
          "approved",
          "result",
          "answer",
        ]) {
          const value = output[key];
          if (typeof value === "string" && value.trim()) {
            lines.push(value.trim());
            continue;
          }
          if (typeof value === "number" || typeof value === "boolean") {
            lines.push(`${formatFieldLabel(key)}: ${value}`);
            continue;
          }
        }
        if (!lines.length && typeof output.response_text === "string") {
          const parsed = tryParseJsonObject(output.response_text);
          if (parsed) {
            const summary = outputSummary(parsed);
            if (summary) lines.push(summary);
          } else if (output.response_text.trim()) {
            lines.push(output.response_text.trim());
          }
        }
        const changed = output.changedFiles || output.changed_files || output.filePaths || output.filesChanged;
        if (Array.isArray(changed) && changed.length) {
          lines.push(`Changed files: ${changed.map((item) => String(item?.path || item)).join(", ")}`);
        }
        if (Array.isArray(output.files) && output.files.length) {
          lines.push(`Files: ${output.files.map((item) => String(item?.path || item)).slice(0, 6).join(", ")}`);
        }
        if (output.human_request || output.humanRequest) {
          const request = output.human_request || output.humanRequest;
          lines.push(`Question: ${request.question || request.title || "Human input required"}`);
        }
        if (output.error) {
          lines.push(`Error: ${typeof output.error === "string" ? output.error : formatJsonish(output.error)}`);
        }
        if (!lines.length) {
          const simple = Object.entries(output)
            .filter(([, value]) => ["string", "number", "boolean"].includes(typeof value))
            .slice(0, 4)
            .map(([key, value]) => `${formatFieldLabel(key)}: ${value}`);
          lines.push(...simple);
        }
        return lines.filter(Boolean).join("\n") || "Done.";
      };

      const nodeLabel = (key) =>
        ({
          runner: "Runner",
          start: "Prompt",
          backend_developer: "Backend Developer",
          technical_lead: "Technical Lead",
          review_gate: "Review Gate",
          end: "Implementation Report",
        })[key] || formatFieldLabel(key);

      const nodeInitial = (key) =>
        ({
          runner: "R",
          start: "P",
          backend_developer: "B",
          technical_lead: "T",
          review_gate: "G",
          end: "F",
        })[key] || "N";

      const nodeOutputEntries = (nodeOutputs = {}, execution = null) => {
        const order = execution ? nodeOrderFromExecution(execution) : [];
        return Object.entries(nodeOutputs || {}).filter(([, output]) => {
          if (!output || typeof output !== "object") return false;
          return Object.keys(output).length > 0;
        }).sort(([left], [right]) => {
          const leftIndex = order.indexOf(left);
          const rightIndex = order.indexOf(right);
          if (leftIndex === -1 && rightIndex === -1) return left.localeCompare(right);
          if (leftIndex === -1) return 1;
          if (rightIndex === -1) return -1;
          return leftIndex - rightIndex;
        });
      };

      const isCompletedNodeStatus = (status) =>
        ["done", "final", "failed"].includes(String(status || "").toLowerCase());

      const setNodeRailWave = (rail, centerIndex = -1) => {
        const markers = Array.from(rail.querySelectorAll(".node-rail-marker"));
        markers.forEach((marker, index) => {
          const distance = Math.abs(index - centerIndex);
          marker.classList.toggle("wave-center", distance === 0);
          marker.classList.toggle("wave-near", distance === 1);
          marker.classList.toggle("wave-far", distance === 2);
        });
      };

      const ensureNodeRailWave = (rail) => {
        if (rail.dataset.waveBound === "true") return;
        rail.dataset.waveBound = "true";
        rail.addEventListener("pointermove", (event) => {
          const markers = Array.from(rail.querySelectorAll(".node-rail-marker"));
          if (!markers.length) return;
          let centerIndex = 0;
          let closestDistance = Number.POSITIVE_INFINITY;
          markers.forEach((marker, index) => {
            const bounds = marker.getBoundingClientRect();
            const distance = Math.abs(event.clientY - (bounds.top + bounds.height / 2));
            if (distance < closestDistance) {
              closestDistance = distance;
              centerIndex = index;
            }
          });
          setNodeRailWave(rail, centerIndex);
        });
        rail.addEventListener("pointerleave", () => setNodeRailWave(rail));
        rail.addEventListener("focusin", (event) => {
          const markers = Array.from(rail.querySelectorAll(".node-rail-marker"));
          const centerIndex = markers.indexOf(event.target);
          if (centerIndex >= 0) setNodeRailWave(rail, centerIndex);
        });
        rail.addEventListener("focusout", (event) => {
          if (!rail.contains(event.relatedTarget)) setNodeRailWave(rail);
        });
      };

      const updateNodeRail = (execution = state.currentExecution) => {
        const rail = $("nodeRail");
        if (!rail) return;
        ensureNodeRailWave(rail);
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) {
          rail.innerHTML = "";
          return;
        }
        const nodes = Array.from($("transcript").querySelectorAll(`[data-node-run^="${executionId}:"]`))
          .filter((node) => isCompletedNodeStatus(node.dataset.nodeStatus))
          .sort((left, right) => {
            const order = nodeOrderFromExecution(execution);
            return order.indexOf(left.dataset.nodeKey || "") - order.indexOf(right.dataset.nodeKey || "");
          });
        rail.innerHTML = "";
        for (const node of nodes) {
          const button = document.createElement("button");
          const label = node.querySelector(".node-title strong")?.textContent || node.dataset.nodeKey || "Node";
          button.type = "button";
          button.className = "node-rail-marker";
          button.dataset.nodeLabel = label;
          button.setAttribute("aria-label", `Go to ${label}`);
          button.addEventListener("click", () => {
            node.scrollIntoView({ behavior: "smooth", block: "center" });
            rail.querySelectorAll(".node-rail-marker").forEach((item) => item.classList.remove("active"));
            button.classList.add("active");
          });
          rail.append(button);
        }
      };

      const ensureNodeBlock = (execution, key, label = null) => {
        const executionId = execution?.id || execution?.executionId || "execution";
        const blockId = `${executionId}:${key}`;
        let item = document.querySelector(`[data-node-run="${blockId}"]`);
        if (item) {
          updateNodeWorkSummary(item, execution, key);
          return item;
        }
        item = document.createElement("article");
        item.className = "message node";
        item.dataset.nodeRun = blockId;
        item.dataset.nodeKey = key;
        item.dataset.nodeStatus = "running";
        item.innerHTML = `
          <div class="bubble node-card">
            <div class="node-header">
              <div class="node-title">
                <span class="node-avatar" aria-hidden="true">${nodeInitial(key)}</span>
                <span class="node-badge">Node</span>
                <strong></strong>
              </div>
              <span class="node-status"></span>
            </div>
