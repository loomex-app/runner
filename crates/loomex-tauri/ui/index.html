<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loomex Runner</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --bg: #0d0f12;
        --sidebar: #17313a;
        --sidebar-2: #10262e;
        --surface: #161719;
        --surface-2: #1f2023;
        --surface-3: #292a2d;
        --border: #303237;
        --border-strong: #454850;
        --text: #f5f7f8;
        --muted: #a7adb6;
        --faint: #777f8c;
        --green: #36d07d;
        --green-2: #1f8f52;
        --cyan: #76d4ff;
        --amber: #eab657;
        --rose: #ff6f87;
        --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        --radius: 8px;
        --sidebar-width: 292px;
        --nav-rail-width: 44px;
        --content-width: 720px;
        --tools-panel-width: clamp(360px, 33vw, 560px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 0;
        background: var(--bg);
        color: var(--text);
      }

      body {
        height: 100vh;
        overflow: hidden;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        transition:
          background 180ms ease,
          border-color 180ms ease,
          color 180ms ease,
          opacity 180ms ease;
      }

      button:hover {
        background: var(--surface-3);
        border-color: var(--border-strong);
      }

      button:focus-visible,
      input:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      button.primary {
        background: var(--green-2);
        border-color: #2db56b;
        color: #ffffff;
      }

      button.primary:hover {
        background: #28a963;
      }

      button.ghost {
        background: transparent;
      }

      button.icon {
        width: 40px;
        min-width: 40px;
        padding: 0;
        display: inline-grid;
        place-items: center;
      }

      svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #111315;
        color: var(--text);
      }

      input {
        min-height: 40px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 50px;
        max-height: 168px;
        resize: vertical;
        padding: 12px 13px;
        line-height: 1.45;
      }

      .app {
        width: 100%;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }

      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(420px, 100%);
        display: grid;
        gap: 18px;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .login-card h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .login-card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .shell {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
        min-width: 0;
        overflow: hidden;
      }

      .shell.nav-collapsed {
        grid-template-columns: minmax(0, 1fr);
      }

      .sidebar {
        position: relative;
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 0;
        padding: 50px 0 0 8px;
        overflow: hidden;
        background: var(--sidebar);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transition:
          transform 220ms ease,
          box-shadow 220ms ease;
      }

      .shell.nav-collapsed .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 30;
        width: var(--sidebar-width);
        transform: translateX(-100%);
        pointer-events: none;
        box-shadow: none;
      }

      .shell.nav-collapsed.nav-revealed .sidebar {
        transform: translateX(0);
        pointer-events: auto;
        box-shadow: var(--shadow);
      }

      .shell.nav-collapsed .sidebar-scroll,
      .shell.nav-collapsed .account-area {
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease;
      }

      .shell.nav-collapsed.nav-revealed .sidebar-scroll,
      .shell.nav-collapsed.nav-revealed .account-area {
        opacity: 1;
        pointer-events: auto;
      }

      .nav-toggle {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 45;
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.72);
      }

      .nav-toggle:hover,
      .nav-toggle:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        border-color: transparent;
        color: var(--text);
      }

      .nav-toggle svg {
        width: 15px;
        height: 15px;
      }

      .nav-reveal-zone {
        display: none;
      }

      .shell.nav-collapsed .nav-reveal-zone {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 25;
        display: block;
        width: 14px;
        height: 100vh;
        background: transparent;
        border-right: 0;
      }

      .sidebar-resizer {
        position: absolute;
        top: 0;
        right: -5px;
        z-index: 12;
        width: 10px;
        height: 100%;
        min-height: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        cursor: col-resize;
      }

      .sidebar-resizer::after {
        content: "";
        position: absolute;
        top: 0;
        right: 4px;
        width: 1px;
        height: 100%;
        background: rgba(255, 255, 255, 0.08);
        transition:
          background 180ms ease,
          box-shadow 180ms ease;
      }

      .sidebar-resizer:hover,
      .sidebar-resizer:focus-visible,
      .sidebar-resizer.dragging {
        background: rgba(118, 212, 255, 0.06);
      }

      .sidebar-resizer:hover::after,
      .sidebar-resizer:focus-visible::after,
      .sidebar-resizer.dragging::after {
        background: var(--cyan);
        box-shadow: 0 0 0 1px rgba(118, 212, 255, 0.3);
      }

      .shell.nav-collapsed .sidebar-resizer {
        display: none;
      }

      .toolbar-title strong,
      .profile-name {
        font-size: 13px;
        letter-spacing: 0;
      }

      .sidebar button {
        font-size: 12.5px;
      }

      .sidebar-scroll {
        min-height: 0;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: rgba(245, 247, 248, 0.38) transparent;
        display: grid;
        align-content: start;
        gap: 14px;
        padding: 2px 8px 16px 0;
      }

      .sidebar-scroll::-webkit-scrollbar {
        width: 12px;
      }

      .sidebar-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      .sidebar-scroll::-webkit-scrollbar-thumb {
        min-height: 34px;
        border: 4px solid transparent;
        border-radius: 999px;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(245, 247, 248, 0.5) 0 2px,
            transparent 2px 8px
          )
          content-box;
      }

      .sidebar-scroll::-webkit-scrollbar-thumb:hover {
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(245, 247, 248, 0.72) 0 2px,
            transparent 2px 8px
          )
          content-box;
      }

      .section {
        display: grid;
        gap: 8px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 6px;
      }

      #reloadWorkflows {
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.62);
      }

      #reloadWorkflows:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
      }

      #reloadWorkflows svg {
        width: 15px;
        height: 15px;
      }

      .section-title {
        color: rgba(245, 247, 248, 0.56);
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .workflow-list {
        display: grid;
        gap: 4px;
      }

      .workflow-block {
        display: grid;
        gap: 3px;
      }

      .run-item {
        width: 100%;
        text-align: left;
        border-color: transparent;
        background: transparent;
      }

      .workflow-item {
        min-height: 36px;
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid transparent;
        border-radius: var(--radius);
        padding: 0;
      }

      .workflow-item:hover,
      .workflow-item[aria-pressed="true"] {
        background: #31454d;
        border-color: rgba(255, 255, 255, 0.08);
      }

      .workflow-main {
        min-width: 0;
        min-height: 34px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border-color: transparent;
        background: transparent;
        text-align: left;
        padding: 5px 3px 5px 8px;
      }

      .workflow-main:hover {
        border-color: transparent;
        background: transparent;
      }

      .workflow-collapse {
        color: rgba(245, 247, 248, 0.62);
      }

      .workflow-block.collapsed .workflow-collapse svg {
        transform: rotate(-90deg);
      }

      .workflow-actions {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        opacity: 0;
        pointer-events: none;
      }

      .workflow-item:hover .workflow-actions,
      .workflow-item:focus-within .workflow-actions,
      .workflow-item[aria-pressed="true"] .workflow-actions {
        opacity: 1;
        pointer-events: auto;
      }

      .workflow-action {
        width: 24px;
        min-width: 24px;
        min-height: 24px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.68);
      }

      .workflow-action:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .workflow-action svg {
        width: 14px;
        height: 14px;
      }

      .workflow-menu {
        position: fixed;
        z-index: 80;
        display: none;
        min-width: 118px;
        padding: 5px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #252629;
        box-shadow: var(--shadow);
      }

      .workflow-menu.open {
        display: grid;
      }

      .workflow-menu button {
        min-height: 30px;
        border-color: transparent;
        background: transparent;
        text-align: left;
        color: var(--text);
        font-size: 12px;
      }

      .workflow-menu button:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: transparent;
      }

      .workflow-icon {
        width: 18px;
        height: 18px;
        color: rgba(245, 247, 248, 0.72);
        display: grid;
        place-items: center;
      }

      .workflow-text,
      .run-text {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .workflow-text strong,
      .run-title,
      .path,
      .pill,
      .meta,
      .workspace-line,
      .profile-detail,
      .file-item {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .workflow-text strong {
        font-size: 12px;
        line-height: 1.2;
      }

      .workflow-text span,
      .run-meta,
      .meta,
      .path,
      .workspace-line,
      .profile-detail {
        color: var(--muted);
        font-size: 11px;
      }

      .run-list {
        display: grid;
        gap: 2px;
        margin-left: 24px;
        padding-left: 9px;
      }

      .workflow-block.collapsed .run-list {
        display: none;
      }

      .run-item {
        min-height: 31px;
        padding: 5px 7px;
        display: grid;
        grid-template-columns: 10px minmax(0, 1fr);
        align-items: center;
        gap: 7px;
      }

      .run-title {
        font-size: 12px;
        line-height: 1.2;
      }

      .run-item:hover,
      .run-item[aria-pressed="true"] {
        background: #31454d;
        border-color: rgba(255, 255, 255, 0.08);
      }

      .run-dot,
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--faint);
      }

      .run-dot.succeeded,
      .status-dot.ready,
      .status-dot.succeeded {
        background: var(--green);
      }

      .run-dot.running,
      .run-dot.queued,
      .status-dot.running,
      .status-dot.queued,
      .status-dot.started {
        background: var(--amber);
      }

      .run-dot.failed,
      .run-dot.canceled,
      .run-dot.cancelled,
      .status-dot.failed,
      .status-dot.canceled,
      .status-dot.cancelled {
        background: var(--rose);
      }

      .account-area {
        position: relative;
        z-index: 3;
        min-height: 0;
        margin: 0;
        padding: 8px 8px 12px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
      }

      .profile-button {
        width: 100%;
        min-height: 56px;
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        background: transparent;
        border-color: transparent;
        text-align: left;
        padding: 8px;
      }

      .profile-button:hover,
      .profile-button[aria-expanded="true"] {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #f28b74;
        color: white;
        font-size: 11px;
        font-weight: 700;
      }

      .account-name,
      .account-plan {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .account-name {
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.25;
      }

      .account-plan {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .profile-popover {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: calc(100% - 1px);
        display: none;
        gap: 4px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        background: #2b2b2c;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
        z-index: 8;
      }

      .profile-popover.open {
        display: grid;
      }

      .profile-menu-item {
        min-height: 32px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        border-color: transparent;
        background: transparent;
        color: #f1f1f1;
        text-align: left;
        padding: 6px 7px;
      }

      .profile-menu-item:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: transparent;
      }

      .profile-menu-item svg {
        width: 14px;
        height: 14px;
        color: #c7c7c7;
      }

      .profile-menu-item .shortcut,
      .profile-menu-item .chevron {
        color: #a8a8a8;
        font-size: 12px;
      }

      .profile-menu-item.muted {
        color: #a8a8a8;
      }

      .profile-menu-separator {
        height: 1px;
        margin: 4px 5px;
        background: rgba(255, 255, 255, 0.12);
      }

      .workspace-panel {
        display: none;
        gap: 8px;
        padding: 8px 7px 6px;
      }

      .workspace-panel.open {
        display: grid;
      }

      .workspace-actions {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
      }

      .main {
        min-width: 0;
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        overflow: hidden;
        background: var(--bg);
      }

      .toolbar {
        display: none;
      }

      .toolbar-title {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toolbar-title strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .pill {
        max-width: 240px;
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px 9px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
        font-size: 12px;
      }

      .transcript {
        min-height: 0;
        overflow: auto;
        display: grid;
        grid-template-columns: minmax(0, var(--content-width));
        justify-content: center;
        align-content: start;
        gap: 18px;
        padding: 24px 18px;
      }

      .empty-state {
        align-self: center;
        justify-self: center;
        width: min(560px, 100%);
        display: grid;
        gap: 14px;
        color: var(--muted);
        text-align: center;
      }

      .empty-state h1 {
        margin: 0;
        color: var(--text);
        font-size: 22px;
        line-height: 1.25;
      }

      .message {
        max-width: 100%;
        display: grid;
        gap: 8px;
        animation: message-in 180ms ease-out;
      }

      .message.user {
        justify-self: end;
        width: auto;
        max-width: min(720px, 92%);
      }

      .message.node,
      .message.system {
        justify-self: start;
        width: 100%;
      }

      .message-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .run-duration {
        justify-self: start;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 7px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 13px;
      }

      .run-duration::after {
        content: "›";
        color: var(--muted);
        font-size: 16px;
        line-height: 1;
      }

      .message.user .message-meta {
        display: none;
      }

      .node-avatar {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        border: 1px solid var(--border);
        color: var(--cyan);
        background: rgba(118, 212, 255, 0.08);
        font-size: 11px;
        font-weight: 700;
      }

      .bubble {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 13px 14px;
        background: var(--surface);
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.5;
        font-size: 14px;
      }

      .message.user .bubble {
        border-color: rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: #242528;
        color: #f3f3f3;
        padding: 9px 13px;
      }

      .message.node .bubble {
        border-color: transparent;
        background: transparent;
        padding: 0;
      }

      .message.system .bubble {
        background: #17191d;
      }

      .message.system.failed .bubble {
        border-color: rgba(244, 113, 116, 0.32);
        background: rgba(244, 113, 116, 0.08);
      }

      .node-card {
        display: grid;
        gap: 12px;
        padding-top: 2px;
      }

      .node-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .node-title {
        display: flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      .node-title strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
      }

      .node-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .message.node.done .node-status {
        color: var(--green);
      }

      .message.node.failed .node-status {
        color: var(--rose);
      }

      .typing .node-status::after {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--amber);
        animation: pulse 900ms ease-in-out infinite;
      }

      .node-content {
        color: var(--text);
      }

      .thinking-row {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }

      .thinking-dots {
        display: inline-flex;
        gap: 3px;
      }

      .thinking-dots span {
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: var(--muted);
        animation: pulse 950ms ease-in-out infinite;
      }

      .thinking-dots span:nth-child(2) {
        animation-delay: 120ms;
      }

      .thinking-dots span:nth-child(3) {
        animation-delay: 240ms;
      }

      .code-block {
        margin-top: 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #111315;
        overflow: hidden;
      }

      .code-label {
        padding: 7px 10px;
        border-bottom: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }

      pre {
        margin: 0;
        padding: 11px 12px;
        overflow: auto;
        color: #d8dee9;
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .composer-wrap {
        min-height: 0;
        display: grid;
        align-content: end;
        padding: 10px 18px 6px;
        background: rgba(13, 15, 18, 0.97);
      }

      .composer {
        position: relative;
        width: min(100%, var(--content-width));
        display: grid;
        gap: 9px;
        max-width: var(--content-width);
        margin: 0 auto;
      }

      .composer-meta {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .composer-frame {
        position: relative;
        display: grid;
        grid-template-rows: minmax(44px, 1fr) auto;
        gap: 8px;
        min-height: 100px;
        padding: 13px 10px 8px;
        border: 1px solid var(--border-strong);
        border-radius: 23px;
        background: #2d2d2e;
        box-shadow: 0 14px 38px rgba(0, 0, 0, 0.24);
      }

      .composer-frame label {
        gap: 0;
      }

      .composer-frame textarea {
        min-height: 42px;
        max-height: 120px;
        border: 0;
        padding: 0 4px;
        background: transparent;
        outline: none;
        resize: none;
        color: #f2f2f2;
        font-size: 13px;
        line-height: 1.45;
      }

      .composer-frame textarea::placeholder {
        color: rgba(245, 247, 248, 0.3);
      }

      .mention-chips {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        padding: 0 4px;
      }

      .mention-chips.open {
        display: flex;
      }

      .mention-chip {
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        max-width: 220px;
        padding: 2px 7px;
        border: 1px solid rgba(118, 212, 255, 0.28);
        border-radius: 6px;
        background: rgba(118, 212, 255, 0.09);
        color: #9bddff;
        font-size: 12px;
        line-height: 1.35;
        text-decoration: none;
      }

      .mention-chip span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mention-chip svg {
        width: 14px;
        height: 14px;
        flex: 0 0 auto;
      }

      .mention-chip button {
        min-height: 16px;
        width: 16px;
        min-width: 16px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: rgba(245, 247, 248, 0.72);
      }

      .mention-menu {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: calc(100% + 8px);
        display: none;
        max-height: 260px;
        overflow: auto;
        padding: 6px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: #202124;
        box-shadow: var(--shadow);
        z-index: 20;
      }

      .mention-menu.open {
        display: grid;
        gap: 2px;
      }

      .mention-option {
        min-height: 36px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        border-color: transparent;
        background: transparent;
        text-align: left;
        padding: 6px 8px;
      }

      .mention-option:hover,
      .mention-option[aria-selected="true"] {
        background: rgba(255, 255, 255, 0.08);
      }

      .mention-option span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .composer-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .composer-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .composer-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        min-width: 0;
      }

      .composer-icon-button {
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-radius: 999px;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.56);
      }

      .composer-icon-button:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(245, 247, 248, 0.84);
      }

      .composer-icon-button svg {
        width: 15px;
        height: 15px;
      }

      .model-chip {
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        border: 0;
        background: transparent;
        white-space: nowrap;
        font-size: 12px;
        line-height: 1;
      }

      .model-chip svg {
        width: 14px;
        height: 14px;
      }

      .model-chip {
        padding: 0;
        color: rgba(245, 247, 248, 0.64);
      }

      .send-button {
        width: 34px;
        min-width: 34px;
        min-height: 34px;
        padding: 0;
        border-radius: 999px;
        background: #9b9b9c;
        border-color: #9b9b9c;
        color: #2a2a2b;
      }

      .send-button:hover {
        background: #b8b8b9;
        border-color: #b8b8b9;
      }

      .view-controls {
        position: fixed;
        top: 12px;
        right: 18px;
        z-index: 60;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .view-control {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-color: transparent;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(245, 247, 248, 0.72);
      }

      .view-control:hover,
      .view-control[aria-pressed="true"] {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
      }

      .view-control svg {
        width: 16px;
        height: 16px;
      }

      .launcher-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 55;
        display: none;
        width: var(--tools-panel-width);
        min-width: 320px;
        max-width: calc(100vw - 280px);
        place-items: center;
        padding: 72px 18px 64px;
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        background: #151617;
        box-shadow: var(--shadow);
        color: var(--text);
      }

      .launcher-panel.open {
        display: grid;
      }

      .launcher-actions {
        width: min(100%, 720px);
        display: grid;
        gap: 6px;
        align-content: center;
      }

      .tools-panel-resizer {
        position: absolute;
        top: 0;
        left: -5px;
        bottom: 0;
        z-index: 3;
        width: 10px;
        cursor: col-resize;
        touch-action: none;
      }

      .tools-panel-resizer::after {
        content: "";
        position: absolute;
        top: 0;
        left: 4px;
        bottom: 0;
        width: 1px;
        background: transparent;
      }

      .tools-panel-resizer:hover::after,
      body.resizing-tools-panel .tools-panel-resizer::after {
        background: rgba(245, 247, 248, 0.22);
      }

      .launcher-option {
        min-height: 44px;
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        border-color: transparent;
        border-radius: 8px;
        background: rgba(20, 21, 23, 0.98);
        color: rgba(245, 247, 248, 0.86);
        text-align: left;
        padding: 8px 12px;
      }

      .launcher-option:hover {
        border-color: transparent;
        background: #202124;
        color: var(--text);
      }

      .launcher-option svg {
        width: 16px;
        height: 16px;
        color: rgba(245, 247, 248, 0.68);
      }

      .launcher-shortcut {
        min-height: 22px;
        display: inline-flex;
        align-items: center;
        padding: 1px 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(245, 247, 248, 0.66);
        font-size: 12px;
      }

      .dock-head {
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .dock-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        font-size: 13px;
        font-weight: 650;
      }

      .dock-close {
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        padding: 0;
        border-color: transparent;
        background: transparent;
      }

      .file-filter {
        padding: 12px 12px 6px;
      }

      .file-filter input {
        min-height: 36px;
        border-radius: 10px;
        background: #202124;
      }

      .file-tree {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 2px;
        padding: 4px 10px 14px;
      }

      .file-row {
        min-height: 30px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        border-color: transparent;
        background: transparent;
        text-align: left;
        color: rgba(245, 247, 248, 0.82);
      }

      .file-row:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.06);
      }

      .workspace-surface {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        z-index: 56;
        width: var(--tools-panel-width);
        min-width: 320px;
        max-width: calc(100vw - 280px);
        min-height: 0;
        height: 100vh;
        display: none;
        grid-template-rows: 58px 52px minmax(0, 1fr);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--bg);
        box-shadow: var(--shadow);
      }

      .workspace-surface.open {
        display: grid;
      }

      .workspace-tabs {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .workspace-tab {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 240px;
        border-color: transparent;
        border-radius: 10px;
        background: transparent;
        color: rgba(245, 247, 248, 0.62);
        padding: 7px 12px;
      }

      .workspace-tab.active {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .workspace-tab span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab-add {
        width: 32px;
        min-width: 32px;
        min-height: 32px;
        padding: 0;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.62);
      }

      .tab-add:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .tab-add-menu {
        position: fixed;
        z-index: 70;
        display: none;
        width: 220px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: #2d2d2e;
        box-shadow: var(--shadow);
      }

      .tab-add-menu.open {
        display: grid;
      }

      .workspace-pathbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(245, 247, 248, 0.72);
        font-size: 14px;
      }

      .workspace-body {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(170px, 34%);
      }

      .workspace-content {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        padding: 36px 36px 80px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }

      .file-empty {
        align-self: center;
        justify-self: center;
        display: grid;
        justify-items: center;
        gap: 10px;
        color: var(--muted);
        text-align: center;
      }

      .file-empty svg {
        width: 34px;
        height: 34px;
      }

      .file-document {
        max-width: 760px;
        display: grid;
        gap: 18px;
        color: #f2f2f2;
        font-size: 16px;
        line-height: 1.55;
      }

      .file-document h1,
      .file-document h2,
      .file-document h3 {
        margin: 0;
        line-height: 1.15;
      }

      .file-document h1 {
        font-size: 34px;
      }

      .file-document h2 {
        margin-top: 14px;
        font-size: 26px;
      }

      .file-document p,
      .file-document ol,
      .file-document ul {
        margin: 0;
      }

      .file-document code {
        padding: 1px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.12);
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .file-document pre {
        border-radius: 10px;
        background: #2d2d2e;
      }

      .file-raw {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .terminal-output {
        min-height: 0;
        overflow: auto;
        padding: 14px 16px;
        color: #d6d8dc;
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .terminal-form {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        padding: 10px 14px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .terminal-prompt {
        color: #dd7bdc;
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .terminal-form input {
        min-height: 34px;
        border: 0;
        background: transparent;
        color: var(--text);
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        outline: none;
      }

      .artifacts-popover {
        position: fixed;
        top: 58px;
        right: 18px;
        z-index: 55;
        display: none;
        width: min(300px, calc(100vw - 36px));
        max-height: min(420px, calc(100vh - 90px));
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: #2d2d2e;
        box-shadow: var(--shadow);
        overflow: auto;
      }

      .artifacts-popover.open {
        display: grid;
        gap: 12px;
      }

      .artifacts-popover .section-title {
        font-size: 12px;
      }

      .workflow-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 50;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        height: min(46vh, 420px);
        min-height: 240px;
        padding: 0 14px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px 18px 0 0;
        background: rgba(19, 20, 22, 0.98);
        box-shadow: var(--shadow);
        transform: translateY(100%);
        pointer-events: none;
        transition: transform 220ms ease;
      }

      .workflow-panel.open {
        transform: translateY(0);
        pointer-events: auto;
      }

      .workflow-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 12px;
      }

      .workflow-panel-title {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      .workflow-panel-title strong {
        color: var(--text);
        font-size: 13px;
        letter-spacing: 0;
      }

      .workflow-panel-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .workflow-panel-actions .icon {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
      }

      .workflow-panel-body {
        min-height: 0;
        overflow: auto;
        padding: 12px 0 0;
      }

      .workflow-graph {
        width: min(760px, calc(100vw - 28px));
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin: 0 auto;
      }

      .workflow-node {
        min-height: 74px;
        display: grid;
        place-items: center;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #17191d;
        color: var(--muted);
        text-align: center;
        font-size: 11px;
        line-height: 1.25;
      }

      .workflow-node.done {
        border-color: rgba(54, 208, 125, 0.35);
        color: var(--text);
      }

      .workflow-node.active {
        border-color: var(--cyan);
        color: var(--text);
        animation: active-node-pulse 1100ms ease-in-out infinite;
      }

      .inspector {
        min-width: 0;
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 16px;
        padding: 14px;
        overflow: hidden;
        border-left: 1px solid var(--border);
        background: #121416;
      }

      .inspector-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .inspector-list {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .file-item {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        color: var(--muted);
        font-size: 12px;
      }

      .alert {
        min-height: 20px;
        color: var(--rose);
        font-size: 13px;
      }

      .composer .alert:empty {
        display: none;
      }

      .notice {
        color: var(--amber);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: none;
        place-items: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.52);
      }

      .modal-backdrop.open {
        display: grid;
      }

      .run-modal {
        width: min(440px, 100%);
        display: grid;
        gap: 14px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #202124;
        box-shadow: var(--shadow);
      }

      .run-modal header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .run-modal h2 {
        margin: 0;
        color: var(--text);
        font-size: 15px;
        line-height: 1.3;
      }

      .run-modal p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .modal-close {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
        padding: 0;
        display: grid;
        place-items: center;
        border-color: transparent;
        background: transparent;
      }

      .modal-workspace {
        display: grid;
        gap: 8px;
      }

      .modal-path {
        min-height: 38px;
        display: flex;
        align-items: center;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #15171a;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .hidden {
        display: none !important;
      }

      @keyframes message-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes active-node-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(118, 212, 255, 0.12);
        }
        50% {
          box-shadow: 0 0 0 3px rgba(118, 212, 255, 0.28);
        }
      }

      @media (max-width: 1140px) {
        .shell {
          grid-template-columns: var(--sidebar-width) minmax(0, 1fr);
        }

        .shell.nav-collapsed {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .shell {
          grid-template-columns: 1fr;
        }

        .shell.nav-collapsed {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: relative;
          width: auto;
          transform: none;
          padding-top: 50px;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .shell.nav-collapsed .sidebar {
          position: fixed;
          width: var(--sidebar-width);
          transform: translateX(-100%);
          pointer-events: none;
          box-shadow: none;
        }

        .shell.nav-collapsed .nav-reveal-zone {
          display: block;
        }

        .sidebar-resizer {
          display: none;
        }

        .sidebar-scroll {
          max-height: 280px;
        }

        .main {
          min-height: 70vh;
        }

        .toolbar {
          grid-template-columns: 1fr;
          min-height: auto;
          padding: 12px 14px;
        }

        .toolbar-actions,
        .composer-meta {
          flex-wrap: wrap;
        }

        .composer-row {
          align-items: flex-end;
        }

        .composer-actions {
          gap: 6px;
        }

        .model-chip span {
          max-width: 96px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .transcript {
          padding: 18px;
        }

        .workspace-actions {
          grid-template-columns: 1fr;
        }
      }

      @media (max-height: 720px) {
        .sidebar {
          padding-top: 42px;
        }

        .sidebar-scroll {
          gap: 10px;
          padding-bottom: 10px;
        }

        .account-area {
          padding-top: 6px;
          padding-bottom: 8px;
        }

        .profile-button {
          min-height: 48px;
          padding: 6px 8px;
        }

        .toolbar {
          min-height: 50px;
        }

        .transcript {
          gap: 14px;
          padding-top: 16px;
          padding-bottom: 16px;
        }

        .composer-wrap {
          padding: 8px 14px 5px;
        }

        .composer {
          gap: 7px;
        }

        .composer-frame {
          gap: 6px;
          padding: 7px;
        }

        .composer-frame textarea {
          min-height: 42px;
          max-height: 112px;
        }

        .mention-menu {
          max-height: 190px;
        }
      }

      @media (max-height: 600px) {
        .main {
          grid-template-rows: minmax(0, 1fr) auto;
        }

        .toolbar {
          padding-inline: 14px;
        }

        .composer-frame textarea {
          min-height: 36px;
          max-height: 84px;
        }

        .message {
          gap: 6px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          scroll-behavior: auto !important;
          transition: none !important;
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
