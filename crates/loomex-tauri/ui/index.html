    <script type="module">
      const invoke = window.__TAURI__?.core?.invoke;
      const storageKey = "loomex.runner.workflowRuns.v2";
      const sidebarWidthKey = "loomex.runner.sidebarWidth.v1";
      const navCollapsedKey = "loomex.runner.navCollapsed.v1";
      const sidebarWidthBounds = {
        min: 220,
        max: 420,
      };
      const state = {
        status: null,
        workflows: [],
        workflowRuns: {},
        selectedWorkflowId: null,
        selectedRunId: null,
        sending: false,
        workspacePicking: false,
        currentExecution: null,
        renderedNodes: new Set(),
        selectedFiles: [],
        mentionOptions: [],
        selectedMentionIndex: 0,
        mentionRange: null,
        collapsedWorkflows: new Set(),
        workflowMenuId: null,
        runModalWorkflowId: null,
        runModalWorkspacePath: "",
        fileEntries: [],
        terminalRunning: false,
        activeWorkspaceTab: "file",
        selectedFile: null,
        terminalLines: [],
      };

      const $ = (id) => document.getElementById(id);

      const setPressed = (buttonId, pressed) => {
        const button = $(buttonId);
        if (button) button.setAttribute("aria-pressed", String(pressed));
      };

      const maxSidebarWidth = () => {
        if (window.innerWidth <= 820) return sidebarWidthBounds.max;
        const reservedWidth = window.innerWidth <= 1140 ? 420 : 704;
        return Math.max(
          sidebarWidthBounds.min,
          Math.min(sidebarWidthBounds.max, window.innerWidth - reservedWidth),
        );
      };

      const clampSidebarWidth = (width) =>
        Math.round(
          Math.min(
            maxSidebarWidth(),
            Math.max(sidebarWidthBounds.min, Number(width) || 292),
          ),
        );

      const setSidebarWidth = (width, persist = true) => {
        const nextWidth = clampSidebarWidth(width);
        document.documentElement.style.setProperty("--sidebar-width", `${nextWidth}px`);
        const resizer = $("sidebarResizer");
        if (resizer) {
          resizer.setAttribute("aria-valuenow", String(nextWidth));
          resizer.setAttribute("aria-valuemax", String(maxSidebarWidth()));
        }
        if (persist) {
          try {
            localStorage.setItem(sidebarWidthKey, String(nextWidth));
          } catch {
            /* localStorage can be unavailable in restricted webviews */
          }
        }
      };

      const loadSidebarWidth = () => {
        try {
          return Number(localStorage.getItem(sidebarWidthKey)) || 292;
        } catch {
          return 292;
        }
      };

      const setNavCollapsed = (collapsed, persist = true) => {
        const shell = $("chatView");
        const toggle = $("navToggle");
        if (!shell || !toggle) return;
        shell.classList.toggle("nav-collapsed", collapsed);
        shell.classList.remove("nav-revealed");
        toggle.setAttribute("aria-pressed", String(collapsed));
        toggle.setAttribute("aria-label", collapsed ? "Show navigation" : "Hide navigation");
        if (persist) {
          try {
            localStorage.setItem(navCollapsedKey, collapsed ? "1" : "0");
          } catch {
            /* localStorage can be unavailable in restricted webviews */
          }
        }
      };

      const loadNavCollapsed = () => {
        try {
          return localStorage.getItem(navCollapsedKey) === "1";
        } catch {
          return false;
        }
      };

      const icons = {
        workflow:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4z" /><path d="M14 4h6v6h-6z" /><path d="M4 14h6v6H4z" /><path d="M14 14h6v6h-6z" /></svg>',
        folder:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg>',
        file:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></svg>',
        chevron:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>',
        play:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7Z" /></svg>',
        more:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12h.01" /><path d="M19 12h.01" /><path d="M5 12h.01" /></svg>',
      };

      const call = async (command, args = {}) => {
        if (!invoke) throw new Error("Tauri invoke is unavailable");
        try {
          return await invoke(command, args);
        } catch (error) {
          throw new Error(error?.message || error?.code || String(error));
        }
      };

      const workflowName = (workflow) =>
        workflow?.name || workflow?.title || workflow?.id || "Untitled workflow";

      const selectedWorkflow = () =>
        state.workflows.find((workflow) => workflow.id === state.selectedWorkflowId);

      const shortenId = (value) => (value ? String(value).slice(0, 8) : "");

      const cleanStatus = (status) => {
        const value = String(status || "").trim().toLowerCase();
        if (["succeeded", "success", "completed", "complete", "done"].includes(value)) return "succeeded";
        if (["failed", "failure", "error", "errored", "timed_out", "timeout"].includes(value)) return "failed";
        if (["canceled", "cancelled", "aborted"].includes(value)) return "canceled";
        if (["queued", "pending", "scheduled"].includes(value)) return "queued";
        if (["running", "started", "in_progress", "waiting", "processing"].includes(value)) return "running";
        return "ready";
      };

      const statusLabel = (status) => {
        const value = cleanStatus(status);
        if (value === "succeeded") return "Succeeded";
        if (value === "failed") return "Failed";
        if (value === "canceled" || value === "cancelled") return "Canceled";
        if (value === "queued") return "Queued";
        if (value === "running" || value === "started") return "Running";
        return "Ready";
      };

      const terminalExecutionStatuses = new Set([
        "succeeded",
        "failed",
        "canceled",
      ]);

      const setError = (id, message) => {
        $(id).textContent = message || "";
      };

      const setNotice = (message) => {
        $("appNotice").textContent = message || "";
      };

      let toolsPanelResize = null;

      const clampToolsPanelWidth = (width) => {
        const min = 320;
        const max = Math.max(min, window.innerWidth - 280);
        return Math.min(max, Math.max(min, width));
      };

      const setToolsPanelWidth = (width) => {
        document.documentElement.style.setProperty("--tools-panel-width", `${clampToolsPanelWidth(width)}px`);
      };

      const stopToolsPanelResize = () => {
        toolsPanelResize = null;
        document.body.classList.remove("resizing-tools-panel");
        window.removeEventListener("pointermove", resizeToolsPanel);
      };

      const resizeToolsPanel = (event) => {
        if (!toolsPanelResize) return;
        setToolsPanelWidth(toolsPanelResize.startWidth + toolsPanelResize.startX - event.clientX);
      };

      const startToolsPanelResize = (event) => {
        const panel = event.currentTarget.closest(".launcher-panel, .workspace-surface");
        if (!panel) return;
        event.preventDefault();
        toolsPanelResize = {
          startX: event.clientX,
          startWidth: panel.getBoundingClientRect().width,
        };
        event.currentTarget.setPointerCapture?.(event.pointerId);
        document.body.classList.add("resizing-tools-panel");
        window.addEventListener("pointermove", resizeToolsPanel);
        window.addEventListener("pointerup", stopToolsPanelResize, { once: true });
      };

      const closeToolsPanel = () => {
        $("sideNavPanel").classList.remove("open");
        $("workspaceSurface").classList.remove("open");
        $("tabAddMenu").classList.remove("open");
        setPressed("artifactsToggle", false);
      };

      const openToolsLauncher = () => {
        $("workspaceSurface").classList.remove("open");
        $("tabAddMenu").classList.remove("open");
        $("sideNavPanel").classList.add("open");
        setPressed("artifactsToggle", true);
      };

      const openWorkspaceSurface = (tab = "file") => {
        state.activeWorkspaceTab = tab;
        $("sideNavPanel").classList.remove("open");
        $("workspaceSurface").classList.add("open");
        setPressed("artifactsToggle", true);
        $("fileTab").classList.toggle("active", tab === "file");
        $("terminalTab").classList.toggle("active", tab === "terminal");
        $("terminalTab").classList.toggle("hidden", !state.terminalLines.length && tab !== "terminal");
        $("workspacePathbar").textContent = state.selectedFile?.relativePath || state.status?.workspacePath || "/";
        renderWorkspaceContent();
      };

      const escapeHtml = (value) =>
        String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");

      const renderMarkdownish = (content) => {
        const lines = String(content || "").split("\n");
        const html = [];
        let listOpen = false;
        let codeOpen = false;
        for (const line of lines) {
          if (line.startsWith("```")) {
            html.push(codeOpen ? "</code></pre>" : "<pre><code>");
            codeOpen = !codeOpen;
            continue;
          }
          if (codeOpen) {
            html.push(`${escapeHtml(line)}\n`);
            continue;
          }
          const trimmed = line.trim();
          if (!trimmed) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            continue;
          }
          if (trimmed.startsWith("# ")) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(`<h1>${escapeHtml(trimmed.slice(2))}</h1>`);
          } else if (trimmed.startsWith("## ")) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(`<h2>${escapeHtml(trimmed.slice(3))}</h2>`);
          } else if (trimmed.startsWith("- ")) {
            if (!listOpen) {
              html.push("<ul>");
              listOpen = true;
            }
            html.push(`<li>${escapeHtml(trimmed.slice(2))}</li>`);
          } else {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(`<p>${escapeHtml(trimmed).replaceAll(/`([^`]+)`/g, "<code>$1</code>")}</p>`);
          }
        }
        if (listOpen) html.push("</ul>");
        if (codeOpen) html.push("</code></pre>");
        return html.join("");
      };

      const renderWorkspaceContent = () => {
        const content = $("workspaceContent");
        content.innerHTML = "";
        $("fileTabTitle").textContent = state.selectedFile?.name || "Open file";
        $("terminalTab").classList.toggle("hidden", !state.terminalLines.length && state.activeWorkspaceTab !== "terminal");
        $("fileTab").classList.toggle("active", state.activeWorkspaceTab === "file");
        $("terminalTab").classList.toggle("active", state.activeWorkspaceTab === "terminal");
        if (state.activeWorkspaceTab === "terminal") {
          content.innerHTML = `
            <div id="terminalOutput" class="terminal-output"></div>
            <form id="terminalForm" class="terminal-form">
              <span class="terminal-prompt">›</span>
              <input id="terminalInput" autocomplete="off" spellcheck="false" aria-label="Terminal command" />
            </form>
          `;
          const output = $("terminalOutput");
          for (const line of state.terminalLines) {
            const item = document.createElement("div");
            item.textContent = line;
            output.append(item);
          }
          output.scrollTop = output.scrollHeight;
          $("terminalForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            await runTerminalCommand();
          });
          $("terminalInput").focus();
          return;
        }
        if (!state.selectedFile) {
          content.innerHTML = `
            <div class="file-empty">
              ${icons.folder}
              <strong>Open file</strong>
              <span>Select a file from the workspace tree</span>
            </div>
          `;
          return;
        }
        const article = document.createElement("article");
        const isMarkdown = /\.md(?:own)?$/i.test(state.selectedFile.relativePath || state.selectedFile.name || "");
        article.className = isMarkdown ? "file-document" : "file-document file-raw";
        if (isMarkdown) {
          article.innerHTML = renderMarkdownish(state.selectedFile.content);
        } else {
          const pre = document.createElement("pre");
          pre.className = "file-raw";
          pre.textContent = state.selectedFile.content || "";
          article.append(pre);
        }
        content.append(article);
      };

      const renderFileTree = () => {
        const tree = $("fileTree");
        const query = $("fileFilter").value.trim().toLowerCase();
        tree.innerHTML = "";
        const entries = state.fileEntries.filter((entry) => {
          const text = `${entry.relativePath || ""} ${entry.name || ""}`.toLowerCase();
          return !query || text.includes(query);
        });
        if (!entries.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.style.padding = "8px";
          empty.textContent = state.status?.workspacePath ? "No files found" : "Choose a workspace first";
          tree.append(empty);
          return;
        }
        for (const entry of entries) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "file-row";
          row.style.paddingLeft = `${8 + Math.min(5, (entry.relativePath || "").split("/").length - 1) * 14}px`;
          row.innerHTML = `${entry.isDir ? icons.folder : icons.file}<span></span>`;
          row.querySelector("span").textContent = entry.relativePath || entry.name;
          row.title = entry.path;
          if (!entry.isDir) {
            row.addEventListener("click", () => openWorkspaceFile(entry));
          }
          tree.append(row);
        }
      };

      const loadWorkspaceFiles = async () => {
        const tree = $("fileTree");
        tree.innerHTML = "<div class=\"meta\" style=\"padding: 8px\">Loading files...</div>";
        try {
          const response = await call("workspace_file_list", {
            request: {
              profile: null,
              query: $("fileFilter").value,
              limit: 80,
            },
          });
          state.fileEntries = response.entries || [];
          renderFileTree();
        } catch (error) {
          state.fileEntries = [];
          tree.innerHTML = "";
          const item = document.createElement("div");
          item.className = "alert";
          item.style.padding = "8px";
          item.textContent = error.message;
          tree.append(item);
        }
      };

      const openFilesPanel = async () => {
        openWorkspaceSurface("file");
        $("fileFilter").focus();
        await loadWorkspaceFiles();
      };

      const appendTerminalLine = (text, className = "") => {
        state.terminalLines.push(text);
        if (state.activeWorkspaceTab === "terminal") renderWorkspaceContent();
      };

      const openTerminalPanel = () => {
        if (!state.terminalLines.length) {
          appendTerminalLine(state.status?.workspacePath || "Workspace not set");
        }
        openWorkspaceSurface("terminal");
      };

      const openWorkspaceFile = async (entry) => {
        try {
          const response = await call("workspace_file_read", {
            request: {
              profile: null,
              path: entry.path,
            },
          });
          state.selectedFile = {
            ...entry,
            name: response.relativePath.split("/").pop() || entry.name,
            relativePath: response.relativePath,
            content: response.content,
          };
          $("workspacePathbar").textContent = response.relativePath;
          openWorkspaceSurface("file");
        } catch (error) {
          setError("composerError", error.message);
        }
      };

      const runTerminalCommand = async () => {
        const input = $("terminalInput");
        const command = input.value.trim();
        if (!command || state.terminalRunning) return;
        input.value = "";
        state.terminalRunning = true;
        input.disabled = true;
        appendTerminalLine(`› ${command}`);
        try {
          const response = await call("terminal_command", {
            request: {
              profile: null,
              command,
            },
          });
          if (response.stdout) appendTerminalLine(response.stdout.trimEnd());
          if (response.stderr) appendTerminalLine(response.stderr.trimEnd());
          if (response.timedOut) appendTerminalLine("Command timed out after 30s");
          else if (response.exitCode && response.exitCode !== 0) {
            appendTerminalLine(`Exited with code ${response.exitCode}`);
          }
        } catch (error) {
          appendTerminalLine(error.message);
        } finally {
          state.terminalRunning = false;
          const nextInput = $("terminalInput");
          if (nextInput) {
            nextInput.disabled = false;
            nextInput.focus();
          }
        }
      };

      const fileDisplayName = (entry) =>
        entry?.name || String(entry?.relativePath || entry?.path || "").split(/[\\/]/).pop() || "file";

      const renderMentionChips = () => {
        const chips = $("mentionChips");
        chips.innerHTML = "";
        chips.classList.toggle("open", state.selectedFiles.length > 0);
        for (const file of state.selectedFiles) {
          const chip = document.createElement("a");
          chip.className = "mention-chip";
          chip.href = "#";
          chip.title = file.relativePath || file.path;
          chip.innerHTML = `${file.isDir ? icons.folder : icons.file}<span></span><button type="button" aria-label="Remove selected file">x</button>`;
          chip.querySelector("span").textContent = fileDisplayName(file);
          chip.addEventListener("click", (event) => event.preventDefault());
          chip.querySelector("button").addEventListener("click", (event) => {
            event.preventDefault();
            state.selectedFiles = state.selectedFiles.filter((item) => item.path !== file.path);
            renderMentionChips();
          });
          chips.append(chip);
        }
      };

      const closeMentionMenu = () => {
        state.mentionOptions = [];
        state.selectedMentionIndex = 0;
        state.mentionRange = null;
        $("mentionMenu").classList.remove("open");
        $("mentionMenu").innerHTML = "";
      };

      const renderMentionMenu = () => {
        const menu = $("mentionMenu");
        menu.innerHTML = "";
        if (!state.mentionOptions.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.style.padding = "8px";
          empty.textContent = state.status?.workspacePath ? "No matching files" : "Choose a workspace first";
          menu.append(empty);
          menu.classList.add("open");
          return;
        }
        state.mentionOptions.forEach((entry, index) => {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "mention-option";
          option.setAttribute("role", "option");
          option.setAttribute("aria-selected", String(index === state.selectedMentionIndex));
          option.innerHTML = `${entry.isDir ? icons.folder : icons.file}<span></span>`;
          option.querySelector("span").textContent = entry.relativePath || fileDisplayName(entry);
          option.addEventListener("click", () => selectMentionOption(index));
          menu.append(option);
        });
        menu.classList.add("open");
      };

      const activeMentionQuery = () => {
        const input = $("composer");
        const cursor = input.selectionStart || 0;
        const before = input.value.slice(0, cursor);
        const match = before.match(/(^|\s)@([^\s@]*)$/);
        if (!match) return null;
        const start = cursor - match[2].length - 1;
        return { start, end: cursor, query: match[2] };
      };

      const refreshMentionOptions = async () => {
        const mention = activeMentionQuery();
        if (!mention) {
          closeMentionMenu();
          return;
        }
        state.mentionRange = mention;
        try {
          const response = await call("workspace_file_list", {
            request: {
              profile: null,
              query: mention.query,
              limit: 40,
            },
          });
          const selected = new Set(state.selectedFiles.map((file) => file.path));
          state.mentionOptions = (response.entries || []).filter((entry) => !selected.has(entry.path));
          state.selectedMentionIndex = 0;
          renderMentionMenu();
        } catch (error) {
          state.mentionOptions = [];
          renderMentionMenu();
        }
      };

      const selectMentionOption = (index = state.selectedMentionIndex) => {
        const entry = state.mentionOptions[index];
        if (!entry || !state.mentionRange) return;
        state.selectedFiles = [
          ...state.selectedFiles.filter((item) => item.path !== entry.path),
          entry,
        ];
        const input = $("composer");
        const before = input.value.slice(0, state.mentionRange.start);
        const after = input.value.slice(state.mentionRange.end);
        const spacer = before && !before.endsWith(" ") ? " " : "";
        input.value = `${before}${spacer}${after}`.replace(/\s{2,}/g, " ");
        input.focus();
        input.selectionStart = input.selectionEnd = Math.min(input.value.length, before.length + spacer.length);
        renderMentionChips();
        closeMentionMenu();
      };

      const setWorkspacePicking = (picking) => {
        state.workspacePicking = picking;
        const chooseButton = $("chooseWorkspace");
        if (chooseButton) {
          chooseButton.disabled = picking;
          chooseButton.textContent = picking ? "Choosing..." : "Choose";
        }
      };

      const loadLocalRuns = () => {
        try {
          const parsed = JSON.parse(localStorage.getItem(storageKey) || "{}");
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      };

      const saveLocalRuns = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state.workflowRuns));
        } catch {
          /* localStorage can be unavailable in restricted webviews */
        }
      };

      const runsForWorkflow = (workflowId) =>
        (state.workflowRuns[workflowId] || [])
          .slice()
          .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

      const upsertRun = (run) => {
        if (!run.workflowId || !run.executionId) return;
        const runs = runsForWorkflow(run.workflowId);
        const index = runs.findIndex((item) => item.executionId === run.executionId);
        const next = {
          ...(index >= 0 ? runs[index] : {}),
          ...run,
          updatedAt: run.updatedAt ?? (index >= 0 ? runs[index].updatedAt : Date.now()),
        };
        if (index >= 0) runs.splice(index, 1, next);
        else runs.unshift(next);
        state.workflowRuns[run.workflowId] = runs.slice(0, 12);
        saveLocalRuns();
        renderWorkflowList();
      };

      const summarizeRun = (execution) => {
        const output = execution?.output || execution?.outputs || {};
        const result = output.result || {};
        return result.summary || output.summary?.text || output.summary || "";
      };

      const runTimestamp = (execution) => {
        const parsed = Date.parse(
          execution?.updatedAt ||
            execution?.updated_at ||
            execution?.finishedAt ||
            execution?.completedAt ||
            execution?.createdAt ||
            "",
        );
        return Number.isFinite(parsed) ? parsed : Date.now();
      };

      const changedFiles = (execution) => {
        const output = execution?.output || {};
        const result = output.result || {};
        const nodeOutputs = output.nodeOutputs || {};
        const files = new Set();
        for (const value of [
          result.changedFiles,
          nodeOutputs.end?.changedFiles,
          nodeOutputs.backend_developer?.changedFiles,
          nodeOutputs.technical_lead?.changedFiles,
        ]) {
          if (Array.isArray(value)) value.forEach((item) => files.add(String(item)));
        }
        if (Array.isArray(nodeOutputs.backend_developer?.files)) {
          nodeOutputs.backend_developer.files.forEach((file) => {
            if (file?.path) files.add(String(file.path));
          });
        }
        return Array.from(files);
      };

      const runFromExecution = (execution, fallbackWorkflowId) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return null;
        return {
          workflowId: execution.workflowId || execution.workflow_id || fallbackWorkflowId,
          executionId,
          status: cleanStatus(execution.status),
          prompt:
            execution.input?.prompt ||
            execution.inputs?.prompt ||
            execution.input?.message ||
            execution.inputs?.message ||
            "",
          summary: summarizeRun(execution),
          changedFiles: changedFiles(execution),
          updatedAt: runTimestamp(execution),
        };
      };

      const replaceRunsForWorkflow = (workflowId, backendRuns) => {
        const backendIds = new Set(backendRuns.map((run) => run.executionId));
        const cachedPending = runsForWorkflow(workflowId).filter(
          (run) =>
            run.executionId &&
            !backendIds.has(run.executionId) &&
            !terminalExecutionStatuses.has(cleanStatus(run.status)),
        );
        state.workflowRuns[workflowId] = [...backendRuns, ...cachedPending]
          .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
          .slice(0, 12);
      };

      const setRunChrome = (run) => {
        const workflow = selectedWorkflow();
        const status = cleanStatus(run?.status || state.currentExecution?.status);
        $("runStatusDot").className = `status-dot ${status === "ready" ? "ready" : status}`;
        $("runStatePill").textContent = statusLabel(status);
        $("chatTitle").textContent = workflow ? workflowName(workflow) : "Select a workflow";
        $("composerRunMeta").textContent = run?.executionId
          ? `Run ${shortenId(run.executionId)}`
          : "No active run";
        const panelStatus = $("workflowPanelStatus");
        if (panelStatus) {
          panelStatus.textContent = run?.executionId ? statusLabel(status) : "Ready";
        }
        const panelDot = $("workflowPanelDot");
        if (panelDot) {
          panelDot.className = `status-dot ${status === "ready" ? "ready" : status}`;
        }
      };

      const workflowGraphNodes = [
        ["runner", "Runner"],
        ["start", "Prompt"],
        ["backend_developer", "Backend Developer"],
        ["technical_lead", "Technical Lead"],
        ["end", "Report"],
      ];

      const renderWorkflowGraph = (execution = state.currentExecution) => {
        const graph = $("workflowGraph");
        if (!graph) return;
        const outputs = execution?.output?.nodeOutputs || {};
        const status = cleanStatus(execution?.status || "ready");
        const panelStatus = $("workflowPanelStatus");
        if (panelStatus) {
          panelStatus.textContent = execution?.id ? statusLabel(status) : "Ready";
        }
        const panelDot = $("workflowPanelDot");
        if (panelDot) {
          panelDot.className = `status-dot ${status === "ready" ? "ready" : status}`;
        }
        const activeIndex = !execution
          ? -1
          : terminalExecutionStatuses.has(status)
          ? -1
          : Math.min(
              workflowGraphNodes.length - 1,
              workflowGraphNodes.findIndex(([key]) => !outputs[key] && key !== "runner"),
            );
        graph.innerHTML = "";
        workflowGraphNodes.forEach(([key, label], index) => {
          const node = document.createElement("div");
          const done = key === "runner" ? Boolean(execution?.id) : Boolean(outputs[key]);
          const active = activeIndex === index || (!done && activeIndex < 0 && index === 0);
          node.className = `workflow-node${done ? " done" : ""}${active ? " active" : ""}`;
          node.textContent = label;
          graph.append(node);
        });
      };

      const renderArtifacts = (files = []) => {
        const list = $("artifactList");
        if (!list) return;
        list.innerHTML = "";
        if (!files.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.textContent = "No artifacts yet";
          list.append(empty);
          return;
        }
        for (const file of files) {
          const item = document.createElement("div");
          item.className = "file-item";
          item.innerHTML = `${icons.file}<span></span>`;
          item.querySelector("span").textContent = file;
          list.append(item);
        }
      };

      const renderStatus = () => {
        const status = state.status || {};
        const authenticated = Boolean(status.authenticated);
        $("loginView").classList.toggle("hidden", authenticated);
        $("chatView").classList.toggle("hidden", !authenticated);
        $("serverText").textContent = status.serverUrl || "Loomex runner-control credentials";
        const workspaceCurrent = $("workspaceCurrent");
        const workspacePath = $("workspacePath");
        if (workspaceCurrent) {
          workspaceCurrent.textContent = status.workspacePath || "No local directory selected";
        }
        if (workspacePath) {
          workspacePath.value = status.workspacePath || workspacePath.value || "";
        }
        $("composerWorkspace").textContent = status.workspacePath || "Workspace not set";
        $("profileName").textContent = "Vency technicalai";
        $("profileDetail").textContent = "Pro";
      };

      const refreshStatus = async () => {
        state.status = await call("runner_status", { profile: null });
        renderStatus();
        return state.status;
      };

      const loadWorkflows = async () => {
        const response = await call("workflow_list", { request: { profile: null } });
        state.workflows = response.workflows || [];
        if (!state.selectedWorkflowId && state.workflows.length) {
          state.selectedWorkflowId = state.workflows[0].id;
        }
        await loadWorkflowRunHistory();
        renderWorkflowList();
        renderSelectedWorkflow();
        setRunChrome(null);
        renderWorkflowGraph(null);
      };

      const loadWorkflowRunHistory = async () => {
        const workflowIds = state.workflows.map((workflow) => workflow.id).filter(Boolean);
        for (const workflowId of workflowIds) {
          try {
            const response = await call("workflow_run_list", {
              request: {
                profile: null,
                workflowId,
                limit: 12,
              },
            });
            const executions = response?.result?.executions || [];
            const backendRuns = executions
              .map((execution) => runFromExecution(execution, workflowId))
              .filter(Boolean);
            replaceRunsForWorkflow(workflowId, backendRuns);
          } catch {
            /* Keep local run cache when backend history is temporarily unavailable. */
          }
        }
        saveLocalRuns();
      };

      const closeWorkflowMenu = () => {
        state.workflowMenuId = null;
        const menu = $("workflowMenu");
        menu.classList.remove("open");
        menu.setAttribute("aria-hidden", "true");
      };

      const openWorkflowMenu = (workflowId, anchor) => {
        state.workflowMenuId = workflowId;
        const menu = $("workflowMenu");
        const rect = anchor.getBoundingClientRect();
        menu.style.left = `${Math.max(8, rect.right - 118)}px`;
        menu.style.top = `${rect.bottom + 6}px`;
        menu.classList.add("open");
        menu.setAttribute("aria-hidden", "false");
      };

      const toggleWorkflowCollapsed = (workflowId) => {
        if (state.collapsedWorkflows.has(workflowId)) {
          state.collapsedWorkflows.delete(workflowId);
        } else {
          state.collapsedWorkflows.add(workflowId);
        }
        renderWorkflowList();
      };

      const openRunModal = (workflowId) => {
        const workflow = state.workflows.find((item) => item.id === workflowId);
        state.runModalWorkflowId = workflowId;
        state.runModalWorkspacePath = state.status?.workspacePath || "";
        $("runModalTitle").textContent = `Run ${workflow ? workflowName(workflow) : "workflow"}`;
        $("runWorkspacePath").textContent = state.runModalWorkspacePath || "No workspace selected";
        setError("runModalError", "");
        $("runModal").classList.add("open");
        $("runModal").setAttribute("aria-hidden", "false");
      };

      const closeRunModal = () => {
        state.runModalWorkflowId = null;
        state.runModalWorkspacePath = "";
        $("runModal").classList.remove("open");
        $("runModal").setAttribute("aria-hidden", "true");
        setError("runModalError", "");
      };

      const renderWorkflowList = () => {
        const list = $("workflowList");
        list.innerHTML = "";
        if (!state.workflows.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.textContent = "No workflows available";
          list.append(empty);
          return;
        }
        for (const workflow of state.workflows) {
          const block = document.createElement("div");
          block.className = "workflow-block";
          block.classList.toggle("collapsed", state.collapsedWorkflows.has(workflow.id));

          const item = document.createElement("div");
          item.className = "workflow-item";
          item.setAttribute("role", "option");
          item.setAttribute("aria-pressed", String(workflow.id === state.selectedWorkflowId));

          const mainButton = document.createElement("button");
          mainButton.type = "button";
          mainButton.className = "workflow-main";
          mainButton.innerHTML = `<span class="workflow-icon">${icons.workflow}</span><span class="workflow-text"><strong></strong><span></span></span><span class="workflow-collapse">${icons.chevron}</span>`;
          mainButton.querySelector("strong").textContent = workflowName(workflow);
          const workflowSubtitle = mainButton.querySelector(".workflow-text span");
          const description = workflow.description && workflow.description !== workflow.id
            ? workflow.description
            : "";
          if (description) {
            workflowSubtitle.textContent = description;
          } else {
            workflowSubtitle.remove();
          }
          mainButton.addEventListener("click", () => selectWorkflow(workflow.id));
          mainButton.querySelector(".workflow-collapse").addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            toggleWorkflowCollapsed(workflow.id);
          });
          item.append(mainButton);

          const actions = document.createElement("div");
          actions.className = "workflow-actions";
          const playButton = document.createElement("button");
          playButton.type = "button";
          playButton.className = "workflow-action";
          playButton.setAttribute("aria-label", `Run ${workflowName(workflow)}`);
          playButton.innerHTML = icons.play;
          playButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            selectWorkflow(workflow.id);
            openRunModal(workflow.id);
          });
          const menuButton = document.createElement("button");
          menuButton.type = "button";
          menuButton.className = "workflow-action";
          menuButton.setAttribute("aria-label", `More actions for ${workflowName(workflow)}`);
          menuButton.innerHTML = icons.more;
          menuButton.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            if (state.workflowMenuId === workflow.id && $("workflowMenu").classList.contains("open")) {
              closeWorkflowMenu();
            } else {
              openWorkflowMenu(workflow.id, menuButton);
            }
          });
          actions.append(playButton, menuButton);
          item.append(actions);
          block.append(item);

          const runs = runsForWorkflow(workflow.id).slice(0, 5);
          if (runs.length) {
            const runList = document.createElement("div");
            runList.className = "run-list";
            for (const run of runs) {
              const runButton = document.createElement("button");
              runButton.type = "button";
              runButton.className = "run-item";
              runButton.setAttribute("aria-pressed", String(run.executionId === state.selectedRunId));
              const status = cleanStatus(run.status);
              runButton.innerHTML = `<span class="run-dot ${status}"></span><span class="run-text"><span class="run-title"></span><span class="run-meta"></span></span>`;
              runButton.querySelector(".run-title").textContent =
                run.prompt || run.summary || "Workflow run";
              runButton.querySelector(".run-meta").textContent = statusLabel(status);
              runButton.addEventListener("click", () => openRun(workflow.id, run.executionId));
              runList.append(runButton);
            }
            block.append(runList);
          }
          list.append(block);
        }
      };

      const renderSelectedWorkflow = () => {
        const workflow = selectedWorkflow();
        $("selectedWorkflow").textContent = workflow
          ? `/${workflowName(workflow)}`
          : "No workflow selected";
        $("chatTitle").textContent = workflow ? workflowName(workflow) : "Select a workflow";
      };

      const selectWorkflow = (workflowId) => {
        state.selectedWorkflowId = workflowId;
        state.selectedRunId = null;
        state.renderedNodes = new Set();
        state.selectedFiles = [];
        renderMentionChips();
        closeMentionMenu();
        renderWorkflowList();
        renderSelectedWorkflow();
        renderEmptyState();
        setRunChrome(null);
        renderArtifacts();
        renderWorkflowGraph(null);
      };

      const renderEmptyState = () => {
        $("transcript").innerHTML = "";
        const workflow = selectedWorkflow();
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = "<h1></h1><div class=\"meta\"></div>";
        empty.querySelector("h1").textContent = workflow ? workflowName(workflow) : "Loomex Runner";
        empty.querySelector(".meta").textContent = workflow
          ? "Run a prompt to start this workflow."
          : "Choose a workflow from the sidebar.";
        $("transcript").append(empty);
      };

      const clearTranscript = () => {
        $("transcript").innerHTML = "";
        state.renderedNodes = new Set();
      };

      const appendMessage = (role, text, meta = "") => {
        const item = document.createElement("article");
        item.className = `message ${role}`;
        const metaEl = document.createElement("div");
        metaEl.className = "message-meta";
        metaEl.textContent = meta || (role === "user" ? "You" : "Loomex");
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.textContent = text;
        item.append(metaEl, bubble);
        $("transcript").append(item);
        $("transcript").scrollTop = $("transcript").scrollHeight;
        return { item, metaEl, bubble };
      };

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const shouldReduceMotion = () =>
        window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches;

      const typeText = async (element, text) => {
        const value = String(text || "");
        if (!value || shouldReduceMotion()) {
          element.textContent = value;
          return;
        }
        element.textContent = "";
        const chunkSize = value.length > 480 ? 12 : 4;
        for (let index = 0; index < value.length; index += chunkSize) {
          element.textContent += value.slice(index, index + chunkSize);
          $("transcript").scrollTop = $("transcript").scrollHeight;
          await sleep(12);
        }
      };

      const formatDuration = (milliseconds) => {
        if (!Number.isFinite(milliseconds) || milliseconds < 0) return "";
        const totalSeconds = Math.max(1, Math.round(milliseconds / 1000));
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        if (minutes <= 0) return `${seconds}s`;
        return `${minutes}m ${seconds}s`;
      };

      const executionDurationText = (execution) => {
        const started = Date.parse(execution.startedAt || execution.createdAt || "");
        const finished = Date.parse(
          execution.finishedAt || execution.completedAt || execution.updatedAt || "",
        );
        const duration = formatDuration(finished - started);
        return duration ? `Worked for ${duration}` : "";
      };

      const appendRunDuration = (execution) => {
        const id = `${execution.id}:duration`;
        if (state.renderedNodes.has(id)) return;
        const text = executionDurationText(execution);
        if (!text) return;
        state.renderedNodes.add(id);
        const item = document.createElement("div");
        item.className = "run-duration";
        item.textContent = text;
        $("transcript").append(item);
      };

      const formatJsonish = (value) => {
        if (value === null || value === undefined || value === "") return "";
        if (typeof value === "string") {
          try {
            return JSON.stringify(JSON.parse(value), null, 2);
          } catch {
            return value.trim();
          }
        }
        return JSON.stringify(value, null, 2);
      };

      const nodeMessageText = (key, output, execution) => {
        if (key === "runner") {
          return `Execution ${execution.id || ""} accepted by Loomex.`;
        }
        if (key === "start") {
          return output.prompt || output.message || "Prompt received.";
        }
        if (key === "backend_developer") {
          const files = Array.isArray(output.changedFiles) ? output.changedFiles : [];
          const fileLine = files.length ? `\nChanged files: ${files.join(", ")}` : "";
          return `${output.summary || "Backend implementation completed."}${fileLine}`;
        }
        if (key === "technical_lead") {
          const approval =
            typeof output.approved === "boolean" ? `Approved: ${output.approved}` : "Review completed.";
          return `${approval}\n${output.reason || output.reviewReason || ""}`.trim();
        }
        if (key === "review_gate") {
          const status = output.status || "evaluated";
          const approved = output.inputs?.approved;
          return `Review gate ${status}.${typeof approved === "boolean" ? `\nApproved branch: ${approved}` : ""}`;
        }
        if (key === "end") {
          const files = Array.isArray(output.changedFiles) ? output.changedFiles : [];
          const lines = [
            output.summary || summarizeRun(execution) || "Workflow completed.",
            typeof output.approved === "boolean" ? `Approved: ${output.approved}` : "",
            output.reviewReason || "",
            files.length ? `Changed files: ${files.join(", ")}` : "",
          ];
          return lines.filter(Boolean).join("\n");
        }
        return formatJsonish(output);
      };

      const nodeLabel = (key) =>
        ({
          runner: "Runner",
          start: "Prompt",
          backend_developer: "Backend Developer",
          technical_lead: "Technical Lead",
          review_gate: "Review Gate",
          end: "Implementation Report",
        })[key] || key;

      const nodeInitial = (key) =>
        ({
          runner: "R",
          start: "P",
          backend_developer: "B",
          technical_lead: "T",
          review_gate: "G",
          end: "F",
        })[key] || "N";

      const appendNodeMessage = async (key, output, execution, animate = true) => {
        const id = `${execution.id}:${key}`;
        if (state.renderedNodes.has(id)) return;
        state.renderedNodes.add(id);
        const item = document.createElement("article");
        item.className = "message node done";
        item.innerHTML = `
          <div class="bubble node-card">
            <div class="node-header">
              <div class="node-title">
                <span class="node-avatar" aria-hidden="true">${nodeInitial(key)}</span>
                <strong></strong>
              </div>
              <span class="node-status"></span>
            </div>
            <div class="node-content"></div>
          </div>
        `;
        item.querySelector("strong").textContent = nodeLabel(key);
        item.querySelector(".node-status").textContent = key === "end" ? "final" : "done";
        const content = item.querySelector(".node-content");
        $("transcript").append(item);
        $("transcript").scrollTop = $("transcript").scrollHeight;
        const text = nodeMessageText(key, output, execution);
        if (animate) {
          item.classList.add("typing");
          await typeText(content, text);
        } else {
          content.textContent = text;
        }
        item.classList.remove("typing");

        if (key === "backend_developer" && Array.isArray(output.files) && output.files.length) {
          const first = output.files[0];
          if (first?.content) {
            const block = document.createElement("div");
            block.className = "code-block";
            block.innerHTML = "<div class=\"code-label\"></div><pre></pre>";
            block.querySelector(".code-label").textContent = first.path || "file";
            block.querySelector("pre").textContent = first.content;
            item.querySelector(".node-card").append(block);
          }
        }
      };

      const appendActiveNode = (execution, label = "Working") => {
        const id = `${execution.id}:active`;
        let item = document.querySelector(`[data-active-run="${id}"]`);
        if (!item) {
          item = document.createElement("article");
          item.className = "message node typing";
          item.dataset.activeRun = id;
          item.innerHTML = `
            <div class="bubble node-card">
              <div class="node-header">
                <div class="node-title">
                  <span class="node-avatar" aria-hidden="true">R</span>
                  <strong>Workflow</strong>
                </div>
                <span class="node-status">thinking</span>
              </div>
              <div class="node-content"></div>
            </div>
          `;
          $("transcript").append(item);
        }
        item.querySelector(".node-content").innerHTML = `
          <span class="thinking-row">
            <span></span>
            <span class="thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </span>
        `;
        item.querySelector(".thinking-row > span:first-child").textContent = label;
        $("transcript").scrollTop = $("transcript").scrollHeight;
      };

      const removeActiveNode = (execution) => {
        document.querySelector(`[data-active-run="${execution.id}:active"]`)?.remove();
      };

      const appendTerminalMessage = (execution, status) => {
        const id = `${execution.id}:terminal:${status}`;
        if (state.renderedNodes.has(id)) return;
        state.renderedNodes.add(id);
        if (status === "failed") {
          const detail = formatJsonish(execution.error) || "Workflow failed.";
          const message = detail === "Workflow failed." ? detail : `Workflow failed.\n${detail}`;
          const { item } = appendMessage("system", message, "Failed");
          item.classList.add("failed");
        } else if (status === "canceled") {
          appendMessage("system", "Workflow was canceled.", "Canceled");
        }
      };

      const renderExecutionTimeline = async (execution, animate = true) => {
        state.currentExecution = execution;
        const status = cleanStatus(execution.status);
        const workflowId = execution.workflowId || execution.workflow_id || state.selectedWorkflowId;
        const executionId = execution.id || execution.executionId;
        const prompt = execution.input?.prompt || execution.inputs?.prompt || "";
        const summary = summarizeRun(execution);
        const files = changedFiles(execution);
        upsertRun({
          workflowId,
          executionId,
          status,
          prompt,
          summary,
          changedFiles: files,
        });
        setRunChrome({ executionId, status, summary });
        renderArtifacts(files);
        renderWorkflowGraph(execution);

        const nodeOutputs = execution.output?.nodeOutputs || {};
        if (terminalExecutionStatuses.has(status)) {
          appendRunDuration(execution);
        }
        if (!state.renderedNodes.has(`${executionId}:runner`)) {
          await appendNodeMessage("runner", {}, execution, animate);
        }
        for (const key of ["start", "backend_developer", "technical_lead", "review_gate", "end"]) {
          if (nodeOutputs[key]) {
            await appendNodeMessage(key, nodeOutputs[key], execution, animate);
          }
        }
        if (terminalExecutionStatuses.has(status)) {
          removeActiveNode(execution);
          appendTerminalMessage(execution, status);
        } else if (!nodeOutputs.end) {
          appendActiveNode(execution, status === "queued" ? "Waiting for runner..." : "Thinking");
        }
      };

      const executionFromDetailResponse = (response) => response?.result?.execution || {};

      const pollExecution = async (executionId) => {
        if (!executionId || executionId === "execution") return;
        for (let attempt = 0; attempt < 240; attempt += 1) {
          await sleep(attempt === 0 ? 700 : 2000);
          const response = await call("workflow_run_detail", {
            request: {
              profile: null,
              executionId,
            },
          });
          const execution = executionFromDetailResponse(response);
          await renderExecutionTimeline(execution, true);
          if (terminalExecutionStatuses.has(cleanStatus(execution.status))) return;
        }
      };

      const syncPendingRuns = async () => {
        const pending = [];
        for (const [workflowId, runs] of Object.entries(state.workflowRuns || {})) {
          for (const run of runs || []) {
            if (!terminalExecutionStatuses.has(cleanStatus(run.status)) && run.executionId) {
              pending.push({ workflowId, executionId: run.executionId });
            }
          }
        }
        for (const item of pending.slice(0, 16)) {
          try {
            const response = await call("workflow_run_detail", {
              request: { profile: null, executionId: item.executionId },
            });
            const execution = {
              ...executionFromDetailResponse(response),
              id: item.executionId,
              workflowId: item.workflowId,
            };
            const status = cleanStatus(execution.status);
            upsertRun({
              workflowId: item.workflowId,
              executionId: item.executionId,
              status,
              summary: summarizeRun(execution),
              changedFiles: changedFiles(execution),
            });
            if (state.selectedRunId === item.executionId) {
              await renderExecutionTimeline(execution, false);
            }
          } catch {
            /* Keep the cached state when the backend is temporarily unavailable. */
          }
        }
      };

      const openRun = async (workflowId, executionId) => {
        state.selectedWorkflowId = workflowId;
        state.selectedRunId = executionId;
        renderWorkflowList();
        renderSelectedWorkflow();
        clearTranscript();
        const localRun = runsForWorkflow(workflowId).find((run) => run.executionId === executionId);
        if (localRun?.prompt) appendMessage("user", localRun.prompt, workflowName(selectedWorkflow()));
        try {
          const response = await call("workflow_run_detail", {
            request: { profile: null, executionId },
          });
          await renderExecutionTimeline(executionFromDetailResponse(response), false);
        } catch (error) {
          appendMessage("system", error.message, "Error");
        }
      };

      const persistWorkspace = async (path) => {
        const cleanPath = (path || "").trim();
        if (!cleanPath) throw new Error("Workspace path is required");
        const response = await call("workspace_set", {
          request: { profile: null, workspacePath: cleanPath },
        });
        await refreshStatus();
        setNotice(`Workspace saved: ${response.workspacePath}`);
      };

      const chooseWorkspace = async () => {
        if (state.workspacePicking) return;
        setError("composerError", "");
        setNotice("");
        setWorkspacePicking(true);
        try {
          const result = await call("workspace_pick_directory");
          if (result.selected && result.path) {
            const workspacePath = $("workspacePath");
            if (workspacePath) {
              workspacePath.value = result.path;
            }
            await persistWorkspace(result.path);
          } else {
            await call("workspace_picker_cancel", { request: { profile: null } });
            setNotice("Workspace selection cancelled");
          }
        } catch (error) {
          setError("composerError", error.message);
        } finally {
          setWorkspacePicking(false);
        }
      };

      const runWorkflow = async ({
        workflow,
        prompt,
        workspacePath = state.status?.workspacePath || null,
        selectedFiles = [],
        errorTarget = "composerError",
      }) => {
        state.sending = true;
        $("send").disabled = true;
        clearTranscript();
        appendMessage("user", prompt, workflowName(workflow));
        closeMentionMenu();
        try {
          const response = await call("workflow_run_chat", {
            request: {
              profile: null,
              workflowId: workflow.id,
              prompt,
              selectedFiles,
              workspacePath,
            },
          });
          const execution = response.result?.execution || {};
          const executionId = execution.id || execution.executionId || "execution";
          state.selectedRunId = executionId;
          upsertRun({
            workflowId: workflow.id,
            executionId,
            status: execution.status || "queued",
            prompt,
            summary: "",
          });
          await renderExecutionTimeline(
            {
              ...execution,
              id: executionId,
              workflowId: workflow.id,
              input: { prompt },
            },
            true,
          );
          await pollExecution(executionId);
          await call("approval_list").catch(() => null);
        } catch (error) {
          appendMessage("system", error.message, "Error");
          setError(errorTarget, error.message);
        } finally {
          state.sending = false;
          $("send").disabled = false;
        }
      };

      const sendMessage = async () => {
        const workflow = selectedWorkflow();
        const prompt = $("composer").value.trim();
        if (!workflow) {
          setError("composerError", "Choose a workflow first");
          return;
        }
        if (!prompt) {
          setError("composerError", "Enter a message for the selected workflow");
          return;
        }
        setError("composerError", "");
        setNotice("");
        const selectedFiles = state.selectedFiles.map((file) => file.path);
        $("composer").value = "";
        state.selectedFiles = [];
        renderMentionChips();
        await runWorkflow({
          workflow,
          prompt,
          selectedFiles,
          workspacePath: state.status?.workspacePath || null,
        });
      };

      const wireSidebarResizer = () => {
        const resizer = $("sidebarResizer");
        if (!resizer) return;

        let resizing = false;

        const stopResize = () => {
          if (!resizing) return;
          resizing = false;
          resizer.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
        };

        const resizeToPointer = (event) => {
          if (!resizing) return;
          if ($("chatView").classList.contains("nav-collapsed")) return;
          setSidebarWidth(event.clientX);
        };

        resizer.addEventListener("pointerdown", (event) => {
          if (window.innerWidth <= 820) return;
          if ($("chatView").classList.contains("nav-collapsed")) return;
          resizing = true;
          resizer.classList.add("dragging");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
          resizer.setPointerCapture(event.pointerId);
          resizeToPointer(event);
        });

        resizer.addEventListener("pointermove", resizeToPointer);
        resizer.addEventListener("pointerup", stopResize);
        resizer.addEventListener("pointercancel", stopResize);

        resizer.addEventListener("keydown", (event) => {
          const current = Number(resizer.getAttribute("aria-valuenow")) || loadSidebarWidth();
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            setSidebarWidth(current - (event.shiftKey ? 40 : 16));
          } else if (event.key === "ArrowRight") {
            event.preventDefault();
            setSidebarWidth(current + (event.shiftKey ? 40 : 16));
          } else if (event.key === "Home") {
            event.preventDefault();
            setSidebarWidth(sidebarWidthBounds.min);
          } else if (event.key === "End") {
            event.preventDefault();
            setSidebarWidth(maxSidebarWidth());
          }
        });

        window.addEventListener("resize", () => setSidebarWidth(loadSidebarWidth(), false));
        setSidebarWidth(loadSidebarWidth(), false);
      };

      const wireNavToggle = () => {
        setNavCollapsed(loadNavCollapsed(), false);
        $("navToggle").addEventListener("click", () => {
          setNavCollapsed(!$("chatView").classList.contains("nav-collapsed"));
        });
        $("navRevealZone").addEventListener("mouseenter", () => {
          if ($("chatView").classList.contains("nav-collapsed")) {
            $("chatView").classList.add("nav-revealed");
          }
        });
        document.querySelector(".sidebar").addEventListener("mouseleave", () => {
          $("chatView").classList.remove("nav-revealed");
        });
      };

      wireNavToggle();
      wireSidebarResizer();

      $("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        setError("loginError", "");
        try {
          await call("login_workspace", {
            request: {
              profile: null,
              email: $("loginEmail").value,
              password: $("loginPassword").value,
            },
          });
          await refreshStatus();
          await loadWorkflows();
          renderEmptyState();
        } catch (error) {
          setError("loginError", error.message);
        }
      });

      $("profileToggle").addEventListener("click", () => {
        const popover = $("profilePopover");
        const open = !popover.classList.contains("open");
        popover.classList.toggle("open", open);
        $("profileToggle").setAttribute("aria-expanded", String(open));
      });
      $("sideNavToggle").addEventListener("click", () => {
        const panel = $("artifactsPopover");
        const open = !panel.classList.contains("open");
        panel.classList.toggle("open", open);
        setPressed("sideNavToggle", open);
      });
      $("openFilesPanel").addEventListener("click", () => {
        openFilesPanel().catch((error) => setError("composerError", error.message));
      });
      $("openTerminalPanel").addEventListener("click", openTerminalPanel);
      $("fileFilter").addEventListener("input", () => {
        if (state.fileEntries.length) renderFileTree();
        else loadWorkspaceFiles().catch(() => null);
      });
      $("fileTab").addEventListener("click", () => openWorkspaceSurface("file"));
      $("terminalTab").addEventListener("click", () => openWorkspaceSurface("terminal"));
      $("tabAdd").addEventListener("click", () => {
        const menu = $("tabAddMenu");
        const rect = $("tabAdd").getBoundingClientRect();
        menu.style.left = `${rect.left}px`;
        menu.style.top = `${rect.bottom + 6}px`;
        menu.classList.toggle("open");
      });
      $("addTerminalTab").addEventListener("click", () => {
        $("tabAddMenu").classList.remove("open");
        openTerminalPanel();
      });
      document.querySelectorAll("[data-tools-panel-resizer]").forEach((resizer) => {
        resizer.addEventListener("pointerdown", startToolsPanelResize);
      });
      $("workflowPanelToggle").addEventListener("click", () => {
        const panel = $("workflowPanel");
        const open = !panel.classList.contains("open");
        panel.classList.toggle("open", open);
        setPressed("workflowPanelToggle", open);
        if (open) renderWorkflowGraph(state.currentExecution);
      });
      $("artifactsToggle").addEventListener("click", () => {
        const launcherOpen = $("sideNavPanel").classList.contains("open");
        const workspaceOpen = $("workspaceSurface").classList.contains("open");
        if (launcherOpen || workspaceOpen) {
          closeToolsPanel();
        } else {
          openToolsLauncher();
        }
      });
      document.addEventListener("click", (event) => {
        if (!$("workflowMenu").contains(event.target)) {
          closeWorkflowMenu();
        }
        if (!$("tabAddMenu").contains(event.target) && !$("tabAdd").contains(event.target)) {
          $("tabAddMenu").classList.remove("open");
        }
      });
      $("workflowEdit").addEventListener("click", () => {
        closeWorkflowMenu();
      });
      $("runModalClose").addEventListener("click", closeRunModal);
      $("runCancel").addEventListener("click", closeRunModal);
      $("runModal").addEventListener("click", (event) => {
        if (event.target === $("runModal")) closeRunModal();
      });
      $("runChooseWorkspace").addEventListener("click", async () => {
        setError("runModalError", "");
        try {
          const result = await call("workspace_pick_directory");
          if (result.selected && result.path) {
            state.runModalWorkspacePath = result.path;
            $("runWorkspacePath").textContent = result.path;
          } else {
            await call("workspace_picker_cancel", { request: { profile: null } });
          }
        } catch (error) {
          setError("runModalError", error.message);
        }
      });
      $("runConfirm").addEventListener("click", async () => {
        const workflow = state.workflows.find((item) => item.id === state.runModalWorkflowId);
        if (!workflow) {
          setError("runModalError", "Choose a workflow first");
          return;
        }
        if (!state.runModalWorkspacePath) {
          setError("runModalError", "Choose a workspace directory");
          return;
        }
        setError("runModalError", "");
        $("runConfirm").disabled = true;
        try {
          const workspacePath = state.runModalWorkspacePath;
          await persistWorkspace(workspacePath);
          closeRunModal();
          state.selectedWorkflowId = workflow.id;
          state.selectedRunId = null;
          renderWorkflowList();
          renderSelectedWorkflow();
          const prompt = $("composer").value.trim() || `Run ${workflowName(workflow)}`;
          $("composer").value = "";
          await runWorkflow({
            workflow,
            prompt,
            workspacePath,
            selectedFiles: [],
            errorTarget: "composerError",
          });
        } catch (error) {
          setError("runModalError", error.message);
        } finally {
          $("runConfirm").disabled = false;
        }
      });
      $("chooseWorkspace")?.addEventListener("click", chooseWorkspace);
      $("saveWorkspace")?.addEventListener("click", async () => {
        try {
          setError("composerError", "");
          await persistWorkspace($("workspacePath").value);
        } catch (error) {
          setError("composerError", error.message);
        }
      });
      $("refreshStatus")?.addEventListener("click", () =>
        refreshStatus().catch((error) => setError("composerError", error.message)),
      );
      $("reloadWorkflows").addEventListener("click", () =>
        loadWorkflows()
          .then(syncPendingRuns)
          .catch((error) => setError("composerError", error.message)),
      );
      $("logout").addEventListener("click", async () => {
        await call("logout", { request: { profile: null, revokeBinding: false } });
        state.workflows = [];
        state.selectedWorkflowId = null;
        state.selectedRunId = null;
        state.currentExecution = null;
        $("transcript").innerHTML = "";
        await refreshStatus();
      });

      $("composer").addEventListener("input", () => {
        setError("composerError", "");
        refreshMentionOptions();
      });

      $("mentionTrigger").addEventListener("click", async () => {
        const input = $("composer");
        input.focus();
        const cursor = input.selectionStart || input.value.length;
        const before = input.value.slice(0, cursor);
        const after = input.value.slice(cursor);
        const prefix = before && !before.endsWith(" ") ? " @" : "@";
        input.value = `${before}${prefix}${after}`;
        const nextCursor = before.length + prefix.length;
        input.selectionStart = input.selectionEnd = nextCursor;
        await refreshMentionOptions();
      });

      $("composer").addEventListener("keydown", (event) => {
        if ($("mentionMenu").classList.contains("open")) {
          if (event.key === "ArrowDown") {
            event.preventDefault();
            if (state.mentionOptions.length) {
              state.selectedMentionIndex = Math.min(
                state.mentionOptions.length - 1,
                state.selectedMentionIndex + 1,
              );
            }
            renderMentionMenu();
            return;
          }
          if (event.key === "ArrowUp") {
            event.preventDefault();
            if (state.mentionOptions.length) {
              state.selectedMentionIndex = Math.max(0, state.selectedMentionIndex - 1);
            }
            renderMentionMenu();
            return;
          }
          if (event.key === "Enter" || event.key === "Tab") {
            event.preventDefault();
            selectMentionOption();
            return;
          }
          if (event.key === "Escape") {
            event.preventDefault();
            closeMentionMenu();
            return;
          }
        }
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          $("composerForm").requestSubmit();
        }
      });

      $("composerForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!state.sending) await sendMessage();
      });

      state.workflowRuns = loadLocalRuns();
      refreshStatus()
        .then(async (status) => {
          if (status.authenticated) {
            await loadWorkflows();
            await syncPendingRuns();
            renderEmptyState();
          }
        })
        .catch((error) => setError("loginError", error.message));
    </script>
  </body>
</html>
