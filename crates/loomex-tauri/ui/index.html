            <details class="node-work-details">
              <summary class="node-work-summary"></summary>
              <div class="node-work-body"></div>
            </details>
            <div class="node-content">
              <span class="node-working-placeholder">
                <span>Working...</span>
                <span class="thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span>
              </span>
            </div>
          </div>
        `;
        item.querySelector("strong").textContent = label || nodeLabel(key);
        item.querySelector(".node-status").textContent = "running";
        updateNodeWorkSummary(item, execution, key);
        const orderedKeys = nodeOrderFromExecution(execution);
        const next = Array.from($("transcript").querySelectorAll(".message.node")).find((node) => {
          const currentIndex = orderedKeys.indexOf(node.dataset.nodeKey || "");
          const nextIndex = orderedKeys.indexOf(String(key || ""));
          return nextIndex >= 0 && currentIndex >= 0 && currentIndex > nextIndex;
        });
        const wasAtBottom = transcriptAtBottom();
        $("transcript").insertBefore(item, next || null);
        maybeScrollTranscriptToBottom(wasAtBottom);
        updateNodeRail(execution);
        ensureDurationTimer();
        return item;
      };

      const appendNodeStep = async (
        execution,
        key,
        label,
        stepLabel,
        text,
        { status = "running", animate = false } = {},
      ) => {
        const executionId = execution?.id || execution?.executionId || "execution";
        const stepId = [
          executionId,
          key,
          stepLabel,
          String(text || "").slice(0, 120),
        ].join(":");
        if (state.renderedNodes.has(stepId)) {
          return document.querySelector(`[data-node-run="${executionId}:${key}"]`);
        }
        state.renderedNodes.add(stepId);
        const technical =
          isTechnicalNodeOutput(key, stepLabel) ||
          (isTechnicalStep(stepLabel) && !isUserVisibleStep(stepLabel, key));
        if (technical) {
          return appendToolLine(execution, key, label, stepLabel, text, status);
        }
        const item = ensureNodeBlock(execution, key, label);
        item.classList.toggle("done", status === "done");
        item.classList.toggle("failed", status === "failed");
        const visibleStatus = status === "done" ? "done" : status === "failed" ? "failed" : "running";
        item.dataset.nodeStatus = visibleStatus;
        item.querySelector(".node-status").textContent = visibleStatus;
        const row = document.createElement("div");
        row.className = `node-step ${status}`;
        const role = "assistant";
        row.innerHTML = `
          <div class="node-message-row ${role}">
            <div class="node-message-bubble">
              <span class="node-step-label"></span>
              <div class="node-step-text"></div>
            </div>
          </div>
        `;
        const stepLabelEl = row.querySelector(".node-step-label");
        const normalizedStepLabel = String(stepLabel || "").toLowerCase();
        const visibleStepLabel =
          normalizedStepLabel === "message" || normalizedStepLabel === "output"
            ? ""
            : stepLabel;
        if (visibleStepLabel) stepLabelEl.textContent = visibleStepLabel;
        else stepLabelEl.remove();
        const textEl = autoDir(row.querySelector(".node-step-text"));
        const wasAtBottom = transcriptAtBottom();
        const content = item.querySelector(".node-content");
        content.querySelector(".node-working-placeholder")?.remove();
        content.append(row);
        if (animate) await typeText(textEl, compactText(text, 1400));
        else textEl.textContent = compactText(text, 1400);
        maybeScrollTranscriptToBottom(wasAtBottom);
        updateNodeRail(execution);
        return item;
      };

      const appendNodeMessage = async (key, output, execution, animate = true) => {
        const id = `${execution.id}:${key}:output`;
        if (state.renderedNodes.has(id)) return;
        state.renderedNodes.add(id);
        const item = await appendNodeStep(execution, key, nodeLabel(key), "output", nodeMessageText(key, output, execution), {
          status: "done",
          animate,
        });
        const statusEl = item?.querySelector(".node-status");
        if (item) item.dataset.nodeStatus = key === "end" ? "final" : "done";
        if (statusEl) statusEl.textContent = key === "end" ? "final" : "done";
        if (item) updateNodeWorkSummary(item, execution, key);
        updateNodeRail(execution);

        if (key === "backend_developer" && Array.isArray(output.files) && output.files.length) {
          const first = output.files[0];
          if (first?.content) {
            appendToolLine(
              execution,
              key,
              nodeLabel(key),
              "write",
              `${first.path || "file"}\n${compactText(first.content, 2200)}`,
              "done",
            );
          }
        }
      };

      const appendActiveNode = (execution, label = "Working") => {
        const id = `${execution.id}:active`;
        const wasAtBottom = transcriptAtBottom();
        let item = document.querySelector(`[data-active-run="${id}"]`);
        if (!item) {
          item = document.createElement("article");
          item.className = "message node typing";
          item.dataset.activeRun = id;
          item.innerHTML = `
            <div class="bubble node-card">
              <div class="node-header">
                <div class="node-title">
                  <span class="node-avatar" aria-hidden="true">R</span>
                  <strong>Workflow</strong>
                </div>
                <span class="node-status">thinking</span>
              </div>
              <div class="node-content"></div>
            </div>
          `;
          $("transcript").append(item);
        }
        item.querySelector(".node-content").innerHTML = `
          <span class="thinking-row">
            <span></span>
            <span class="thinking-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </span>
        `;
        item.querySelector(".thinking-row > span:first-child").textContent = label;
        maybeScrollTranscriptToBottom(wasAtBottom);
      };

      const removeActiveNode = (execution) => {
        document.querySelector(`[data-active-run="${execution.id}:active"]`)?.remove();
      };

      const hasRunningNode = (execution) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return false;
        return Boolean(
          document.querySelector(`[data-node-run^="${executionId}:"][data-node-status="running"]`),
        );
      };

      const appendTerminalMessage = (execution, status) => {
        const id = `${execution.id}:terminal:${status}`;
        if (state.renderedNodes.has(id)) return;
        state.renderedNodes.add(id);
        if (status === "failed") {
          const detail = formatJsonish(execution.error) || "Workflow failed.";
          const message = detail === "Workflow failed." ? detail : `Workflow failed.\n${detail}`;
          const { item } = appendMessage("system", message, "Failed");
          item.classList.add("failed");
        } else if (status === "canceled") {
          appendMessage("system", "Workflow was canceled.", "Canceled");
        }
      };

      const renderExecutionTimeline = async (execution, animate = true) => {
        const executionId = execution.id || execution.executionId;
        if (!executionId || state.selectedRunId !== executionId) return null;
        state.currentExecution = execution;
        const status = cleanStatus(execution.status);
        const workflowId = execution.workflowId || execution.workflow_id || state.selectedWorkflowId;
        const prompt = execution.input?.prompt || execution.inputs?.prompt || "";
        const summary = summarizeRun(execution);
        const files = changedFiles(execution);
        upsertRun({
          workflowId,
          executionId,
          status,
          prompt,
          summary,
          changedFiles: files,
        });
        setRunChrome({ executionId, status, summary });
        renderArtifacts(files);
        renderWorkflowGraph(execution);
        const humanRequest = await updateHumanRequestForExecution(execution, workflowId);

        const nodeOutputs = execution.output?.nodeOutputs || execution.outputs?.nodeOutputs || {};
        appendRunDuration(execution);
        if (!state.renderedNodes.has(`${executionId}:runner`)) {
          await appendNodeMessage("runner", {}, execution, animate);
        }
        await renderExecutionEvents(execution, animate);
        await renderRuntimeAiEvents(execution, animate);
        await renderAiTrace(execution, animate);
        for (const [key, output] of nodeOutputEntries(nodeOutputs, execution)) {
          await appendNodeMessage(key, output, execution, animate);
        }
        if (terminalExecutionStatuses.has(status)) {
          setActiveHumanRequest(null);
          removeActiveNode(execution);
          appendTerminalMessage(execution, status);
        } else if (humanRequest) {
          appendActiveNode(execution, "Waiting for your response...");
        } else if (!nodeOutputs.end && !hasRunningNode(execution)) {
          appendActiveNode(execution, status === "queued" ? "Waiting for runner..." : "Thinking");
        } else {
          removeActiveNode(execution);
        }
        return humanRequest;
      };

      const executionFromDetailResponse = (response) => {
        const result = response?.result || {};
        const execution = result.execution || {};
        const humanRequest =
          result.humanRequest ||
          result.human_request ||
          execution.humanRequest ||
          execution.human_request ||
          null;
        const aiTrace = result.aiTrace || result.ai_trace || execution.aiTrace || execution.ai_trace || null;
        const events = Array.isArray(result.events) ? result.events : Array.isArray(execution.events) ? execution.events : [];
        return {
          ...execution,
          ...(humanRequest ? { humanRequest } : {}),
          events,
          ...(aiTrace ? { aiTrace } : {}),
        };
      };

      const pollExecution = async (executionId) => {
        if (!executionId || executionId === "execution") return;
        if (state.activePolls.has(executionId)) return;
        state.activePolls.add(executionId);
        let attempt = 0;
        try {
          while (state.selectedRunId === executionId) {
            await sleep(attempt === 0 ? 350 : Math.min(5000, 700 + attempt * 50));
            attempt += 1;
            if (state.selectedRunId !== executionId) return;
            const response = await call("workflow_run_detail", {
              request: {
                profile: null,
                executionId,
              },
            });
            if (state.selectedRunId !== executionId) return;
            const execution = {
              ...executionFromDetailResponse(response),
              id: executionId,
              executionId,
            };
            const humanRequest = await renderExecutionTimeline(execution, true);
            if (terminalExecutionStatuses.has(cleanStatus(execution.status))) return;
            if (humanRequest) {
              attempt = Math.max(attempt, 35);
            }
          }
        } finally {
          state.activePolls.delete(executionId);
        }
      };

      const syncPendingRuns = async () => {
        const pending = [];
        for (const [workflowId, runs] of Object.entries(state.workflowRuns || {})) {
          for (const run of runs || []) {
            if (!terminalExecutionStatuses.has(cleanStatus(run.status)) && run.executionId) {
              pending.push({ workflowId, executionId: run.executionId });
            }
          }
        }
        for (const item of pending.slice(0, 16)) {
          try {
            const response = await call("workflow_run_detail", {
              request: { profile: null, executionId: item.executionId },
            });
            const execution = {
              ...executionFromDetailResponse(response),
              id: item.executionId,
              workflowId: item.workflowId,
            };
            const status = cleanStatus(execution.status);
            upsertRun({
              workflowId: item.workflowId,
              executionId: item.executionId,
              status,
              summary: summarizeRun(execution),
              changedFiles: changedFiles(execution),
            });
            if (state.selectedRunId === item.executionId) {
              await renderExecutionTimeline(execution, false);
            }
          } catch {
            /* Keep the cached state when the backend is temporarily unavailable. */
          }
        }
      };

      const openRun = async (workflowId, executionId) => {
        state.selectedWorkflowId = workflowId;
        state.selectedRunId = executionId;
        state.currentExecution = null;
        updateWorkflowSelectionState();
        renderSelectedWorkflow();
        clearTranscript();
        const localRun = runsForWorkflow(workflowId).find((run) => run.executionId === executionId);
        if (localRun?.prompt) appendMessage("user", localRun.prompt, workflowName(selectedWorkflow()));
        const loading = appendMessage("system", "Loading run details...", "Run").item;
        try {
          const response = await call("workflow_run_detail", {
            request: { profile: null, executionId },
          });
          loading.remove();
          const execution = {
            ...executionFromDetailResponse(response),
            id: executionId,
            executionId,
          };
          await renderExecutionTimeline(execution, false);
          if (!terminalExecutionStatuses.has(cleanStatus(execution.status))) {
            void pollExecution(executionId);
          }
        } catch (error) {
          loading.remove();
          appendMessage("system", error.message, "Error");
        }
      };

      const persistWorkspace = async (path) => {
        const cleanPath = (path || "").trim();
        if (!cleanPath) throw new Error("Workspace path is required");
        const response = await call("workspace_set", {
          request: { profile: null, workspacePath: cleanPath },
        });
        await refreshStatus();
        setNotice(`Workspace saved: ${response.workspacePath}`);
      };

      const chooseWorkspace = async () => {
        if (state.workspacePicking) return;
        setError("composerError", "");
        setNotice("");
        setWorkspacePicking(true);
        try {
          const result = await call("workspace_pick_directory");
          if (result.selected && result.path) {
            const workspacePath = $("workspacePath");
            if (workspacePath) {
              workspacePath.value = result.path;
            }
            await persistWorkspace(result.path);
          } else {
            await call("workspace_picker_cancel", { request: { profile: null } });
            setNotice("Workspace selection cancelled");
          }
        } catch (error) {
          setError("composerError", error.message);
        } finally {
          setWorkspacePicking(false);
        }
      };

      const workflowInputSchemaKey = (workflowId, version = null) =>
        `${workflowId}::${version && String(version).trim() ? String(version).trim() : "active"}`;

      const workflowVersionNumber = (version) =>
        isRecord(version) ? version.versionNumber ?? version.version ?? null : null;

      const workflowVersionValue = (version) => {
        const number = workflowVersionNumber(version);
        return number === null || number === undefined ? "" : String(number);
      };

      const workflowVersionStatus = (version) => {
        if (!isRecord(version)) return "";
        const status = String(version.status || "").toLowerCase();
        if (version.isActive || version.is_active) return "Active";
        if (status === "archived") return "Archived";
        if (status === "draft") return "Draft";
        return status ? status.charAt(0).toUpperCase() + status.slice(1) : "Published";
      };

      const formatShortDate = (value) => {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleDateString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
        });
      };

      const workflowVersionLabel = (version) => {
        const number = workflowVersionNumber(version);
        const label = number === null || number === undefined ? "Version" : `Version ${number}`;
        const status = workflowVersionStatus(version);
        return status ? `${label} (${status})` : label;
      };

      const workflowVersionMeta = (version, versions = []) => {
        if (!isRecord(version)) return "";
        const parts = [];
        const number = workflowVersionNumber(version);
        if (number !== null && number !== undefined) parts.push(`Version ${number}`);
        const status = workflowVersionStatus(version);
        if (status) parts.push(status);
        const latest = versions
          .map(workflowVersionNumber)
          .filter((value) => Number.isFinite(Number(value)))
          .map(Number)
          .sort((a, b) => b - a)[0];
        if (latest !== undefined && Number(number) === latest) parts.push("Latest");
        const date = formatShortDate(version.activatedAt || version.createdAt);
        if (date) parts.push(date);
        const notes = String(version.notes || "").trim();
        if (notes) parts.push(notes.length > 84 ? `${notes.slice(0, 81)}...` : notes);
        return parts.join(" / ");
      };

      const normalizeWorkflowInputDetail = (response = {}) => {
        const inputSchema = response?.inputSchema || response?.input_schema || null;
        const activeVersion = response?.activeVersion || response?.active_version || null;
        const selectedVersion = response?.selectedVersion || response?.selected_version || activeVersion || null;
        const versions = Array.isArray(response?.versions) ? [...response.versions] : [];
        [selectedVersion, activeVersion].forEach((version) => {
          const value = workflowVersionValue(version);
          if (value && !versions.some((item) => workflowVersionValue(item) === value)) {
            versions.push(version);
          }
        });
        versions.sort((a, b) => Number(workflowVersionNumber(b) || 0) - Number(workflowVersionNumber(a) || 0));
        return {
          inputSchema,
          activeVersion,
          selectedVersion,
          versions,
        };
      };

      const loadWorkflowInputDetail = async (workflowId, version = null) => {
        if (!workflowId) return null;
        const cacheKey = workflowInputSchemaKey(workflowId, version);
        if (Object.prototype.hasOwnProperty.call(state.workflowInputSchemas, cacheKey)) {
          return state.workflowInputSchemas[cacheKey];
        }
        try {
          const response = await call("workflow_input_schema", {
            request: { profile: null, workflowId, version: version || null },
          });
          const detail = normalizeWorkflowInputDetail(response);
          state.workflowInputSchemas[cacheKey] = detail;
          return detail;
        } catch {
          return null;
        }
      };

      const loadWorkflowInputSchema = async (workflowId, version = null) => {
        const detail = await loadWorkflowInputDetail(workflowId, version);
        return detail?.inputSchema || null;
      };

      const renderRunVersionControl = () => {
        const select = $("runVersionSelect");
        const status = $("runVersionStatus");
        const meta = $("runVersionMeta");
        if (!select || !status || !meta) return;
        select.innerHTML = "";
        const versions = Array.isArray(state.runModalVersions) ? state.runModalVersions : [];
        if (state.runModalSchemaLoading && !versions.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "Loading versions...";
          select.append(option);
          select.disabled = true;
          status.textContent = "Loading";
          meta.textContent = "Fetching workflow versions and inputs.";
          return;
        }

        if (!versions.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "Active version";
          select.append(option);
          select.disabled = true;
          status.textContent = "Active";
          meta.textContent = "No version metadata is available for this workflow.";
          return;
        }

        const fallback =
          versions.find((version) => version.isActive || version.is_active) ||
          state.runModalSelectedVersion ||
          versions[0];
        const selectedValue = state.runModalVersion || workflowVersionValue(fallback);
        for (const version of versions) {
          const option = document.createElement("option");
          option.value = workflowVersionValue(version);
          option.textContent = workflowVersionLabel(version);
          select.append(option);
        }
        select.value = selectedValue;
        state.runModalVersion = selectedValue;
        const selectedVersion =
          versions.find((version) => workflowVersionValue(version) === selectedValue) || fallback;
        status.textContent = workflowVersionStatus(selectedVersion) || "Selected";
        meta.textContent = workflowVersionMeta(selectedVersion, versions);
        select.disabled = state.runModalSchemaLoading || versions.length <= 1;
      };

      const reservedRunInputFields = new Set(["_loomexRunner", "workspacePath"]);

      const runInputFieldSpecs = (schema = state.runModalInputSchema) => {
        if (!isRecord(schema)) return [];
        const required = Array.isArray(schema.required) ? schema.required.map(String) : [];
        const properties = schemaProperties(schema);
        if (Object.keys(properties).length) {
          return Object.entries(properties)
            .filter(([key]) => !reservedRunInputFields.has(key))
            .map(([key, definition]) => ({
              key,
              definition,
              required: required.includes(key),
              scalarRoot: false,
              jsonFallback: false,
            }));
        }
        if (schemaFieldType(schema) === "object") return [];
        return [
          {
            key: "value",
            definition: {
              title: schema.title || "Input",
              description: schema.description || "",
              ...schema,
            },
            required: true,
            scalarRoot: true,
            jsonFallback: false,
          },
        ];
      };

      const hydrateRunModalInputValues = (schema) => {
        const values = {};
        for (const spec of runInputFieldSpecs(schema)) {
          values[spec.key] = defaultFieldValue(spec.definition);
        }
        state.runModalInputValues = values;
        state.runModalInputErrors = {};
        state.runModalJsonInput = "{}";
      };

      const loadRunModalInputSchema = async (workflow, version = null) => {
        const workflowId = workflow?.id;
        if (!workflowId) return;
        const requestVersion = version && String(version).trim() ? String(version).trim() : null;
        const requestKey = workflowInputSchemaKey(workflowId, requestVersion);
        state.runModalSchemaRequest = requestKey;
        state.runModalSchemaLoading = true;
        renderRunVersionControl();
        renderRunModalInputForm();
        const detail = await loadWorkflowInputDetail(workflowId, requestVersion);
        if (state.runModalWorkflowId !== workflowId || state.runModalSchemaRequest !== requestKey) return;
        state.runModalActiveVersion = detail?.activeVersion || null;
        state.runModalSelectedVersion = detail?.selectedVersion || detail?.activeVersion || null;
        state.runModalVersions = Array.isArray(detail?.versions) ? detail.versions : [];
        state.runModalVersion =
          workflowVersionValue(state.runModalSelectedVersion) ||
          requestVersion ||
          workflowVersionValue(state.runModalActiveVersion);
        state.runModalInputSchema = detail?.inputSchema || null;
        hydrateRunModalInputValues(state.runModalInputSchema);
        state.runModalSchemaLoading = false;
        renderRunVersionControl();
        renderRunModalInputForm();
      };

      const setRunInputValue = (field, value, rerender = false) => {
        state.runModalInputValues = { ...state.runModalInputValues, [field]: value };
        const nextErrors = { ...state.runModalInputErrors };
        delete nextErrors[field];
        state.runModalInputErrors = nextErrors;
        setError("runModalError", "");
        if (rerender) renderRunModalInputForm();
        else document.querySelector(`[data-run-input-error="${field}"]`)?.replaceChildren();
      };

      const runInputTypeLabel = (spec) =>
        spec.jsonFallback
          ? "json"
          : schemaOptions(spec.definition).length
          ? "options"
          : schemaFieldType(spec.definition);

      const isMultilineRunInput = (spec) => {
        const definition = spec.definition || {};
        const key = String(spec.key || "").toLowerCase();
        const format = String(definition.format || definition.ui || "").toLowerCase();
        return (
          ["prompt", "message", "request", "description", "instructions"].includes(key) ||
          ["textarea", "text", "markdown"].includes(format) ||
          Number(definition.maxLength || 0) > 160
        );
      };

      const renderRunControl = (container, spec) => {
        const definition = spec.definition || {};
        const type = schemaFieldType(definition);
        const options = schemaOptions(definition);
        const value = state.runModalInputValues[spec.key];
        const invalid = Boolean(state.runModalInputErrors[spec.key]);

        if (type === "object" || type === "array") {
          const textarea = document.createElement("textarea");
          textarea.dir = "auto";
          textarea.spellcheck = false;
          textarea.dataset.runInput = spec.key;
          textarea.setAttribute("aria-invalid", String(invalid));
          textarea.value =
            typeof value === "string"
              ? value
              : JSON.stringify(value ?? defaultFieldValue(definition), null, 2);
          textarea.addEventListener("input", () => setRunInputValue(spec.key, textarea.value));
          container.append(textarea);
          return;
        }

        if (options.length) {
          if (options.length > 6) {
            const select = document.createElement("select");
            select.dataset.runInput = spec.key;
            select.setAttribute("aria-invalid", String(invalid));
            select.value = value ?? "";
            const empty = document.createElement("option");
            empty.value = "";
            empty.textContent = "Choose an option";
            select.append(empty);
            options.forEach((option) => {
              const item = document.createElement("option");
              item.value = String(option.value);
              item.textContent = option.label;
              select.append(item);
            });
            select.addEventListener("change", () => setRunInputValue(spec.key, select.value));
            container.append(select);
            return;
          }
          const grid = document.createElement("div");
          grid.className = "run-choice-grid";
          options.forEach((option) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "run-choice";
            button.dataset.runInput = spec.key;
            button.setAttribute("aria-pressed", String(value === option.value || String(value) === String(option.value)));
            button.textContent = option.label;
            button.addEventListener("click", () => setRunInputValue(spec.key, option.value, true));
            grid.append(button);
          });
          container.append(grid);
          return;
        }

        if (type === "boolean") {
          const grid = document.createElement("div");
          grid.className = "run-choice-grid";
          [
            [true, "Yes"],
            [false, "No"],
          ].forEach(([nextValue, label]) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "run-choice";
            button.dataset.runInput = spec.key;
            button.setAttribute("aria-pressed", String(value === nextValue));
            button.textContent = label;
            button.addEventListener("click", () => setRunInputValue(spec.key, nextValue, true));
            grid.append(button);
          });
          container.append(grid);
          return;
        }

        if (type === "integer" || type === "number") {
          const input = document.createElement("input");
          input.type = "number";
          input.step = type === "integer" ? "1" : "any";
          input.dataset.runInput = spec.key;
          input.setAttribute("aria-invalid", String(invalid));
          input.value = value ?? "";
          input.addEventListener("input", () => {
            setRunInputValue(spec.key, input.value === "" ? "" : Number(input.value));
          });
          container.append(input);
          return;
        }

        if (isMultilineRunInput(spec)) {
          const textarea = document.createElement("textarea");
          textarea.dir = "auto";
          textarea.dataset.runInput = spec.key;
          textarea.setAttribute("aria-invalid", String(invalid));
          textarea.value = value ?? "";
          textarea.spellcheck = true;
          textarea.addEventListener("input", () => setRunInputValue(spec.key, textarea.value));
          container.append(textarea);
          return;
        }

        const input = document.createElement("input");
        input.type = "text";
        input.dir = "auto";
        input.autocomplete = "off";
        input.dataset.runInput = spec.key;
        input.setAttribute("aria-invalid", String(invalid));
        input.value = value ?? "";
        input.addEventListener("input", () => setRunInputValue(spec.key, input.value));
        container.append(input);
      };

      const renderRunModalInputForm = () => {
        const section = $("runInputSection");
        const fields = $("runInputFields");
        const summary = $("runInputSummary");
        fields.innerHTML = "";

        if (state.runModalSchemaLoading) {
          section.classList.remove("hidden");
          summary.textContent = "Loading";
          const loading = document.createElement("div");
          loading.className = "run-input-state";
          loading.textContent = "Loading workflow inputs...";
          fields.append(loading);
          $("runConfirm").disabled = true;
          return;
        }

        const specs = runInputFieldSpecs();
        if (!specs.length) {
          section.classList.add("hidden");
          summary.textContent = "";
          $("runConfirm").disabled = false;
          return;
        }

        section.classList.remove("hidden");
        const requiredCount = specs.filter((spec) => spec.required).length;
        summary.textContent = requiredCount ? `${requiredCount} required` : "Optional";
        for (const spec of specs) {
          const field = document.createElement("div");
          field.className = "run-field";
          const label = spec.definition?.title || formatFieldLabel(spec.key === "value" ? "Input" : spec.key);
          const description = spec.definition?.description || "";
          field.innerHTML = `
            <div class="run-field-head">
              <div class="run-field-label">
                <strong></strong>
                <span></span>
              </div>
              <span class="run-field-type"></span>
            </div>
            <div class="run-field-control"></div>
            <div class="run-field-error" role="alert"></div>
          `;
          field.querySelector("strong").textContent = `${label}${spec.required ? " *" : ""}`;
          const descriptionEl = field.querySelector(".run-field-label span");
          descriptionEl.dir = "auto";
          descriptionEl.textContent = description;
          descriptionEl.classList.toggle("hidden", !description);
          field.querySelector(".run-field-type").textContent = runInputTypeLabel(spec);
          field.querySelector(".run-field-error").dataset.runInputError = spec.key;
          field.querySelector(".run-field-error").textContent = state.runModalInputErrors[spec.key] || "";
          renderRunControl(field.querySelector(".run-field-control"), spec);
          fields.append(field);
        }
        $("runConfirm").disabled = false;
      };

      const parseRunJsonField = (value, fallback) => {
        if (typeof value !== "string") return value;
        try {
          return JSON.parse(value || fallback);
        } catch {
          throw new Error("must be valid JSON");
        }
      };

      const coerceRunInputValue = (spec, value) => {
        const type = schemaFieldType(spec.definition);
        if (type === "object") {
          const parsed = parseRunJsonField(value, "{}");
          if (!isRecord(parsed)) throw new Error("must be a JSON object");
          return parsed;
        }
        if (type === "array") {
          const parsed = parseRunJsonField(value, "[]");
          if (!Array.isArray(parsed)) throw new Error("must be a JSON array");
          return parsed;
        }
        if (type === "integer") {
          const number = Number(value);
          if (!Number.isInteger(number)) throw new Error("must be an integer");
          return number;
        }
        if (type === "number") {
          const number = Number(value);
          if (!Number.isFinite(number)) throw new Error("must be a number");
          return number;
        }
        if (type === "boolean") {
          if (typeof value !== "boolean") throw new Error("must be Yes or No");
          return value;
        }
        return String(value ?? "");
      };

      const buildRunModalInputs = () => {
        const inputs = {};
        const errors = {};
        for (const spec of runInputFieldSpecs()) {
          const value = state.runModalInputValues[spec.key];
          if (spec.required && isEmptyHumanValue(value)) {
            errors[spec.key] = `${formatFieldLabel(spec.key === "value" ? "input" : spec.key)} is required.`;
            continue;
          }
          if (!spec.required && isEmptyHumanValue(value)) continue;
          try {
            const coerced = coerceRunInputValue(spec, value);
            if (spec.scalarRoot) inputs.value = coerced;
            else inputs[spec.key] = coerced;
          } catch (error) {
            errors[spec.key] = `${formatFieldLabel(spec.key)} ${error.message}.`;
          }
        }
        if (state.runModalWorkspacePath) {
          inputs.workspacePath = state.runModalWorkspacePath;
        }
        state.runModalInputErrors = errors;
        renderRunModalInputForm();
        const firstError = Object.keys(errors)[0];
        if (firstError) {
          document.querySelector(`[data-run-input="${firstError}"]`)?.focus?.();
          throw new Error("Complete the required workflow inputs.");
        }
        return inputs;
      };

      const runPromptFromInputs = (inputs = {}) => {
        const value = inputs.prompt ?? inputs.message ?? inputs.request ?? "";
        if (typeof value === "string") return value.trim();
        return "";
      };

      const requiredInitialInputFields = (schema, provided = {}) => {
        if (!isRecord(schema) || !Array.isArray(schema.required)) return [];
        const available = new Set(["_loomexRunner"]);
        if (isRecord(provided.inputs)) {
          Object.entries(provided.inputs).forEach(([field, value]) => {
            if (!isEmptyHumanValue(value)) available.add(field);
          });
        }
        if (provided.prompt) {
          available.add("prompt");
          available.add("message");
        }
        if (provided.workspacePath) available.add("workspacePath");
        if (Array.isArray(provided.selectedFiles) && provided.selectedFiles.length) {
          available.add("selectedFiles");
        }
        return schema.required
          .map(String)
          .filter((field) => field && !available.has(field));
      };

      const initialInputRequiredMessage = (workflow, fields) => {
        const list = fields.map(formatFieldLabel).join(", ");
        return `${workflowName(workflow)} requires start input: ${list}. Use Run to choose a version and fill the start form.`;
      };

      const ensureWorkflowCanStartWithoutInitialInput = async (
        workflow,
        { workspacePath = null, selectedFiles = [], inputs = {}, prompt = "", version = null } = {},
      ) => {
        const schema = await loadWorkflowInputSchema(workflow.id, version);
        const missing = requiredInitialInputFields(schema, {
          workspacePath,
          selectedFiles,
          inputs,
          prompt,
        });
        if (missing.length) {
          throw new Error(initialInputRequiredMessage(workflow, missing));
        }
      };

      const friendlyRunError = async (error, workflow, context = {}) => {
        const message = error?.message || String(error || "");
        if (!/422|validation|required|prompt|input/i.test(message)) return message;
        const schema = await loadWorkflowInputSchema(workflow?.id, context.version || null);
        const missing = requiredInitialInputFields(schema, context);
        if (missing.length) return initialInputRequiredMessage(workflow, missing);
        return message;
      };

      const runWorkflow = async ({
        workflow,
        prompt = "",
        inputs = {},
        version = null,
        workspacePath = state.status?.workspacePath || null,
        selectedFiles = [],
        errorTarget = "composerError",
      }) => {
        const requestInputs = isRecord(inputs) ? { ...inputs } : {};
        state.sending = true;
        $("send").disabled = true;
        state.selectedRunId = null;
        state.currentExecution = null;
        clearTranscript();
        if (prompt) {
          appendMessage("user", prompt, workflowName(workflow));
        }
        closeMentionMenu();
        try {
          await ensureWorkflowCanStartWithoutInitialInput(workflow, {
            workspacePath,
            selectedFiles,
            inputs: requestInputs,
            prompt,
            version,
          });
          const response = await call("workflow_run_chat", {
            request: {
              profile: null,
              workflowId: workflow.id,
              version,
              inputs: requestInputs,
              prompt,
              selectedFiles,
              workspacePath,
            },
          });
          const execution = response.result?.execution || {};
          const executionId = execution.id || execution.executionId || "execution";
          state.selectedRunId = executionId;
          upsertRun({
            workflowId: workflow.id,
            executionId,
            status: execution.status || "queued",
            prompt,
            summary: "",
          });
          await renderExecutionTimeline(
            {
              ...execution,
              id: executionId,
              workflowId: workflow.id,
              events: Array.isArray(response.result?.events) ? response.result.events : [],
              aiTrace: response.result?.aiTrace || response.result?.ai_trace || execution.aiTrace,
              humanRequest: response.result?.humanRequest || response.result?.human_request || execution.humanRequest,
              input: { ...requestInputs, prompt: requestInputs.prompt ?? prompt },
            },
            true,
          );
          await pollExecution(executionId);
          await call("approval_list").catch(() => null);
        } catch (error) {
          const message = await friendlyRunError(error, workflow, {
            workspacePath,
            selectedFiles,
            inputs: requestInputs,
            prompt,
            version,
          });
          appendMessage("system", message, "Error");
          setError(errorTarget, message);
        } finally {
          state.sending = false;
          $("send").disabled = false;
        }
      };

      const sendMessage = async () => {
        const workflow = selectedWorkflow();
        const prompt = $("composer").value.trim();
        if (!workflow) {
          setError("composerError", "Choose a workflow first");
          return;
        }
        if (!prompt) {
          setError("composerError", "Enter a message for the selected workflow");
          return;
        }
        setError("composerError", "");
        setNotice("");
        const selectedFiles = state.selectedFiles.map((file) => file.path);
        $("composer").value = "";
        state.selectedFiles = [];
        renderMentionChips();
        await runWorkflow({
          workflow,
          prompt,
          selectedFiles,
          workspacePath: state.status?.workspacePath || null,
        });
      };

      const wireSidebarResizer = () => {
        const resizer = $("sidebarResizer");
        if (!resizer) return;

        let resizing = false;

        const stopResize = () => {
          if (!resizing) return;
          resizing = false;
          resizer.classList.remove("dragging");
          document.body.style.cursor = "";
          document.body.style.userSelect = "";
        };

        const resizeToPointer = (event) => {
          if (!resizing) return;
          if ($("chatView").classList.contains("nav-collapsed")) return;
          setSidebarWidth(event.clientX);
        };

        resizer.addEventListener("pointerdown", (event) => {
          if (window.innerWidth <= 820) return;
          if ($("chatView").classList.contains("nav-collapsed")) return;
          resizing = true;
          resizer.classList.add("dragging");
          document.body.style.cursor = "col-resize";
          document.body.style.userSelect = "none";
          resizer.setPointerCapture(event.pointerId);
          resizeToPointer(event);
        });

        resizer.addEventListener("pointermove", resizeToPointer);
        resizer.addEventListener("pointerup", stopResize);
        resizer.addEventListener("pointercancel", stopResize);

        resizer.addEventListener("keydown", (event) => {
          const current = Number(resizer.getAttribute("aria-valuenow")) || loadSidebarWidth();
          if (event.key === "ArrowLeft") {
            event.preventDefault();
            setSidebarWidth(current - (event.shiftKey ? 40 : 16));
          } else if (event.key === "ArrowRight") {
            event.preventDefault();
            setSidebarWidth(current + (event.shiftKey ? 40 : 16));
          } else if (event.key === "Home") {
            event.preventDefault();
            setSidebarWidth(sidebarWidthBounds.min);
          } else if (event.key === "End") {
            event.preventDefault();
            setSidebarWidth(maxSidebarWidth());
          }
        });

        window.addEventListener("resize", () => setSidebarWidth(loadSidebarWidth(), false));
        setSidebarWidth(loadSidebarWidth(), false);
      };

      const wireNavToggle = () => {
        setNavCollapsed(loadNavCollapsed(), false);
        $("navToggle").addEventListener("click", () => {
          setNavCollapsed(!$("chatView").classList.contains("nav-collapsed"));
        });
        $("navRevealZone").addEventListener("mouseenter", () => {
          if ($("chatView").classList.contains("nav-collapsed")) {
            $("chatView").classList.add("nav-revealed");
          }
        });
        document.querySelector(".sidebar").addEventListener("mouseleave", () => {
          $("chatView").classList.remove("nav-revealed");
        });
      };

      wireNavToggle();
      wireSidebarResizer();

      $("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        setError("loginError", "");
        try {
          await call("login_workspace", {
            request: {
              profile: null,
              email: $("loginEmail").value,
              password: $("loginPassword").value,
            },
          });
          await refreshStatus();
          await loadWorkflows();
          renderEmptyState();
        } catch (error) {
          setError("loginError", error.message);
        }
      });

      $("profileToggle").addEventListener("click", () => {
        const popover = $("profilePopover");
        const open = !popover.classList.contains("open");
        popover.classList.toggle("open", open);
        $("profileToggle").setAttribute("aria-expanded", String(open));
      });
      $("sideNavToggle").addEventListener("click", () => {
        const panel = $("artifactsPopover");
        const open = !panel.classList.contains("open");
        panel.classList.toggle("open", open);
        setPressed("sideNavToggle", open);
      });
      $("openFilesPanel").addEventListener("click", () => {
        openFilesPanel().catch((error) => setError("composerError", error.message));
      });
      $("openTerminalPanel").addEventListener("click", openTerminalPanel);
      $("fileFilter").addEventListener("input", () => {
        if (state.fileEntries.length) renderFileTree();
        else loadWorkspaceFiles().catch(() => null);
      });
      $("fileTab").addEventListener("click", () => openWorkspaceSurface("file"));
      $("terminalTab").addEventListener("click", () => openWorkspaceSurface("terminal"));
      $("tabAdd").addEventListener("click", () => {
        const menu = $("tabAddMenu");
        const rect = $("tabAdd").getBoundingClientRect();
        menu.style.left = `${rect.left}px`;
        menu.style.top = `${rect.bottom + 6}px`;
        menu.classList.toggle("open");
      });
      $("addTerminalTab").addEventListener("click", () => {
        $("tabAddMenu").classList.remove("open");
        openTerminalPanel();
      });
      document.querySelectorAll("[data-tools-panel-resizer]").forEach((resizer) => {
        resizer.addEventListener("pointerdown", startToolsPanelResize);
      });
      $("workflowPanelToggle").addEventListener("click", () => {
        const panel = $("workflowPanel");
        const open = !panel.classList.contains("open");
        panel.classList.toggle("open", open);
        $("chatView").classList.toggle("workflow-open", open);
        setPressed("workflowPanelToggle", open);
        if (open) renderWorkflowGraph(state.currentExecution);
      });
      $("artifactsToggle").addEventListener("click", () => {
        const launcherOpen = $("sideNavPanel").classList.contains("open");
        const workspaceOpen = $("workspaceSurface").classList.contains("open");
        if (launcherOpen || workspaceOpen) {
          closeToolsPanel();
        } else {
          openToolsLauncher();
        }
      });
      document.addEventListener("click", (event) => {
        if (!$("workflowMenu").contains(event.target)) {
          closeWorkflowMenu();
        }
        if (!$("tabAddMenu").contains(event.target) && !$("tabAdd").contains(event.target)) {
          $("tabAddMenu").classList.remove("open");
        }
      });
      $("workflowEdit").addEventListener("click", () => {
        closeWorkflowMenu();
      });
      $("runModalClose").addEventListener("click", closeRunModal);
      $("runCancel").addEventListener("click", closeRunModal);
      $("runModal").addEventListener("click", (event) => {
        if (event.target === $("runModal")) closeRunModal();
      });
      $("runChooseWorkspace").addEventListener("click", async () => {
        setError("runModalError", "");
        try {
          const result = await call("workspace_pick_directory");
          if (result.selected && result.path) {
            state.runModalWorkspacePath = result.path;
            $("runWorkspacePath").textContent = result.path;
            setError("runModalError", "");
          } else {
            await call("workspace_picker_cancel", { request: { profile: null } });
          }
        } catch (error) {
          setError("runModalError", error.message);
        }
      });
      $("runVersionSelect").addEventListener("change", () => {
        const workflow = state.workflows.find((item) => item.id === state.runModalWorkflowId);
        state.runModalVersion = $("runVersionSelect").value;
        state.runModalInputErrors = {};
        setError("runModalError", "");
        if (workflow) {
          loadRunModalInputSchema(workflow, state.runModalVersion).catch((error) => {
            setError("runModalError", error.message);
          });
        }
      });
      $("runConfirm").addEventListener("click", async () => {
        const workflow = state.workflows.find((item) => item.id === state.runModalWorkflowId);
        if (!workflow) {
          setError("runModalError", "Choose a workflow first");
          return;
        }
        if (!state.runModalWorkspacePath) {
          setError("runModalError", "Choose a workspace directory");
          return;
        }
        const version = String(state.runModalVersion || "").trim();
        if (!version && state.runModalVersions.length) {
          setError("runModalError", "Choose a workflow version");
          return;
        }
        setError("runModalError", "");
        $("runConfirm").disabled = true;
        try {
          const workspacePath = state.runModalWorkspacePath;
          const inputs = buildRunModalInputs();
          $("runConfirm").disabled = true;
          await persistWorkspace(workspacePath);
          closeRunModal();
          state.selectedWorkflowId = workflow.id;
          state.selectedRunId = null;
          renderWorkflowList();
          renderSelectedWorkflow();
          const prompt = runPromptFromInputs(inputs);
          await runWorkflow({
            workflow,
            prompt,
            inputs,
            version: version || null,
            workspacePath,
            selectedFiles: [],
            errorTarget: "composerError",
          });
        } catch (error) {
          setError("runModalError", error.message);
        } finally {
          $("runConfirm").disabled = false;
        }
      });
      $("chooseWorkspace")?.addEventListener("click", chooseWorkspace);
      $("saveWorkspace")?.addEventListener("click", async () => {
        try {
          setError("composerError", "");
          await persistWorkspace($("workspacePath").value);
        } catch (error) {
          setError("composerError", error.message);
        }
      });
      $("refreshStatus")?.addEventListener("click", () =>
        refreshStatus().catch((error) => setError("composerError", error.message)),
      );
      $("reloadWorkflows").addEventListener("click", () =>
        loadWorkflows()
          .then(syncPendingRuns)
          .catch((error) => setError("composerError", error.message)),
      );
      $("logout").addEventListener("click", async () => {
        await call("logout", { request: { profile: null, revokeBinding: false } });
        state.workflows = [];
        state.selectedWorkflowId = null;
        state.selectedRunId = null;
        state.currentExecution = null;
        setActiveHumanRequest(null);
        $("transcript").innerHTML = "";
        await refreshStatus();
      });

      $("composer").addEventListener("input", () => {
        setError("composerError", "");
        refreshMentionOptions();
      });

      $("mentionTrigger").addEventListener("click", async () => {
        const input = $("composer");
        input.focus();
        const cursor = input.selectionStart || input.value.length;
        const before = input.value.slice(0, cursor);
        const after = input.value.slice(cursor);
        const prefix = before && !before.endsWith(" ") ? " @" : "@";
        input.value = `${before}${prefix}${after}`;
        const nextCursor = before.length + prefix.length;
        input.selectionStart = input.selectionEnd = nextCursor;
        await refreshMentionOptions();
      });

      $("composer").addEventListener("keydown", (event) => {
        if ($("mentionMenu").classList.contains("open")) {
          if (event.key === "ArrowDown") {
            event.preventDefault();
            if (state.mentionOptions.length) {
              state.selectedMentionIndex = Math.min(
                state.mentionOptions.length - 1,
                state.selectedMentionIndex + 1,
              );
            }
            renderMentionMenu();
            return;
          }
          if (event.key === "ArrowUp") {
            event.preventDefault();
            if (state.mentionOptions.length) {
              state.selectedMentionIndex = Math.max(0, state.selectedMentionIndex - 1);
            }
            renderMentionMenu();
            return;
          }
          if (event.key === "Enter" || event.key === "Tab") {
            event.preventDefault();
            selectMentionOption();
            return;
          }
          if (event.key === "Escape") {
            event.preventDefault();
            closeMentionMenu();
            return;
          }
        }
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          $("composerForm").requestSubmit();
        }
      });

      $("composerForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        if (state.pendingHumanRequest) {
          await resolveHumanInput();
          return;
        }
        if (!state.sending) await sendMessage();
      });

      state.workflowRuns = loadLocalRuns();
      refreshStatus()
        .then(async (status) => {
          if (status.authenticated) {
            await ensureLocalRunnerStarted();
            await loadWorkflows();
            await syncPendingRuns();
            renderEmptyState();
          }
        })
        .catch((error) => setError("loginError", error.message));
    </script>
  </body>
</html>
