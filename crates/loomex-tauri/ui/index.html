<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loomex Runner</title>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        --bg: #0d0f12;
        --sidebar: #17313a;
        --sidebar-2: #10262e;
        --surface: #161719;
        --surface-2: #1f2023;
        --surface-3: #292a2d;
        --border: #303237;
        --border-strong: #454850;
        --text: #f5f7f8;
        --muted: #a7adb6;
        --faint: #777f8c;
        --green: #36d07d;
        --green-2: #1f8f52;
        --cyan: #76d4ff;
        --amber: #eab657;
        --rose: #ff6f87;
        --shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
        --radius: 8px;
        --sidebar-width: 292px;
        --nav-rail-width: 44px;
        --content-width: 720px;
        --tools-panel-width: clamp(360px, 33vw, 560px);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 0;
        background: var(--bg);
        color: var(--text);
      }

      body {
        height: 100vh;
        overflow: hidden;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 8px 10px;
        background: var(--surface-2);
        color: var(--text);
        cursor: pointer;
        transition:
          background 180ms ease,
          border-color 180ms ease,
          color 180ms ease,
          opacity 180ms ease;
      }

      button:hover {
        background: var(--surface-3);
        border-color: var(--border-strong);
      }

      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      button.primary {
        background: var(--green-2);
        border-color: #2db56b;
        color: #ffffff;
      }

      button.primary:hover {
        background: #28a963;
      }

      button.ghost {
        background: transparent;
      }

      button.icon {
        width: 40px;
        min-width: 40px;
        padding: 0;
        display: inline-grid;
        place-items: center;
      }

      svg {
        width: 40px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      label {
        display: grid;
        gap: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #111315;
        color: var(--text);
      }

      input,
      select {
        min-height: 40px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 50px;
        max-height: 168px;
        resize: vertical;
        padding: 12px 13px;
        line-height: 1.45;
      }

      .app {
        width: 100%;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
      }

      .login {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .login-card {
        width: min(420px, 100%);
        display: grid;
        gap: 18px;
        padding: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .login-card h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
      }

      .login-card p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .shell {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr) 0;
        grid-template-rows: minmax(0, 1fr) 0;
        min-width: 0;
        overflow: hidden;
      }

      .shell.nav-collapsed {
        grid-template-columns: minmax(0, 1fr) 0;
      }

      .shell.tools-open {
        grid-template-columns: var(--sidebar-width) minmax(0, 1fr) var(--tools-panel-width);
      }

      .shell.nav-collapsed.tools-open {
        grid-template-columns: minmax(0, 1fr) var(--tools-panel-width);
      }

      .shell.workflow-open {
        grid-template-rows: minmax(0, 1fr) 0;
      }

      .sidebar {
        position: relative;
        grid-column: 1;
        grid-row: 1 / -1;
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 0;
        padding: 50px 0 0 8px;
        overflow: hidden;
        background: var(--sidebar);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transition:
          transform 220ms ease,
          box-shadow 220ms ease;
      }

      .shell.nav-collapsed .sidebar {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        z-index: 30;
        width: var(--sidebar-width);
        transform: translateX(-100%);
        pointer-events: none;
        box-shadow: none;
      }

      .shell.nav-collapsed.nav-revealed .sidebar {
        transform: translateX(0);
        pointer-events: auto;
        box-shadow: var(--shadow);
      }

      .shell.nav-collapsed .sidebar-scroll,
      .shell.nav-collapsed .account-area {
        opacity: 0;
        pointer-events: none;
        transition: opacity 140ms ease;
      }

      .shell.nav-collapsed.nav-revealed .sidebar-scroll,
      .shell.nav-collapsed.nav-revealed .account-area {
        opacity: 1;
        pointer-events: auto;
      }

      .nav-toggle {
        position: fixed;
        top: 12px;
        left: 12px;
        z-index: 45;
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.72);
      }

      .nav-toggle:hover,
      .nav-toggle:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        border-color: transparent;
        color: var(--text);
      }

      .nav-toggle svg {
        width: 15px;
        height: 15px;
      }

      .nav-reveal-zone {
        display: none;
      }

      .shell.nav-collapsed .nav-reveal-zone {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 25;
        display: block;
        width: 14px;
        height: 100vh;
        background: transparent;
        border-right: 0;
      }

      .sidebar-resizer {
        position: absolute;
        top: 0;
        right: -5px;
        z-index: 12;
        width: 10px;
        height: 100%;
        min-height: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        background: transparent;
        cursor: col-resize;
      }

      .sidebar-resizer::after {
        content: "";
        position: absolute;
        top: 0;
        right: 4px;
        width: 1px;
        height: 100%;
        background: rgba(255, 255, 255, 0.08);
        transition:
          background 180ms ease,
          box-shadow 180ms ease;
      }

      .sidebar-resizer:hover,
      .sidebar-resizer:focus-visible,
      .sidebar-resizer.dragging {
        background: rgba(118, 212, 255, 0.06);
      }

      .sidebar-resizer:hover::after,
      .sidebar-resizer:focus-visible::after,
      .sidebar-resizer.dragging::after {
        background: var(--cyan);
        box-shadow: 0 0 0 1px rgba(118, 212, 255, 0.3);
      }

      .shell.nav-collapsed .sidebar-resizer {
        display: none;
      }

      .toolbar-title strong,
      .profile-name {
        font-size: 13px;
        letter-spacing: 0;
      }

      .sidebar button {
        font-size: 12.5px;
      }

      .sidebar-scroll {
        min-height: 0;
        height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        scrollbar-width: thin;
        scrollbar-color: rgba(245, 247, 248, 0.38) transparent;
        display: grid;
        align-content: start;
        gap: 14px;
        padding: 2px 8px 16px 0;
      }

      .sidebar-scroll::-webkit-scrollbar {
        width: 12px;
      }

      .sidebar-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      .sidebar-scroll::-webkit-scrollbar-thumb {
        min-height: 34px;
        border: 4px solid transparent;
        border-radius: 999px;
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(245, 247, 248, 0.5) 0 2px,
            transparent 2px 8px
          )
          content-box;
      }

      .sidebar-scroll::-webkit-scrollbar-thumb:hover {
        background:
          repeating-linear-gradient(
            to bottom,
            rgba(245, 247, 248, 0.72) 0 2px,
            transparent 2px 8px
          )
          content-box;
      }

      .section {
        display: grid;
        gap: 8px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 6px;
      }

      #reloadWorkflows {
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.62);
      }

      #reloadWorkflows:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
      }

      #reloadWorkflows svg {
        width: 15px;
        height: 15px;
      }

      .section-title {
        color: rgba(245, 247, 248, 0.56);
        font-size: 11px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .workflow-list {
        display: grid;
        gap: 4px;
      }

      .workflow-block {
        display: grid;
        gap: 3px;
      }

      .run-item {
        width: 100%;
        text-align: left;
        border-color: transparent;
        background: transparent;
      }

      .workflow-item {
        min-height: 36px;
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid transparent;
        border-radius: var(--radius);
        padding: 0;
      }

      .workflow-item:hover,
      .workflow-item[aria-pressed="true"] {
        background: #31454d;
        border-color: rgba(255, 255, 255, 0.08);
      }

      .workflow-main {
        min-width: 0;
        min-height: 34px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border-color: transparent;
        background: transparent;
        text-align: left;
        padding: 5px 3px 5px 8px;
      }

      .workflow-main:hover {
        border-color: transparent;
        background: transparent;
      }

      .workflow-collapse {
        color: rgba(245, 247, 248, 0.62);
      }

      .workflow-block.collapsed .workflow-collapse svg {
        transform: rotate(-90deg);
      }

      .workflow-actions {
        display: inline-flex;
        align-items: center;
        gap: 2px;
        opacity: 0;
        pointer-events: none;
      }

      .workflow-item:hover .workflow-actions,
      .workflow-item:focus-within .workflow-actions,
      .workflow-item[aria-pressed="true"] .workflow-actions {
        opacity: 1;
        pointer-events: auto;
      }

      .workflow-action {
        width: 24px;
        min-width: 24px;
        min-height: 24px;
        padding: 0;
        display: inline-grid;
        place-items: center;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.68);
      }

      .workflow-action:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .workflow-action svg {
        width: 14px;
        height: 14px;
      }

      .workflow-menu {
        position: fixed;
        z-index: 80;
        display: none;
        min-width: 118px;
        padding: 5px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        background: #252629;
        box-shadow: var(--shadow);
      }

      .workflow-menu.open {
        display: grid;
      }

      .workflow-menu button {
        min-height: 30px;
        border-color: transparent;
        background: transparent;
        text-align: left;
        color: var(--text);
        font-size: 12px;
      }

      .workflow-menu button:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: transparent;
      }

      .workflow-icon {
        width: 18px;
        height: 18px;
        color: rgba(245, 247, 248, 0.72);
        display: grid;
        place-items: center;
      }

      .workflow-text,
      .run-text {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .workflow-text strong,
      .run-title,
      .path,
      .pill,
      .meta,
      .workspace-line,
      .profile-detail,
      .file-item {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .workflow-text strong {
        font-size: 12px;
        line-height: 1.2;
      }

      .workflow-text span,
      .run-meta,
      .meta,
      .path,
      .workspace-line,
      .profile-detail {
        color: var(--muted);
        font-size: 11px;
      }

      .run-list {
        display: grid;
        gap: 2px;
        margin-left: 24px;
        padding-left: 9px;
      }

      .workflow-block.collapsed .run-list {
        display: none;
      }

      .run-item {
        min-height: 31px;
        padding: 5px 7px;
        display: grid;
        grid-template-columns: 10px minmax(0, 1fr);
        align-items: center;
        gap: 7px;
      }

      .run-title {
        font-size: 12px;
        line-height: 1.2;
      }

      .run-item:hover,
      .run-item[aria-pressed="true"] {
        background: #31454d;
        border-color: rgba(255, 255, 255, 0.08);
      }

      .run-dot,
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--faint);
      }

      .run-dot.succeeded,
      .status-dot.ready,
      .status-dot.succeeded {
        background: var(--green);
      }

      .run-dot.running,
      .run-dot.queued,
      .run-dot.waiting,
      .status-dot.running,
      .status-dot.queued,
      .status-dot.waiting,
      .status-dot.started {
        background: var(--amber);
      }

      .run-dot.failed,
      .run-dot.canceled,
      .run-dot.cancelled,
      .status-dot.failed,
      .status-dot.canceled,
      .status-dot.cancelled {
        background: var(--rose);
      }

      .account-area {
        position: relative;
        z-index: 3;
        min-height: 0;
        margin: 0;
        padding: 8px 8px 12px 0;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.05);
      }

      .profile-button {
        width: 100%;
        min-height: 56px;
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        background: transparent;
        border-color: transparent;
        text-align: left;
        padding: 8px;
      }

      .profile-button:hover,
      .profile-button[aria-expanded="true"] {
        background: rgba(255, 255, 255, 0.06);
        border-color: rgba(255, 255, 255, 0.08);
      }

      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: #f28b74;
        color: white;
        font-size: 11px;
        font-weight: 700;
      }

      .account-name,
      .account-plan {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .account-name {
        color: var(--text);
        font-size: 14px;
        font-weight: 500;
        line-height: 1.25;
      }

      .account-plan {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .profile-popover {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: calc(100% - 1px);
        display: none;
        gap: 4px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 10px;
        background: #2b2b2c;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
        z-index: 8;
      }

      .profile-popover.open {
        display: grid;
      }

      .profile-menu-item {
        min-height: 32px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        border-color: transparent;
        background: transparent;
        color: #f1f1f1;
        text-align: left;
        padding: 6px 7px;
      }

      .profile-menu-item:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: transparent;
      }

      .profile-menu-item svg {
        width: 14px;
        height: 14px;
        color: #c7c7c7;
      }

      .profile-menu-item .shortcut,
      .profile-menu-item .chevron {
        color: #a8a8a8;
        font-size: 12px;
      }

      .profile-menu-item.muted {
        color: #a8a8a8;
      }

      .profile-menu-separator {
        height: 1px;
        margin: 4px 5px;
        background: rgba(255, 255, 255, 0.12);
      }

      .workspace-panel {
        display: none;
        gap: 8px;
        padding: 8px 7px 6px;
      }

      .workspace-panel.open {
        display: grid;
      }

      .workspace-actions {
        display: grid;
        grid-template-columns: 1fr 1fr auto;
        gap: 8px;
      }

      .main {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        height: auto;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        overflow: hidden;
        background: var(--bg);
        position: relative;
      }

      .shell.nav-collapsed .main {
        grid-column: 1;
      }

      .toolbar {
        min-width: 0;
        min-height: 64px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(16, 18, 21, 0.94);
      }

      .toolbar-title {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .toolbar-title strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .toolbar-right {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .pill {
        max-width: 240px;
        min-height: 28px;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px 9px;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.03);
        font-size: 12px;
      }

      .transcript {
        min-height: 0;
        overflow: auto;
        display: grid;
        grid-template-columns: minmax(0, var(--content-width));
        justify-content: center;
        align-content: start;
        gap: 8px;
        padding: 18px 18px;
      }

      .node-rail {
        position: fixed;
        top: 50%;
        left: calc(var(--sidebar-width) + 22px);
        width: 18px;
        max-height: min(54vh, 360px);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 7px;
        overflow: visible;
        pointer-events: auto;
        transform: translateY(-50%);
        z-index: 8;
      }

      .shell.nav-collapsed .node-rail {
        left: 19px;
      }

      .shell.nav-collapsed.nav-revealed .node-rail {
        left: calc(var(--sidebar-width) + 22px);
      }

      .node-rail:empty {
        display: none;
      }

      .node-rail-marker {
        --marker-color: rgba(245, 247, 248, 0.22);
        --marker-width: 12px;
        position: relative;
        width: 40px;
        min-width: 0;
        height: 7px;
        min-height: 0;
        flex: 0 0 7px;
        box-sizing: border-box;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      .node-rail-marker.active {
        --marker-color: rgba(245, 247, 248, 0.56);
      }

      .node-rail-marker.wave-center,
      .node-rail-marker:focus-visible {
        --marker-color: rgba(245, 247, 248, 0.86);
        --marker-width: 28px;
        background: transparent;
      }

      .node-rail-marker.wave-near {
        --marker-color: rgba(245, 247, 248, 0.38);
        --marker-width: 22px;
      }

      .node-rail-marker.wave-far {
        --marker-color: rgba(245, 247, 248, 0.28);
        --marker-width: 16px;
      }

      .node-rail-marker:focus-visible {
        outline: none;
      }

      .node-rail-marker::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 0;
        width: var(--marker-width);
        height: 3px;
        border-radius: 999px;
        background: var(--marker-color);
        transform: translateY(-50%);
        transition:
          background 140ms ease,
          width 140ms ease;
      }

      .node-rail-marker:focus-visible::before {
        box-shadow: 0 0 0 2px rgba(245, 247, 248, 0.3);
      }

      .node-rail-marker::after {
        content: attr(data-node-label);
        position: absolute;
        left: calc(var(--marker-width) + 12px);
        top: 50%;
        min-width: 124px;
        max-width: 260px;
        padding: 8px 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        background: rgba(38, 38, 38, 0.96);
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.32);

        white-space: nowrap;

      .message.node.failed .node-status {
        color: var(--rose);

      .typing .node-status::after {
        content: "";

        height: 6px;

      .code-block {
        margin-top: 8px;

      pre {

        line-height: 1.45;

      .composer-wrap {

        align-content: end;
        padding: 10px 18px 6px;
        background: rgba(13, 15, 18, 0.97);

        gap: 9px;
        max-width: var(--content-width);
        margin: 0 auto;

        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .composer-frame {
        position: relative;
        display: grid;
        grid-template-rows: minmax(44px, 1fr) auto;
        gap: 8px;
        min-height: 100px;
        padding: 13px 10px 8px;

      .mention-option span {

        text-overflow: ellipsis;
        white-space: nowrap;

        align-items: center;
        justify-content: space-between;
        gap: 12px;

      .composer-tools {

        align-content: center;
      }

      .tools-panel-resizer {
        position: absolute;
        top: 0;
        left: -5px;
        bottom: 0;
        z-index: 3;
        width: 10px;
        cursor: col-resize;
        touch-action: none;
      }

      .tools-panel-resizer::after {
        content: "";
        position: absolute;
        top: 0;
        left: 4px;
        bottom: 0;
        width: 1px;
        background: transparent;
      }

      .tools-panel-resizer:hover::after,
      body.resizing-tools-panel .tools-panel-resizer::after {
        background: rgba(245, 247, 248, 0.22);
      }

      .launcher-option {
        min-height: 44px;
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        border-color: transparent;
        border-radius: 8px;
        background: rgba(20, 21, 23, 0.98);
        color: rgba(245, 247, 248, 0.86);
        text-align: left;
        padding: 8px 12px;
      }

      .launcher-option:hover {
        border-color: transparent;
        background: #202124;
        color: var(--text);
      }

      .launcher-option svg {
        width: 16px;
        height: 16px;
        color: rgba(245, 247, 248, 0.68);
      }

      .launcher-shortcut {
        min-height: 22px;
        display: inline-flex;
        align-items: center;
        padding: 1px 7px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(245, 247, 248, 0.66);
        font-size: 12px;
      }

      .dock-head {
        min-height: 54px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .dock-title {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        font-size: 13px;
        font-weight: 650;
      }

      .dock-close {
        width: 28px;
        min-width: 28px;
        min-height: 28px;
        padding: 0;
        border-color: transparent;
        background: transparent;
      }

      .file-filter {
        padding: 12px 12px 6px;
      }

      .file-filter input {
        min-height: 36px;
        border-radius: 10px;
        background: #202124;
      }

      .file-tree {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 2px;
        padding: 4px 10px 14px;
      }

      .file-row {
        min-height: 30px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        border-color: transparent;
        background: transparent;
        text-align: left;
        color: rgba(245, 247, 248, 0.82);
      }

      .file-row:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.06);
      }

      .workspace-surface {
        position: relative;
        grid-column: 3;
        grid-row: 1;
        z-index: 2;
        width: auto;
        min-width: 0;
        max-width: none;
        min-height: 0;
        height: auto;
        display: none;
        grid-template-rows: 58px 52px minmax(0, 1fr);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--bg);
      }

      .workspace-surface.open {
        display: grid;
      }

      .shell.nav-collapsed .workspace-surface {
        grid-column: 2;
      }

      .workspace-tabs {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .workspace-tab {
        min-height: 36px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 240px;
        border-color: transparent;
        border-radius: 10px;
        background: transparent;
        color: rgba(245, 247, 248, 0.62);
        padding: 7px 12px;
      }

      .workspace-tab.active {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .workspace-tab span {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tab-add {
        width: 32px;
        min-width: 32px;
        min-height: 32px;
        padding: 0;
        border-color: transparent;
        background: transparent;
        color: rgba(245, 247, 248, 0.62);
      }

      .tab-add:hover {
        border-color: transparent;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .tab-add-menu {
        position: fixed;
        z-index: 70;
        display: none;
        width: 220px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 14px;
        background: #2d2d2e;
        box-shadow: var(--shadow);
      }

      .tab-add-menu.open {
        display: grid;
      }

      .workspace-pathbar {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 18px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(245, 247, 248, 0.72);
        font-size: 14px;
      }

      .workspace-body {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(170px, 34%);
      }

      .workspace-content {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        padding: 36px 36px 80px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
      }

      .file-empty {
        align-self: center;
        justify-self: center;
        display: grid;
        justify-items: center;
        gap: 10px;
        color: var(--muted);
        text-align: center;
      }

      .file-empty svg {
        width: 34px;
        height: 34px;
      }

      .file-document {
        max-width: 760px;
        display: grid;
        gap: 18px;
        color: #f2f2f2;
        font-size: 16px;
        line-height: 1.55;
      }

      .file-document h1,
      .file-document h2,
      .file-document h3 {
        margin: 0;
        line-height: 1.15;
      }

      .file-document h1 {
        font-size: 34px;
      }

      .file-document h2 {
        margin-top: 14px;
        font-size: 26px;
      }

      .file-document p,
      .file-document ol,
      .file-document ul {
        margin: 0;
      }

      .file-document code {
        padding: 1px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.12);
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .file-document pre {
        border-radius: 10px;
        background: #2d2d2e;
      }

      .file-raw {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .terminal-output {
        min-height: 0;
        overflow: auto;
        padding: 14px 16px;
        color: #d6d8dc;
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .terminal-form {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        padding: 10px 14px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
      }

      .terminal-prompt {
        color: #dd7bdc;
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      }

      .terminal-form input {
        min-height: 34px;
        border: 0;
        background: transparent;
        color: var(--text);
        font-family:
          "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        outline: none;
      }

      .artifacts-popover {
        position: fixed;
        top: 58px;
        right: 18px;
        z-index: 55;
        display: none;
        width: min(300px, calc(100vw - 36px));
        max-height: min(420px, calc(100vh - 90px));
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: #2d2d2e;
        box-shadow: var(--shadow);
        overflow: auto;
      }

      .artifacts-popover.open {
        display: grid;
        gap: 12px;
      }

      .artifacts-popover .section-title {
        font-size: 12px;
      }

      .workflow-panel {
        position: relative;
        grid-column: 1;
        grid-row: 4;
        z-index: 1;
        display: none;
        grid-template-rows: auto minmax(0, 1fr);
        width: 100%;
        height: clamp(180px, 38vh, 360px);
        min-height: 0;
        padding: 0 18px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(19, 20, 22, 0.98);
      }

      .workflow-panel.open {
        display: grid;
      }

      .workflow-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 12px;
      }

      .workflow-panel-title {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-width: 0;
      }

      .workflow-panel-title strong {
        color: var(--text);
        font-size: 13px;
        letter-spacing: 0;
      }

      .workflow-panel-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .workflow-panel-actions .icon {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
      }

      .workflow-panel-body {
        min-height: 0;
        overflow: auto;
        padding: 12px 0 0;
      }

      .workflow-graph {
        width: min(760px, calc(100vw - 28px));
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 8px;
        margin: 0 auto;
      }

      .workflow-node {
        min-height: 74px;
        display: grid;
        place-items: center;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #17191d;
        color: var(--muted);
        text-align: center;
        font-size: 11px;
        line-height: 1.25;
      }

      .workflow-node.done {
        border-color: rgba(54, 208, 125, 0.35);
        color: var(--text);
      }

      .workflow-node.active {
        border-color: var(--cyan);
        color: var(--text);
        animation: active-node-pulse 1100ms ease-in-out infinite;
      }

      .inspector {
        min-width: 0;
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 16px;
        padding: 14px;
        overflow: hidden;
        border-left: 1px solid var(--border);
        background: #121416;
      }

      .inspector-card {
        display: grid;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
      }

      .inspector-list {
        min-height: 0;
        overflow: auto;
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .file-item {
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        color: var(--muted);
        font-size: 12px;
      }

      .alert {
        min-height: 20px;
        color: var(--rose);
        font-size: 13px;
      }

      .composer .alert:empty {
        display: none;
      }

      .notice {
        color: var(--amber);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: none;
        place-items: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.52);
      }

      .modal-backdrop.open {
        display: grid;
      }

      .run-modal {
        width: min(560px, 100%);
        max-height: min(760px, calc(100vh - 48px));
        overflow: auto;
        display: grid;
        gap: 14px;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #202124;
        box-shadow: var(--shadow);
      }

      .run-modal header {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .run-modal h2 {
        margin: 0;
        color: var(--text);
        font-size: 15px;
        line-height: 1.3;
      }

      .run-modal p {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .modal-close {
        width: 30px;
        min-width: 30px;
        min-height: 30px;
        padding: 0;
        display: grid;
        place-items: center;
        border-color: transparent;
        background: transparent;
      }

      .modal-workspace {
        display: grid;
        gap: 8px;
      }

      .modal-path {
        min-height: 38px;
        display: flex;
        align-items: center;
        padding: 8px 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #15171a;
        color: var(--muted);
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .run-version-section {
        display: grid;
        gap: 7px;
        padding-bottom: 2px;
      }

      .run-version-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 22px;
      }

      .run-version-label span {
        color: var(--text);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.3;
      }

      .run-version-label strong {
        flex: 0 1 auto;
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.3;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .run-version-section select {
        min-height: 40px;
      }

      .run-version-meta {
        min-height: 16px;
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }

      .run-input-section {
        display: grid;
        gap: 10px;
        padding-top: 2px;
      }

      .run-input-section.hidden {
        display: none !important;
      }

      .run-input-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 24px;
      }

      .run-input-section-head strong {
        color: var(--text);
        font-size: 12px;
        line-height: 1.3;
      }

      .run-input-section-head span {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .run-input-fields {
        display: grid;
        gap: 12px;
      }

      .run-input-state {
        min-height: 42px;
        display: grid;
        align-items: center;
        border: 1px dashed rgba(255, 255, 255, 0.14);
        border-radius: var(--radius);
        padding: 10px 12px;
        color: var(--muted);
        font-size: 12px;
      }

      .run-field {
        display: grid;
        gap: 7px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .run-field:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .run-field-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 12px;
      }

      .run-field-label {
        display: grid;
        gap: 3px;
        min-width: 0;
      }

      .run-field-label strong {
        color: var(--text);
        font-size: 12px;
        line-height: 1.35;
      }

      .run-field-label span {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
      }

      .run-field-type {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 2px 7px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--faint);
        font-size: 10px;
        font-weight: 700;
      }

      .run-field textarea {
        min-height: 92px;
        resize: vertical;
        unicode-bidi: plaintext;
      }

      .run-field-error {
        min-height: 16px;
        color: var(--rose);
        font-size: 11px;
        line-height: 1.35;
      }

      .run-field-error:empty {
        display: none;
      }

      .run-choice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(118px, 1fr));
        gap: 8px;
      }

      .run-choice {
        min-height: 40px;
        justify-content: start;
        text-align: left;
        border-color: rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
      }

      .run-choice[aria-pressed="true"] {
        border-color: rgba(118, 212, 255, 0.58);
        background: rgba(118, 212, 255, 0.13);
        color: #e0f6ff;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .hidden {
        display: none !important;
      }

      @keyframes message-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes active-node-pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(118, 212, 255, 0.12);
        }
        50% {
          box-shadow: 0 0 0 3px rgba(118, 212, 255, 0.28);
        }
      }

      @media (max-width: 1140px) {
        .node-rail {
          display: none !important;
        }

        .shell {
          grid-template-columns: var(--sidebar-width) minmax(0, 1fr) 0;
        }

        .shell.nav-collapsed {
          grid-template-columns: minmax(0, 1fr) 0;
        }

        .shell.tools-open {
          grid-template-columns: var(--sidebar-width) minmax(0, 1fr) var(--tools-panel-width);
        }

        .shell.nav-collapsed.tools-open {
          grid-template-columns: minmax(0, 1fr) var(--tools-panel-width);
        }
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .shell {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr) 0 0;
          height: auto;
          min-height: 100vh;
        }

        .shell.nav-collapsed {
          grid-template-columns: 1fr;
        }

        .shell.tools-open {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr) minmax(280px, 42vh) 0;
        }

        .shell.workflow-open {
          grid-template-rows: auto minmax(0, 1fr) 0 0;
        }

        .shell.tools-open.workflow-open {
          grid-template-rows: auto minmax(0, 1fr) minmax(280px, 42vh) 0;
        }

        .sidebar {
          grid-column: 1;
          grid-row: 1;
          position: relative;
          width: auto;
          transform: none;
          padding-top: 50px;
          min-height: auto;
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .shell.nav-collapsed .sidebar {
          position: fixed;
          width: var(--sidebar-width);
          transform: translateX(-100%);
          pointer-events: none;
          box-shadow: none;
        }

        .shell.nav-collapsed .nav-reveal-zone {
          display: block;
        }

        .sidebar-resizer {
          display: none;
        }

        .sidebar-scroll {
          max-height: 280px;
        }

        .main {
          grid-column: 1;
          grid-row: 2;
          min-height: 70vh;
        }

        .launcher-panel,
        .workspace-surface,
        .shell.nav-collapsed .launcher-panel,
        .shell.nav-collapsed .workspace-surface {
          grid-column: 1;
          grid-row: 3;
          border-left: 0;
          border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tools-panel-resizer {
          display: none;
        }

        .workflow-panel {
          grid-column: 1;
          grid-row: 4;
        }

        .toolbar {
          min-height: auto;
          padding: 12px 14px;
        }

        .toolbar-right {
          flex-wrap: wrap;
        }

        .toolbar-actions,
        .composer-meta {
          flex-wrap: wrap;
        }

        .composer-row {
          align-items: flex-end;
        }

        .composer-actions {
          gap: 6px;
        }

        .human-input-head,
        .human-actions {
          grid-template-columns: 1fr;
          align-items: stretch;
        }

        .human-context-row {
          grid-template-columns: 1fr;
          gap: 3px;
        }

        .model-chip span {
          max-width: 96px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }

        .transcript {
          padding: 18px;
        }

        .workspace-actions {
          grid-template-columns: 1fr;
        }
      }

      @media (max-height: 720px) {
        .sidebar {
          padding-top: 42px;
        }

        .sidebar-scroll {
          gap: 10px;
          padding-bottom: 10px;
        }

        .account-area {
          padding-top: 6px;
          padding-bottom: 8px;
        }

        .profile-button {
          min-height: 48px;
          padding: 6px 8px;
        }

        .toolbar {
          min-height: 50px;
        }

        .transcript {
          gap: 14px;
          padding-top: 16px;
          padding-bottom: 16px;
        }

        .composer-wrap {
          padding: 8px 14px 5px;
        }

        .composer {
          gap: 7px;
        }

        .composer-frame {
          gap: 6px;
          padding: 7px;
        }

        .composer-frame textarea {
          min-height: 42px;
          max-height: 112px;
        }

        .mention-menu {
          max-height: 190px;
        }
      }

      @media (max-height: 600px) {
        .main {
          grid-template-rows: auto minmax(0, 1fr) auto auto;
        }

        .toolbar {
          padding-inline: 14px;
        }

        .composer-frame textarea {
          min-height: 36px;
          max-height: 84px;
        }

        .message {
          gap: 6px;
        }
      }

    <script type="module">
      const invoke = window.__TAURI__?.core?.invoke;
      const storageKey = "loomex.runner.workflowRuns.v2";
      const sidebarWidthKey = "loomex.runner.sidebarWidth.v1";
      const navCollapsedKey = "loomex.runner.navCollapsed.v1";
      const sidebarWidthBounds = {
        min: 220,
        max: 420,
      };
      const state = {
        status: null,
        workflows: [],
        workflowInputSchemas: {},
        workflowRuns: {},
        selectedWorkflowId: null,
        selectedRunId: null,
        sending: false,
        workspacePicking: false,
        currentExecution: null,
        renderedNodes: new Set(),
        selectedFiles: [],
        mentionOptions: [],
        selectedMentionIndex: 0,
        mentionRange: null,
        collapsedWorkflows: new Set(),
        workflowMenuId: null,
        runModalWorkflowId: null,
        runModalWorkspacePath: "",
        runModalVersion: "",
        runModalVersions: [],
        runModalActiveVersion: null,
        runModalSelectedVersion: null,
        runModalInputSchema: null,
        runModalInputValues: {},
        runModalInputErrors: {},
        runModalJsonInput: "{}",
        runModalSchemaLoading: false,
        runModalSchemaRequest: "",
        pendingHumanRequest: null,
        humanResponse: {},
        humanJsonResponse: "{}",
        humanSubmitError: "",
        humanResolving: false,
        humanComposerSignature: "",
        resolvedHumanRequests: new Set(),
        activePolls: new Set(),
        durationTimer: null,
        fileEntries: [],
        terminalRunning: false,
        activeWorkspaceTab: "file",
        selectedFile: null,
        terminalLines: [],
        completedRuns: new Set(),
      };

      const $ = (id) => document.getElementById(id);

      const setPressed = (buttonId, pressed) => {
        const button = $(buttonId);
        if (button) button.setAttribute("aria-pressed", String(pressed));
      };

      const maxSidebarWidth = () => {
        if (window.innerWidth <= 820) return sidebarWidthBounds.max;
        const reservedWidth = window.innerWidth <= 1140 ? 420 : 704;
        return Math.max(
          sidebarWidthBounds.min,
          Math.min(sidebarWidthBounds.max, window.innerWidth - reservedWidth),
        );
      };

      const clampSidebarWidth = (width) =>
        Math.round(
          Math.min(
            maxSidebarWidth(),
            Math.max(sidebarWidthBounds.min, Number(width) || 292),
          ),
        );

      const setSidebarWidth = (width, persist = true) => {
        const nextWidth = clampSidebarWidth(width);
        document.documentElement.style.setProperty("--sidebar-width", `${nextWidth}px`);
        const resizer = $("sidebarResizer");
        if (resizer) {
          resizer.setAttribute("aria-valuenow", String(nextWidth));
          resizer.setAttribute("aria-valuemax", String(maxSidebarWidth()));
        }
        if (persist) {
          try {
            localStorage.setItem(sidebarWidthKey, String(nextWidth));
          } catch {
            /* localStorage can be unavailable in restricted webviews */
          }
        }
      };

      const loadSidebarWidth = () => {
        try {
          return Number(localStorage.getItem(sidebarWidthKey)) || 292;
        } catch {
          return 292;
        }
      };

      const setNavCollapsed = (collapsed, persist = true) => {
        const shell = $("chatView");
        const toggle = $("navToggle");
        if (!shell || !toggle) return;
        shell.classList.toggle("nav-collapsed", collapsed);
        shell.classList.remove("nav-revealed");
        toggle.setAttribute("aria-pressed", String(collapsed));
        toggle.setAttribute("aria-label", collapsed ? "Show navigation" : "Hide navigation");
        if (persist) {
          try {
            localStorage.setItem(navCollapsedKey, collapsed ? "1" : "0");
          } catch {
            /* localStorage can be unavailable in restricted webviews */
          }
        }
      };

      const loadNavCollapsed = () => {
        try {
          return localStorage.getItem(navCollapsedKey) === "1";
        } catch {
          return false;
        }
      };

      const icons = {
        workflow:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h6v6H4z" /><path d="M14 4h6v6h-6z" /><path d="M4 14h6v6H4z" /><path d="M14 14h6v6h-6z" /></svg>',
        folder:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /></svg>',
        file:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></svg>',
        chevron:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>',
        play:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7Z" /></svg>',
        more:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12h.01" /><path d="M19 12h.01" /><path d="M5 12h.01" /></svg>',
        terminal:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m4 17 6-5-6-5" /><path d="M12 19h8" /></svg>',
        search:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="m20 20-3-3" /></svg>',
        fileRead:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /></svg>',
        fileWrite:
          '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" /></svg>',
      };

      const call = async (command, args = {}) => {
        if (!invoke) throw new Error("Tauri invoke is unavailable");
        try {
          return await invoke(command, args);
        } catch (error) {
          throw new Error(error?.message || error?.code || String(error));
        }
      };

      const workflowName = (workflow) =>
        workflow?.name || workflow?.title || workflow?.id || "Untitled workflow";

      const selectedWorkflow = () =>
        state.workflows.find((workflow) => workflow.id === state.selectedWorkflowId);

      const shortenId = (value) => (value ? String(value).slice(0, 8) : "");

      const rawStatus = (status) => String(status || "").trim().toLowerCase();

      const isHumanWaitingStatus = (status) =>
        [
          "waiting",
          "waiting_for_human",
          "waiting_for_input",
          "waiting_for_approval",
          "waiting_for_clarification",
          "awaiting_human",
          "awaiting_human_input",
          "human_input_pending",
        ].includes(rawStatus(status));

      const cleanStatus = (status) => {
        const value = rawStatus(status);
        if (["succeeded", "success", "completed", "complete", "done"].includes(value)) return "succeeded";
        if (["failed", "failure", "error", "errored", "timed_out", "timeout"].includes(value)) return "failed";
        if (["canceled", "cancelled", "aborted"].includes(value)) return "canceled";
        if (["queued", "pending", "scheduled"].includes(value)) return "queued";
        if (isHumanWaitingStatus(value)) return "waiting";
        if (["running", "started", "in_progress", "waiting", "processing"].includes(value)) return "running";
        return "ready";
      };

      const statusLabel = (status) => {
        const value = cleanStatus(status);
        if (value === "succeeded") return "Succeeded";
        if (value === "failed") return "Failed";
        if (value === "canceled" || value === "cancelled") return "Canceled";
        if (value === "queued") return "Queued";
        if (value === "waiting") return "Waiting";
        if (value === "running" || value === "started") return "Running";
        return "Ready";
      };

      const terminalExecutionStatuses = new Set([
        "succeeded",
        "failed",
        "canceled",
      ]);

      const setError = (id, message) => {
        $(id).textContent = message || "";
      };

      const setNotice = (message) => {
        $("appNotice").textContent = message || "";
      };

      let toolsPanelResize = null;

      const clampToolsPanelWidth = (width) => {
        const min = 320;
        const sidebarWidth = $("chatView").classList.contains("nav-collapsed") ? 0 : parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-width")) || 0;
        const max = Math.max(min, window.innerWidth - sidebarWidth - 280);
        return Math.min(max, Math.max(min, width));
      };

      const setToolsPanelWidth = (width) => {
        document.documentElement.style.setProperty("--tools-panel-width", `${clampToolsPanelWidth(width)}px`);
      };

      const stopToolsPanelResize = () => {
        toolsPanelResize = null;
        document.body.classList.remove("resizing-tools-panel");
        window.removeEventListener("pointermove", resizeToolsPanel);
      };

      const resizeToolsPanel = (event) => {
        if (!toolsPanelResize) return;
        setToolsPanelWidth(toolsPanelResize.startWidth + toolsPanelResize.startX - event.clientX);
      };

      const startToolsPanelResize = (event) => {
        const panel = event.currentTarget.closest(".launcher-panel, .workspace-surface");
        if (!panel) return;
        event.preventDefault();
        toolsPanelResize = {
          startX: event.clientX,
          startWidth: panel.getBoundingClientRect().width,
        };
        event.currentTarget.setPointerCapture?.(event.pointerId);
        document.body.classList.add("resizing-tools-panel");
        window.addEventListener("pointermove", resizeToolsPanel);
        window.addEventListener("pointerup", stopToolsPanelResize, { once: true });
      };

      const closeToolsPanel = () => {
        $("sideNavPanel").classList.remove("open");
        $("workspaceSurface").classList.remove("open");
        $("tabAddMenu").classList.remove("open");
        $("chatView").classList.remove("tools-open");
        setPressed("artifactsToggle", false);
      };

      const openToolsLauncher = () => {
        $("workspaceSurface").classList.remove("open");
        $("tabAddMenu").classList.remove("open");
        $("chatView").classList.add("tools-open");
        $("sideNavPanel").classList.add("open");
        setPressed("artifactsToggle", true);
      };

      const openWorkspaceSurface = (tab = "file") => {
        state.activeWorkspaceTab = tab;
        $("sideNavPanel").classList.remove("open");
        $("chatView").classList.add("tools-open");
        $("workspaceSurface").classList.add("open");
        setPressed("artifactsToggle", true);
        $("fileTab").classList.toggle("active", tab === "file");
        $("terminalTab").classList.toggle("active", tab === "terminal");
        $("terminalTab").classList.toggle("hidden", !state.terminalLines.length && tab !== "terminal");
        $("workspacePathbar").textContent = state.selectedFile?.relativePath || state.status?.workspacePath || "/";
        renderWorkspaceContent();
      };

      const escapeHtml = (value) =>
        String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");

      const renderMarkdownish = (content) => {
        const lines = String(content || "").split("\n");
        const html = [];
        let listOpen = false;
        let codeOpen = false;
        for (const line of lines) {
          if (line.startsWith("```")) {
            html.push(codeOpen ? "</code></pre>" : "<pre><code>");
            codeOpen = !codeOpen;
            continue;
          }
          if (codeOpen) {
            html.push(`${escapeHtml(line)}\n`);
            continue;
          }
          const trimmed = line.trim();
          if (!trimmed) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            continue;
          }
          if (trimmed.startsWith("# ")) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(`<h1>${escapeHtml(trimmed.slice(2))}</h1>`);
          } else if (trimmed.startsWith("## ")) {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(`<h2>${escapeHtml(trimmed.slice(3))}</h2>`);
          } else if (trimmed.startsWith("- ")) {
            if (!listOpen) {
              html.push("<ul>");
              listOpen = true;
            }
            html.push(`<li>${escapeHtml(trimmed.slice(2))}</li>`);
          } else {
            if (listOpen) {
              html.push("</ul>");
              listOpen = false;
            }
            html.push(`<p>${escapeHtml(trimmed).replaceAll(/`([^`]+)`/g, "<code>$1</code>")}</p>`);
          }
        }
        if (listOpen) html.push("</ul>");
        if (codeOpen) html.push("</code></pre>");
        return html.join("");
      };

      const renderWorkspaceContent = () => {
        const content = $("workspaceContent");
        content.innerHTML = "";
        $("fileTabTitle").textContent = state.selectedFile?.name || "Open file";
        $("terminalTab").classList.toggle("hidden", !state.terminalLines.length && state.activeWorkspaceTab !== "terminal");
        $("fileTab").classList.toggle("active", state.activeWorkspaceTab === "file");
        $("terminalTab").classList.toggle("active", state.activeWorkspaceTab === "terminal");
        if (state.activeWorkspaceTab === "terminal") {
          content.innerHTML = `
            <div id="terminalOutput" class="terminal-output"></div>
            <form id="terminalForm" class="terminal-form">
              <span class="terminal-prompt">›</span>
              <input id="terminalInput" autocomplete="off" spellcheck="false" aria-label="Terminal command" />
            </form>
          `;
          const output = $("terminalOutput");
          for (const line of state.terminalLines) {
            const item = document.createElement("div");
            item.textContent = line;
            output.append(item);
          }
          output.scrollTop = output.scrollHeight;
          $("terminalForm").addEventListener("submit", async (event) => {
            event.preventDefault();
            await runTerminalCommand();
          });
          $("terminalInput").focus();
          return;
        }
        if (!state.selectedFile) {
          content.innerHTML = `
            <div class="file-empty">
              ${icons.folder}
              <strong>Open file</strong>
              <span>Select a file from the workspace tree</span>
            </div>
          `;
          return;
        }
        const article = document.createElement("article");
        const isMarkdown = /\.md(?:own)?$/i.test(state.selectedFile.relativePath || state.selectedFile.name || "");
        article.className = isMarkdown ? "file-document" : "file-document file-raw";
        if (isMarkdown) {
          article.innerHTML = renderMarkdownish(state.selectedFile.content);
        } else {
          const pre = document.createElement("pre");
          pre.className = "file-raw";
          pre.textContent = state.selectedFile.content || "";
          article.append(pre);
        }
        content.append(article);
      };

      const renderFileTree = () => {
        const tree = $("fileTree");
        const query = $("fileFilter").value.trim().toLowerCase();
        tree.innerHTML = "";
        const entries = state.fileEntries.filter((entry) => {
          const text = `${entry.relativePath || ""} ${entry.name || ""}`.toLowerCase();
          return !query || text.includes(query);
        });
        if (!entries.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.style.padding = "8px";
          empty.textContent = state.status?.workspacePath ? "No files found" : "Choose a workspace first";
          tree.append(empty);
          return;
        }
        for (const entry of entries) {
          const row = document.createElement("button");
          row.type = "button";
          row.className = "file-row";
          row.style.paddingLeft = `${8 + Math.min(5, (entry.relativePath || "").split("/").length - 1) * 14}px`;
          row.innerHTML = `${entry.isDir ? icons.folder : icons.file}<span></span>`;
          row.querySelector("span").textContent = entry.relativePath || entry.name;
          row.title = entry.path;
          if (!entry.isDir) {
            row.addEventListener("click", () => openWorkspaceFile(entry));
          }
          tree.append(row);
        }
      };

      const loadWorkspaceFiles = async () => {
        const tree = $("fileTree");
        tree.innerHTML = "<div class=\"meta\" style=\"padding: 8px\">Loading files...</div>";
        try {
          const response = await call("workspace_file_list", {
            request: {
              profile: null,
              query: $("fileFilter").value,
              limit: 80,
            },
          });
          state.fileEntries = response.entries || [];
          renderFileTree();
        } catch (error) {
          state.fileEntries = [];
          tree.innerHTML = "";
          const item = document.createElement("div");
          item.className = "alert";
          item.style.padding = "8px";
          item.textContent = error.message;
          tree.append(item);
        }
      };

      const openFilesPanel = async () => {
        openWorkspaceSurface("file");
        $("fileFilter").focus();
        await loadWorkspaceFiles();
      };

      const appendTerminalLine = (text, className = "") => {
        state.terminalLines.push(text);
        if (state.activeWorkspaceTab === "terminal") renderWorkspaceContent();
      };

      const openTerminalPanel = () => {
        if (!state.terminalLines.length) {
          appendTerminalLine(state.status?.workspacePath || "Workspace not set");
        }
        openWorkspaceSurface("terminal");
      };

      const openWorkspaceFile = async (entry) => {
        try {
          const response = await call("workspace_file_read", {
            request: {
              profile: null,
              path: entry.path,
            },
          });
          state.selectedFile = {
            ...entry,
            name: response.relativePath.split("/").pop() || entry.name,
            relativePath: response.relativePath,
            content: response.content,
          };
          $("workspacePathbar").textContent = response.relativePath;
          openWorkspaceSurface("file");
        } catch (error) {
          setError("composerError", error.message);
        }
      };

      const runTerminalCommand = async () => {
        const input = $("terminalInput");
        const command = input.value.trim();
        if (!command || state.terminalRunning) return;
        input.value = "";
        state.terminalRunning = true;
        input.disabled = true;
        appendTerminalLine(`› ${command}`);
        try {
          const response = await call("terminal_command", {
            request: {
              profile: null,
              command,
            },
          });
          if (response.stdout) appendTerminalLine(response.stdout.trimEnd());
          if (response.stderr) appendTerminalLine(response.stderr.trimEnd());
          if (response.timedOut) appendTerminalLine("Command timed out after 30s");
          else if (response.exitCode && response.exitCode !== 0) {
            appendTerminalLine(`Exited with code ${response.exitCode}`);
          }
        } catch (error) {
          appendTerminalLine(error.message);
        } finally {
          state.terminalRunning = false;
          const nextInput = $("terminalInput");
          if (nextInput) {
            nextInput.disabled = false;
            nextInput.focus();
          }
        }
      };

      const fileDisplayName = (entry) =>
        entry?.name || String(entry?.relativePath || entry?.path || "").split(/[\\/]/).pop() || "file";

      const renderMentionChips = () => {
        const chips = $("mentionChips");
        chips.innerHTML = "";
        chips.classList.toggle("open", state.selectedFiles.length > 0);
        for (const file of state.selectedFiles) {
          const chip = document.createElement("a");
          chip.className = "mention-chip";
          chip.href = "#";
          chip.title = file.relativePath || file.path;
          chip.innerHTML = `${file.isDir ? icons.folder : icons.file}<span></span><button type="button" aria-label="Remove selected file">x</button>`;
          chip.querySelector("span").textContent = fileDisplayName(file);
          chip.addEventListener("click", (event) => event.preventDefault());
          chip.querySelector("button").addEventListener("click", (event) => {
            event.preventDefault();
            state.selectedFiles = state.selectedFiles.filter((item) => item.path !== file.path);
            renderMentionChips();
          });
          chips.append(chip);
        }
      };

      const closeMentionMenu = () => {
        state.mentionOptions = [];
        state.selectedMentionIndex = 0;
        state.mentionRange = null;
        $("mentionMenu").classList.remove("open");
        $("mentionMenu").innerHTML = "";
      };

      const renderMentionMenu = () => {
        const menu = $("mentionMenu");
        menu.innerHTML = "";
        if (!state.mentionOptions.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.style.padding = "8px";
          empty.textContent = state.status?.workspacePath ? "No matching files" : "Choose a workspace first";
          menu.append(empty);
          menu.classList.add("open");
          return;
        }
        state.mentionOptions.forEach((entry, index) => {
          const option = document.createElement("button");
          option.type = "button";
          option.className = "mention-option";
          option.setAttribute("role", "option");
          option.setAttribute("aria-selected", String(index === state.selectedMentionIndex));
          option.innerHTML = `${entry.isDir ? icons.folder : icons.file}<span></span>`;
          option.querySelector("span").textContent = entry.relativePath || fileDisplayName(entry);
          option.addEventListener("click", () => selectMentionOption(index));
          menu.append(option);
        });
        menu.classList.add("open");
      };

      const activeMentionQuery = () => {
        const input = $("composer");
        const cursor = input.selectionStart || 0;
        const before = input.value.slice(0, cursor);
        const match = before.match(/(^|\s)@([^\s@]*)$/);
        if (!match) return null;
        const start = cursor - match[2].length - 1;
        return { start, end: cursor, query: match[2] };
      };

      const refreshMentionOptions = async () => {
        const mention = activeMentionQuery();
        if (!mention) {
          closeMentionMenu();
          return;
        }
        state.mentionRange = mention;
        try {
          const response = await call("workspace_file_list", {
            request: {
              profile: null,
              query: mention.query,
              limit: 40,
            },
          });
          const selected = new Set(state.selectedFiles.map((file) => file.path));
          state.mentionOptions = (response.entries || []).filter((entry) => !selected.has(entry.path));
          state.selectedMentionIndex = 0;
          renderMentionMenu();
        } catch (error) {
          state.mentionOptions = [];
          renderMentionMenu();
        }
      };

      const selectMentionOption = (index = state.selectedMentionIndex) => {
        const entry = state.mentionOptions[index];
        if (!entry || !state.mentionRange) return;
        state.selectedFiles = [
          ...state.selectedFiles.filter((item) => item.path !== entry.path),
          entry,
        ];
        const input = $("composer");
        const before = input.value.slice(0, state.mentionRange.start);
        const after = input.value.slice(state.mentionRange.end);
        const spacer = before && !before.endsWith(" ") ? " " : "";
        input.value = `${before}${spacer}${after}`.replace(/\s{2,}/g, " ");
        input.focus();
        input.selectionStart = input.selectionEnd = Math.min(input.value.length, before.length + spacer.length);
        renderMentionChips();
        closeMentionMenu();
      };

      const setWorkspacePicking = (picking) => {
        state.workspacePicking = picking;
        const chooseButton = $("chooseWorkspace");
        if (chooseButton) {
          chooseButton.disabled = picking;
          chooseButton.textContent = picking ? "Choosing..." : "Choose";
        }
      };

      const loadLocalRuns = () => {
        try {
          const parsed = JSON.parse(localStorage.getItem(storageKey) || "{}");
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch {
          return {};
        }
      };

      const saveLocalRuns = () => {
        try {
          localStorage.setItem(storageKey, JSON.stringify(state.workflowRuns));
        } catch {
          /* localStorage can be unavailable in restricted webviews */
        }
      };

      const runsForWorkflow = (workflowId) =>
        (state.workflowRuns[workflowId] || [])
          .slice()
          .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

      const upsertRun = (run) => {
        if (!run.workflowId || !run.executionId) return;
        const runs = runsForWorkflow(run.workflowId);
        const index = runs.findIndex((item) => item.executionId === run.executionId);
        const next = {
          ...(index >= 0 ? runs[index] : {}),
          ...run,
          updatedAt: run.updatedAt ?? (index >= 0 ? runs[index].updatedAt : Date.now()),
        };
        if (index >= 0) runs.splice(index, 1, next);
        else runs.unshift(next);
        state.workflowRuns[run.workflowId] = runs.slice(0, 12);
        saveLocalRuns();
        renderWorkflowList();
      };

      const summarizeRun = (execution) => {
        const output = execution?.output || execution?.outputs || {};
        const result = output.result || {};
        return result.summary || output.summary?.text || output.summary || "";
      };

      const runTimestamp = (execution) => {
        const parsed = Date.parse(
          execution?.updatedAt ||
            execution?.updated_at ||
            execution?.finishedAt ||
            execution?.completedAt ||
            execution?.createdAt ||
            "",
        );
        return Number.isFinite(parsed) ? parsed : Date.now();
      };

      const changedFiles = (execution) => {
        const output = execution?.output || {};
        const result = output.result || {};
        const nodeOutputs = output.nodeOutputs || {};
        const files = new Set();
        for (const value of [
          result.changedFiles,
          nodeOutputs.end?.changedFiles,
          nodeOutputs.backend_developer?.changedFiles,
          nodeOutputs.technical_lead?.changedFiles,
        ]) {
          if (Array.isArray(value)) value.forEach((item) => files.add(String(item)));
        }
        if (Array.isArray(nodeOutputs.backend_developer?.files)) {
          nodeOutputs.backend_developer.files.forEach((file) => {
            if (file?.path) files.add(String(file.path));
          });
        }
        return Array.from(files);
      };

      const runFromExecution = (execution, fallbackWorkflowId) => {
        const executionId = execution?.id || execution?.executionId;
        if (!executionId) return null;
        return {
          workflowId: execution.workflowId || execution.workflow_id || fallbackWorkflowId,
          executionId,
          status: cleanStatus(execution.status),
          prompt:
            execution.input?.prompt ||
            execution.inputs?.prompt ||
            execution.input?.message ||
            execution.inputs?.message ||
            "",
          summary: summarizeRun(execution),
          changedFiles: changedFiles(execution),
          updatedAt: runTimestamp(execution),
        };
      };

      const replaceRunsForWorkflow = (workflowId, backendRuns) => {
        const backendIds = new Set(backendRuns.map((run) => run.executionId));
        const cachedPending = runsForWorkflow(workflowId).filter(
          (run) =>
            run.executionId &&
            !backendIds.has(run.executionId) &&
            !terminalExecutionStatuses.has(cleanStatus(run.status)),
        );
        state.workflowRuns[workflowId] = [...backendRuns, ...cachedPending]
          .sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0))
          .slice(0, 12);
      };

      const setRunChrome = (run) => {
        const workflow = selectedWorkflow();
        const status = cleanStatus(run?.status || state.currentExecution?.status);
        $("runStatusDot").className = `status-dot ${status === "ready" ? "ready" : status}`;
        $("runStatePill").textContent = statusLabel(status);
        $("chatTitle").textContent = workflow ? workflowName(workflow) : "Select a workflow";
        $("composerRunMeta").textContent = run?.executionId
          ? `Run ${shortenId(run.executionId)}`
          : "No active run";
        const panelStatus = $("workflowPanelStatus");
        if (panelStatus) {
          panelStatus.textContent = run?.executionId ? statusLabel(status) : "Ready";
        }
        const panelDot = $("workflowPanelDot");
        if (panelDot) {
          panelDot.className = `status-dot ${status === "ready" ? "ready" : status}`;
        }
      };

      const workflowGraphNodes = [
        ["runner", "Runner"],
        ["start", "Prompt"],
        ["backend_developer", "Backend Developer"],
        ["technical_lead", "Technical Lead"],
        ["end", "Report"],
      ];

      const renderWorkflowGraph = (execution = state.currentExecution) => {
        const graph = $("workflowGraph");
        if (!graph) return;
        const outputs = execution?.output?.nodeOutputs || {};
        const status = cleanStatus(execution?.status || "ready");
        const panelStatus = $("workflowPanelStatus");
        if (panelStatus) {
          panelStatus.textContent = execution?.id ? statusLabel(status) : "Ready";
        }
        const panelDot = $("workflowPanelDot");
        if (panelDot) {
          panelDot.className = `status-dot ${status === "ready" ? "ready" : status}`;
        }
        const activeIndex = !execution
          ? -1
          : terminalExecutionStatuses.has(status)
          ? -1
          : Math.min(
              workflowGraphNodes.length - 1,
              workflowGraphNodes.findIndex(([key]) => !outputs[key] && key !== "runner"),
            );
        graph.innerHTML = "";
        workflowGraphNodes.forEach(([key, label], index) => {
          const node = document.createElement("div");
          const done = key === "runner" ? Boolean(execution?.id) : Boolean(outputs[key]);
          const active = activeIndex === index || (!done && activeIndex < 0 && index === 0);
          node.className = `workflow-node${done ? " done" : ""}${active ? " active" : ""}`;
          node.textContent = label;
          graph.append(node);
        });
      };

      const renderArtifacts = (files = []) => {
        const list = $("artifactList");
        if (!list) return;
        list.innerHTML = "";
        if (!files.length) {
          const empty = document.createElement("div");
          empty.className = "meta";
          empty.textContent = "No artifacts yet";
          list.append(empty);
          return;
        }
        for (const file of files) {
          const item = document.createElement("div");
          item.className = "file-item";
          item.innerHTML = `${icons.file}<span></span>`;
          item.querySelector("span").textContent = file;
          list.append(item);
        }
      };

      const renderStatus = () => {
        const status = state.status || {};
        const authenticated = Boolean(status.authenticated);
        $("loginView").classList.toggle("hidden", authenticated);
        $("chatView").classList.toggle("hidden", !authenticated);
        $("serverText").textContent = status.serverUrl || "Loomex runner-control credentials";
        const workspaceCurrent = $("workspaceCurrent");
        const workspacePath = $("workspacePath");
        if (workspaceCurrent) {
          workspaceCurrent.textContent = status.workspacePath || "No local directory selected";
        }
        if (workspacePath) {
          workspacePath.value = status.workspacePath || workspacePath.value || "";
        }
        $("composerWorkspace").textContent = status.workspacePath || "Workspace not set";
        $("profileName").textContent = "Vency technicalai";
        $("profileDetail").textContent = "Pro";
      };

      const refreshStatus = async () => {
        state.status = await call("runner_status", { profile: null });
        renderStatus();
        return state.status;
      };
